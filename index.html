/* ---- case setup ---- */
function viewCase(){
  var st = store.get('room:case', {firm:'ey', line:'sat', team:'parthenon', role:'consultant',
                                   caseId:CASES[0].id, read:600, present:300, qa:3});
  var root = h('div',{style:'padding-top:40px'});
  root.appendChild(backBtn('home'));
  root.appendChild(eyebrow('Case study','gold'));
  root.appendChild(h('h2',{cls:'title', text:'Prepare a case'}));
  root.appendChild(h('p',{cls:'muted', style:'font-size:15px;margin:0 0 28px;line-height:1.55;max-width:600px',
    text:'Read the case against the clock, present your recommendation out loud, then take questions from the panel. Cases are written against real FY2026 market conditions; the companies are fictional.'}));

  // firm
  var firmWrap = h('div'); firmWrap.appendChild(eyebrow('Firm'));
  var frow = h('div',{cls:'row', style:'margin-top:10px'});
  CASE_FIRMS.forEach(function(f){
    var b = h('button',{cls:'chip '+(st.firm===f.id?'on':''), disabled:!f.on, style:f.on?'':'opacity:.4;cursor:not-allowed'},[
      h('div',{style:'font-size:14px;font-weight:500', text:f.name}),
      h('div',{cls:'mono faint', style:'font-size:10px;margin-top:2px', text:f.on?'available':'not yet'})
    ]);
    if (f.on) b.addEventListener('click', function(){ st.firm=f.id; save(); redraw(); });
    frow.appendChild(b);
  });
  firmWrap.appendChild(frow); root.appendChild(firmWrap);

  // service line + team
  var lineWrap = h('div',{style:'margin-top:22px'});
  root.appendChild(lineWrap);

  // role
  var roleWrap = h('div',{style:'margin-top:22px'});
  roleWrap.appendChild(eyebrow('Level you are interviewing at'));
  var rrow = h('div',{cls:'row', style:'margin-top:10px'});
  CASE_ROLES.forEach(function(r){
    rrow.appendChild(h('button',{cls:'chip '+(st.role===r.id?'on':''), onclick:function(){
      st.role=r.id; save();
      Array.prototype.forEach.call(rrow.children,function(c){c.className='chip';});
      this.className='chip on';
    }},[ h('div',{style:'font-size:14px;font-weight:500', text:r.name}),
         h('div',{cls:'faint', style:'font-size:11px;margin-top:2px', text:r.note}) ]));
  });
  roleWrap.appendChild(rrow); root.appendChild(roleWrap);

  // case picker
  var caseWrap = h('div',{style:'margin-top:26px'});
  caseWrap.appendChild(eyebrow('Choose a case'));
  caseWrap.appendChild(h('div',{cls:'faint', style:'font-size:12px;margin:4px 0 10px', text:CASES.length+' cases · FY2026 market context'}));
  var cgrid = h('div',{cls:'picks', style:'grid-template-columns:repeat(auto-fill,minmax(250px,1fr))'});
  CASES.forEach(function(c){
    var card = h('button',{cls:'pick cardhover '+(st.caseId===c.id?'on':''), onclick:function(){
      st.caseId=c.id; save();
      Array.prototype.forEach.call(cgrid.children,function(x){x.className='pick cardhover';});
      this.className='pick cardhover on';
    }},[
      h('div',{style:'display:flex;justify-content:space-between;align-items:center;gap:8px'},[
        h('span',{cls:'mono', style:'font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)', text:c.sector}),
        h('span',{cls:'diff '+c.difficulty, text:c.difficulty})
      ]),
      h('div',{style:'font-family:var(--serif);font-size:15.5px;line-height:1.35', text:c.title}),
      h('div',{cls:'muted', style:'font-size:12.3px;line-height:1.45', text:c.blurb})
    ]);
    cgrid.appendChild(card);
  });
  caseWrap.appendChild(cgrid); root.appendChild(caseWrap);

  // timings
  var timeWrap = h('div',{style:'margin-top:26px'});
  timeWrap.appendChild(eyebrow('Timing'));
  var tgrid = h('div',{style:'display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-top:12px'});
  tgrid.appendChild(timePick('Reading time', CASE_TIMES.read, 's', st.read, function(v){ st.read=v; save(); }));
  tgrid.appendChild(timePick('Presentation length', CASE_TIMES.present, 's', st.present, function(v){ st.present=v; save(); }));
  tgrid.appendChild(timePick('Panel questions', CASE_TIMES.qa, 'n', st.qa, function(v){ st.qa=v; save(); }));
  timeWrap.appendChild(tgrid); root.appendChild(timeWrap);

  var goBtn = btn('Take the case',{icon:'door', onclick:function(){
    var c = CASES.filter(function(x){return x.id===st.caseId;})[0];
    S.case = { cfg: JSON.parse(JSON.stringify(st)), c: c, phase:'read' };
    go('caseRoom');
  }});
  var note = h('span',{cls:'faint', style:'font-size:13px'});
  root.appendChild(h('div',{cls:'row', style:'margin-top:32px'},[goBtn, note]));
  function refresh(){
    goBtn.disabled = !hasConn();
    note.textContent = hasConn() ? (canWhisper() ? '' : 'Tip: add a Groq key in Settings for accurate Whisper transcription.') : 'Add a model key in Settings first.';
    note.style.color = hasConn() ? 'var(--faint)' : 'var(--rose)';
  }
  function save(){ store.set('room:case', st); }
  function redraw(){
    clear(lineWrap);
    var firm = CASE_FIRMS.filter(function(f){return f.id===st.firm;})[0];
    lineWrap.appendChild(eyebrow('Service line'));
    var lrow = h('div',{cls:'row', style:'margin-top:10px'});
    firm.lines.forEach(function(l){
      var b = h('button',{cls:'chip '+(st.line===l.id?'on':''), disabled:!l.on, style:l.on?'':'opacity:.4;cursor:not-allowed'},[
        h('div',{style:'font-size:14px;font-weight:500', text:l.name}),
        h('div',{cls:'mono faint', style:'font-size:10px;margin-top:2px', text:l.on?l.teams.length+' teams':'not yet'})
      ]);
      if (l.on) b.addEventListener('click', function(){ st.line=l.id; save(); redraw(); });
      lrow.appendChild(b);
    });
    lineWrap.appendChild(lrow);
    var line = firm.lines.filter(function(l){return l.id===st.line;})[0];
    if (line && line.teams.length){
      lineWrap.appendChild(h('div',{cls:'mono faint', style:'font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;margin:16px 0 8px', text:'Team'}));
      var trow = h('div',{cls:'row', style:'gap:6px'});
      line.teams.forEach(function(t){
        trow.appendChild(h('button',{cls:'pill '+(st.team===t.id?'on':''), onclick:function(){
          st.team=t.id; save();
          Array.prototype.forEach.call(trow.children,function(c){c.className='pill';});
          this.className='pill on';
        }}, t.name));
      });
      lineWrap.appendChild(trow);
    }
  }
  redraw(); refresh();
  return root;
}
function timePick(label, opts, kind, cur, onPick){
  var d = h('div');
  d.appendChild(h('div',{cls:'mono faint', style:'font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px', text:label}));
  var row = h('div',{cls:'row', style:'gap:6px'});
  opts.forEach(function(o){
    var val = kind==='s' ? o.s : o.n;
    row.appendChild(h('button',{cls:'pill '+(cur===val?'on':''), onclick:function(){
      onPick(val);
      Array.prototype.forEach.call(row.children,function(c){c.className='pill';});
      this.className='pill on';
    }}, o.l));
  });
  d.appendChild(row); return d;
}

/* ---- the case room: read -> present -> Q&A ---- */
function viewCaseRoom(){
  var K = S.case, c = K.c, cfg = K.cfg;
  var root = h('div',{style:'padding-top:24px'});
  var rec = makeRecorder();
  var readLeft = cfg.read, presLeft = cfg.present, elapsed = 0;
  var readTimer=null, presTimer=null, dict=null, liveText='', recording=false, actx=null, micStream=null, lvlRaf=null;
  var finalTranscript = '', qaList = [], curDiff='medium';

  onLeave(function(){
    if(readTimer) clearInterval(readTimer); if(presTimer) clearInterval(presTimer);
    if(lvlRaf) cancelAnimationFrame(lvlRaf);
    try{ rec.cancel(); }catch(e){}
    try{ dict && dict.stop(); }catch(e){}
    try{ actx && actx.close(); }catch(e){}
    try{ micStream && micStream.getTracks().forEach(function(t){t.stop();}); }catch(e){}
    if (window.speechSynthesis) window.speechSynthesis.cancel();
  });

  var head = h('div',{style:'display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:16px;flex-wrap:wrap'});
  var clock = h('div',{cls:'mono', style:'font-size:26px'});
  head.appendChild(h('div',{},[
    h('div',{style:'display:flex;align-items:center;gap:9px;flex-wrap:wrap'},[
      h('span',{cls:'mono', style:'font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)', text:c.sector}),
      h('span',{cls:'diff '+c.difficulty, text:c.difficulty}),
      h('span',{cls:'src', text:'EY · SAT'})
    ]),
    h('h2',{style:'font-family:var(--serif);font-weight:500;font-size:26px;margin:8px 0 0', text:c.title})
  ]));
  head.appendChild(h('div',{style:'text-align:right'},[ clock, h('div',{cls:'mono faint', style:'font-size:10.5px', id:'phaseLbl'}) ]));
  root.appendChild(head);

  var body = h('div');
  root.appendChild(body);

  function fmt(s){ return mmss(Math.max(0,s)); }
  function phaseLbl(t){ head.querySelector('#phaseLbl').textContent = t; }

  /* ---------- READ ---------- */
  function showRead(){
    clear(body);
    var grid = h('div',{cls:'roomgrid'});
    var main = h('div',{cls:'card', style:'padding:24px'});
    c.passage.split('\n\n').forEach(function(p){
      main.appendChild(h('p',{style:'margin:0 0 14px;font-size:14.8px;line-height:1.7', text:p}));
    });
    main.appendChild(h('div',{style:'border-top:1px solid var(--line);margin:18px 0 0;padding-top:16px'},[
      eyebrow('Your task','gold'),
      h('p',{style:'margin:9px 0 0;font-size:15px;line-height:1.6;font-family:var(--serif)', text:c.task})
    ]));
    grid.appendChild(main);

    var side = h('div',{cls:'qrail2'});
    side.appendChild(h('div',{cls:'eyebrow', style:'margin-bottom:11px', text:c.exhibit.title}));
    c.exhibit.rows.forEach(function(r){
      side.appendChild(h('div',{style:'display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--lineSoft)'},[
        h('span',{cls:'faint', style:'font-size:11.5px', text:r[0]}),
        h('span',{cls:'mono', style:'font-size:11.5px;text-align:right', text:r[1]})
      ]));
    });
    grid.appendChild(side);
    body.appendChild(grid);
    body.appendChild(h('div',{cls:'row', style:'margin-top:20px'},[
      btn('I am ready to present',{icon:'mic', onclick:startPresent}),
      h('span',{cls:'faint', style:'font-size:12.5px', text: cfg.read ? 'Presenting starts automatically when reading time runs out.' : 'Untimed — take as long as you need.'})
    ]));

    phaseLbl('reading');
    clock.textContent = cfg.read ? fmt(readLeft) : '--:--';
    if (cfg.read){
      readTimer = setInterval(function(){
        readLeft--; clock.textContent = fmt(readLeft);
        clock.style.color = readLeft <= 30 ? 'var(--rose)' : 'var(--ink)';
        if (readLeft <= 0){ clearInterval(readTimer); startPresent(); }
      },1000);
    }
  }

  /* ---------- PRESENT ---------- */
  function startPresent(){
    if (readTimer){ clearInterval(readTimer); readTimer=null; }
    clear(body);
    phaseLbl('presenting');
    clock.textContent = fmt(presLeft);

    var liveBox = h('div',{cls:'live', style:'max-height:220px'});
    liveBox.appendChild(h('span',{cls:'faint', text:'Your words appear here as you speak.'}));
    var lvl = h('div',{cls:'lvlfill'});
    var status = h('div',{cls:'faint', style:'font-size:12.5px;margin-top:10px;line-height:1.5'});
    var startBtn = btn('Start presenting',{icon:'mic', onclick:toggle});
    var doneBtn = btn('Done — take questions',{variant:'ghost', icon:'msg', onclick:endPresent, disabled:true});

    var taskCard = h('div',{cls:'card', style:'padding:16px 18px;margin-bottom:14px'});
    taskCard.appendChild(eyebrow('Your task','gold'));
    taskCard.appendChild(h('p',{style:'margin:8px 0 0;font-size:14px;line-height:1.55;font-family:var(--serif)', text:c.task}));
    body.appendChild(taskCard);
    body.appendChild(h('div',{cls:'lvl'},[lvl]));
    body.appendChild(liveBox);
    body.appendChild(status);
    body.appendChild(h('div',{cls:'row', style:'margin-top:16px'},[startBtn, doneBtn]));

    if (!SR && !canWhisper()){
      var ta = h('textarea',{cls:'input', rows:5, style:'margin-top:14px', placeholder:'No mic transcription available — type your presentation here.'});
      ta.addEventListener('input', function(){ liveText = ta.value; doneBtn.disabled = !ta.value.trim(); });
      body.appendChild(ta);
      status.textContent = 'Voice needs Chrome/Edge, or a Groq key for Whisper. You can type instead.';
    }

    function toggle(){
      if (recording){ stopMic(); startBtn.lastChild.textContent='Resume'; return; }
      recording = true; startBtn.lastChild.textContent='Pause'; doneBtn.disabled=false;
      // Dual capture: browser dictation drives the LIVE text, MediaRecorder feeds
      // Whisper for the accurate final transcript.
      if (canWhisper() && rec.supported()){
        rec.start().then(function(){ status.textContent='Recording — Whisper will transcribe this accurately when you finish.'; })
                   .catch(function(){ status.textContent='Mic blocked. Allow it, or type instead.'; });
      }
      if (SR){
        dict = makeDictation(function(t){
          liveText = t; clear(liveBox);
          liveBox.appendChild(h('span',{text:t}));
          liveBox.scrollTop = liveBox.scrollHeight;
        }, function(){ if (recording && dict){ try{dict.start();}catch(e){} } });
        if (dict){ dict.setBase(liveText); try{ dict.start(); }catch(e){} }
      }
      meter();
      presTimer = setInterval(function(){
        presLeft--; elapsed++;
        clock.textContent = fmt(presLeft);
        clock.style.color = presLeft <= 0 ? 'var(--rose)' : (presLeft <= 30 ? 'var(--gold)' : 'var(--ink)');
        if (presLeft === 0) status.textContent = 'You are at time. In a real panel they would stop you here.';
      },1000);
    }
    function stopMic(){
      recording = false;
      if (presTimer){ clearInterval(presTimer); presTimer=null; }
      if (lvlRaf){ cancelAnimationFrame(lvlRaf); lvlRaf=null; }
      try{ dict && dict.stop(); }catch(e){}
      try{ actx && actx.close(); actx=null; }catch(e){}
      try{ micStream && micStream.getTracks().forEach(function(t){t.stop();}); }catch(e){}
    }
    function meter(){
      if (!navigator.mediaDevices) return;
      navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){
        micStream = s;
        var AC = window.AudioContext || window.webkitAudioContext; if(!AC) return;
        actx = new AC();
        var an = actx.createAnalyser(); an.fftSize=256;
        actx.createMediaStreamSource(s).connect(an);
        var buf = new Uint8Array(an.fftSize);
        (function loop(){
          if (!actx || !recording) return;
          an.getByteTimeDomainData(buf);
          var sum=0; for(var i=0;i<buf.length;i++){ var v=(buf[i]-128)/128; sum+=v*v; }
          lvl.style.width = Math.min(100, Math.sqrt(sum/buf.length)*280)+'%';
          lvlRaf = requestAnimationFrame(loop);
        })();
      }).catch(function(){});
    }
    function endPresent(){
      stopMic();
      clear(body);
      body.appendChild(loadingPane('Transcribing your presentation…','Whisper is turning your audio into text.'));
      var p = (canWhisper() && rec.supported())
        ? rec.stop().then(function(b){ return b ? transcribe(b) : ''; }).catch(function(){ return ''; })
        : Promise.resolve('');
      p.then(function(txt){
        finalTranscript = (txt && txt.length > (liveText||'').length * 0.5) ? txt : (liveText || txt || '');
        if (!finalTranscript.trim()){
          clear(body);
          body.appendChild(h('div',{cls:'card pad center'},[
            h('p',{cls:'muted', style:'margin:0 0 14px', text:'Nothing was captured, so there is nothing to assess.'}),
            btn('Back to the case',{variant:'subtle', onclick:function(){ go('case'); }})
          ]));
          return;
        }
        startQA();
      });
    }
  }

  /* ---------- Q&A ---------- */
  function startQA(){
    clear(body); phaseLbl('questions'); clock.textContent = '--:--';
    var qCol = h('div');
    var qBox = h('div',{cls:'card', style:'padding:18px 20px'});
    var qEye = eyebrow('Question 1 of '+cfg.qa,'gold');
    var qDiff = h('span',{cls:'diff medium', style:'margin-left:10px', text:'medium'});
    var qText = h('p',{style:'margin:10px 0 0;font-size:16px;line-height:1.5;font-family:var(--serif)'});
    qBox.appendChild(h('div',{style:'display:flex;align-items:center'},[qEye,qDiff]));
    qBox.appendChild(qText);
    qCol.appendChild(qBox);

    var ans = h('textarea',{cls:'input', rows:3, placeholder:'Speak or type your answer…'});
    var mic = h('button',{cls:'sq', html:icon('mic',16)});
    var snd = h('button',{cls:'sq', html:icon('send',16), disabled:true});
    ans.addEventListener('input', function(){ snd.disabled = !ans.value.trim(); });
    ans.addEventListener('keydown', function(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); submit(); } });
    qCol.appendChild(h('div',{cls:'composer', style:'border:none;padding-top:14px'},[
      h('div',{cls:'rel'},[ans, h('div',{cls:'actions'},[mic,snd])])
    ]));
    qCol.appendChild(h('div',{style:'margin-top:14px'},[ btn('End & get report',{variant:'ghost', onclick:finish}) ]));

    var rail = h('div',{cls:'qrail2'});
    function drawRail(){
      clear(rail);
      rail.appendChild(h('div',{cls:'eyebrow', style:'margin-bottom:10px', text:'Panel questions'}));
      if (!qaList.length) rail.appendChild(h('div',{cls:'faint', style:'font-size:12px', text:'They will appear here as they come.'}));
      qaList.forEach(function(q,i){
        var d = q.difficulty||'medium';
        rail.appendChild(h('div',{cls:'qlog'},[
          h('div',{cls:'n', text:String(i+1).padStart(2,'0')}),
          h('div',{style:'min-width:0'},[ h('div',{cls:'t', text:q.q}), h('span',{cls:'diff '+d, text:d}) ])
        ]));
      });
    }
    body.appendChild(h('div',{cls:'roomgrid'},[qCol, rail]));
    drawRail();

    var listening=false;
    var d2 = makeDictation(function(t){ ans.value=t; snd.disabled=!t.trim(); },
                           function(){ listening=false; mic.className='sq'; mic.innerHTML=icon('mic',16); });
    mic.addEventListener('click', function(){
      if (!d2){ return; }
      if (listening){ try{d2.stop();}catch(e){} return; }
      d2.setBase(ans.value); try{ d2.start(); listening=true; mic.className='sq rec'; mic.innerHTML=icon('micOff',16); }catch(e){}
    });
    onLeave(function(){ try{d2&&d2.stop();}catch(e){} });

    function ask(){
      qText.textContent=''; snd.disabled=true;
      qEye.textContent = 'Question '+(qaList.length+1)+' of '+cfg.qa;
      var load = h('div',{cls:'faint', style:'display:flex;align-items:center;gap:9px;font-size:14px;margin-top:12px',
        html: icon('load',15,'currentColor','spin')+'<span style="margin-left:4px">The panel is considering…</span>'});
      qBox.appendChild(load);
      var role = CASE_ROLES.filter(function(r){return r.id===cfg.role;})[0];
      callJSON({
        system:'You are an EY Strategy and Transactions partner on an interview panel, interviewing for a '+(role?role.name:'Consultant')+' role. '+
          'You have just heard the candidate present a case. Ask ONE sharp question about what THEY actually said — press on a weak assumption, an unsupported number, a risk they skipped, or push them to commit to a view. '+
          'Do not ask a generic question. Reference their own words. Be professional, not cruel.\n'+
          'Angles the panel cares about for this case:\n'+ (c.angles||[]).map(function(a){return '- '+a;}).join('\n') + '\n'+
          'Return ONLY JSON: {"question": string, "difficulty": one of [easy,medium,hard]}',
        schema:'{"question":string,"difficulty":"easy"|"medium"|"hard"}',
        messages:[{role:'user', content:'CASE TASK: '+c.task+'\n\nTHEIR PRESENTATION:\n'+finalTranscript.slice(0,3000)+
          (qaList.length?('\n\nAlready asked: '+qaList.map(function(q){return q.q;}).join(' | ')):'')}],
        maxTokens:500
      }).then(function(d){
        if (!d || !d.question) d = {question:'What is the single biggest risk to your recommendation?', difficulty:'medium'};
        curDiff = ['easy','medium','hard'].indexOf(d.difficulty)>=0 ? d.difficulty : 'medium';
        if (load.parentNode) qBox.removeChild(load);
        qDiff.className='diff '+curDiff; qDiff.textContent=curDiff;
        qText.textContent=''; qText.appendChild(h('span',{style:'color:var(--gold)', text:'Panel: '}));
        qText.appendChild(h('span',{text:'"'+d.question+'"'}));
        qText.dataset.q = d.question;
        if (S.settings.hearThem && window.speechSynthesis){ try{ window.speechSynthesis.speak(new SpeechSynthesisUtterance(d.question)); }catch(e){} }
      }).catch(function(){
        if (load.parentNode) qBox.removeChild(load);
        qText.textContent = 'What is the single biggest risk to your recommendation?';
        qText.dataset.q = 'What is the single biggest risk to your recommendation?';
      });
    }
    function submit(){
      if (!ans.value.trim()) return;
      try{ d2 && d2.stop(); }catch(e){}
      qaList.push({ q:qText.dataset.q||'', a:ans.value.trim(), difficulty:curDiff });
      ans.value=''; snd.disabled=true; drawRail();
      if (qaList.length >= cfg.qa) finish(); else ask();
    }
    snd.addEventListener('click', submit);
    ask();
  }

  function finish(){
    S.caseResult = { cfg:cfg, caseId:c.id, title:c.title, sector:c.sector, task:c.task,
      transcript:finalTranscript, qa:qaList, spokenSec: cfg.present - presLeft,
      fillers: countFillers(finalTranscript), wpm: (cfg.present-presLeft) > 5 ? Math.round(words(finalTranscript)/((cfg.present-presLeft)/60)) : 0 };
    go('caseReport');
  }

  showRead();
  return root;
}

/* ---- case report ---- */
function viewCaseReport(){
  var replay = S.replay;
  var r = replay ? (replay.caseData||{}) : S.caseResult;
  var root = h('div',{cls:'mid', style:'padding-top:34px'});
  root.appendChild(loadingPane('The panel is deliberating…','Scoring your structure, judgement and delivery.'));
  var CKEYS = ['overall','structure','commercialJudgement','useOfData','recommendation','clarity','presence'];
  var cstats = { answers:1, avgWords:words(r.transcript||''), avgSec:r.spokenSec||0,
                 fillers:(r.fillers&&r.fillers.n)||0, totalWords:words(r.transcript||'') };
  var caseCoach = (replay && replay.coach) || {};

  if (!r.transcript || !words(r.transcript)){
    clear(root);
    root.appendChild(h('div',{cls:'card pad center'},[
      h('p',{cls:'muted', style:'margin:0 0 14px', text:'No presentation was captured.'}),
      btn('Back',{variant:'subtle', onclick:function(){ go('case'); }})
    ]));
    return root;
  }

  var caseDef = CASES.filter(function(x){return x.id===r.caseId;})[0] || {angles:[]};
  (replay ? Promise.resolve(replay.report) : callJSON({
    system:'You are an EY Strategy and Transactions partner debriefing a candidate after a case presentation. Be specific, honest and useful — reference what they actually said.\n'+
      'Return ONLY a JSON object. Every score is a WHOLE NUMBER 0-100. Do not omit any key.\n'+
      '{"scores":{"overall":72,"structure":70,"commercialJudgement":68,"useOfData":65,"recommendation":75,"clarity":74,"presence":70},'+
      '"summary":"2-3 sentences on how it landed","strengths":["...","...","..."],"improvements":["...","...","..."],'+
      '"missed":["angles they never addressed"],"betterVersion":"their whole presentation rewritten in THEIR OWN voice and vocabulary — same person, better structured, clearer recommendation, evidence up front. Do not make it sound like generic consulting boilerplate."}\n'+
      'The panel expected these angles:\n'+(caseDef.angles||[]).map(function(a){return '- '+a;}).join('\n'),
    schema:'{"scores":{"overall":int,"structure":int,"commercialJudgement":int,"useOfData":int,"recommendation":int,"clarity":int,"presence":int},"summary":string,"strengths":[3 strings],"improvements":[3 strings],"missed":[strings],"betterVersion":string}',
    messages:[{role:'user', content:'CASE: '+r.title+'\nTASK: '+r.task+'\n\nTHEIR PRESENTATION:\n'+r.transcript+
      '\n\nQ&A:\n'+(r.qa||[]).map(function(q){return 'Q: '+q.q+'\nA: '+q.a;}).join('\n\n')+
      '\n\nMEASURED: '+Math.round((r.spokenSec||0)/60*10)/10+' min spoken of '+Math.round((r.cfg.present||0)/60)+' min allowed, '+r.wpm+' wpm, '+((r.fillers&&r.fillers.n)||0)+' fillers.'}],
    maxTokens:3000
  })).then(function(a){
    a = a || {};
    var norm = normalizeScores(a, cstats, CKEYS);
    a.scores = norm.scores; a.estimated = norm.estimated;
    if (!a.summary) a.summary = 'Here is how that landed.';
    if (replay){ clear(root); try{ build(a); }catch(e){ root.appendChild(h('div',{cls:'err'},[h('span',{text:'Could not draw: '+e.message})])); } return; }
    persistSession({date:Date.now(), mode:'case', who:r.title, overall:a.scores.overall, scores:a.scores,
      report:a, caseData:r, coach:{}});
    clear(root);
    try{ build(a); }catch(e){ root.appendChild(h('div',{cls:'err'},[h('span',{text:'Report saved, but could not draw: '+e.message})])); }
  }).catch(function(e){
    var norm = normalizeScores(null, cstats, CKEYS);
    if (!replay) persistSession({date:Date.now(), mode:'case', who:r.title, overall:norm.scores.overall,
      scores:norm.scores, estimated:true, report:{scores:norm.scores, estimated:true, summary:'Estimated locally.'}, caseData:r, coach:{}});
    clear(root);
    root.appendChild(h('div',{cls:'warn', style:'margin-bottom:18px'},[
      h('span',{text:(e&&e.message)||'The panel could not be reached, so scores are estimated locally.'}),
      h('div',{cls:'row'},[ btn('Try again',{variant:'subtle', icon:'redo', onclick:function(){ go('caseReport'); }}),
                            btn('Settings',{variant:'ghost', icon:'sliders', onclick:openSettings}) ])
    ]));
    build({ scores:norm.scores, estimated:true, summary:'Estimated from your pace, length and fillers.', strengths:[], improvements:[], missed:[] });
  });

  function build(a){
    var s = a.scores;
    root.appendChild(eyebrow('Case debrief · EY SAT','gold'));
    root.appendChild(h('h2',{cls:'title', text:r.title}));
    if (a.estimated) root.appendChild(h('div',{style:'display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);border:1px solid var(--goldDim);border-radius:20px;padding:3px 11px;margin-bottom:12px', text:'Estimated locally'}));
    root.appendChild(h('p',{cls:'quote muted', style:'font-size:15px;margin:0 0 24px;line-height:1.55', text:a.summary}));

    var top = h('div',{cls:'grid twocol', style:'grid-template-columns:minmax(0,220px) 1fr;align-items:start'});
    var oc = h('div',{cls:'card center', style:'padding:24px 20px'});
    oc.appendChild(eyebrow('Overall'));
    oc.appendChild(h('div',{style:'font-family:var(--serif);font-size:64px;color:var(--gold);line-height:1;margin:10px 0 2px', text:String(clamp(s.overall))}));
    oc.appendChild(h('div',{cls:'mono faint', style:'font-size:12px', text:'/ 100'}));
    oc.appendChild(h('div',{style:'height:1px;background:var(--line);margin:18px 0'}));
    var stats = h('div',{style:'display:flex;justify-content:space-around'});
    [['Spoken',(Math.round((r.spokenSec||0)/60*10)/10)+'m'],['Pace',r.wpm||0],['Fillers',(r.fillers&&r.fillers.n)||0]].forEach(function(x){
      stats.appendChild(h('div',{},[ h('div',{cls:'mono',style:'font-size:18px',text:String(x[1])}),
                                     h('div',{cls:'faint',style:'font-size:10.5px;margin-top:2px',text:x[0]}) ]));
    });
    oc.appendChild(stats); top.appendChild(oc);
    var bars = h('div',{cls:'card', style:'padding:20px 22px'});
    [['Structure',s.structure,'var(--gold)'],['Commercial judgement',s.commercialJudgement,'var(--teal)'],
     ['Use of the data',s.useOfData,'var(--gold)'],['Recommendation',s.recommendation,'var(--teal)'],
     ['Clarity',s.clarity,'var(--gold)'],['Presence',s.presence,'var(--teal)']].forEach(function(x){
      bars.appendChild(scoreBar(x[0],x[1],x[2]));
    });
    top.appendChild(bars); root.appendChild(top);

    var two = h('div',{cls:'grid twocol', style:'grid-template-columns:1fr 1fr;margin-top:16px'});
    two.appendChild(listCard('What worked', a.strengths, 'teal'));
    two.appendChild(listCard('Where to sharpen', a.improvements, 'gold'));
    root.appendChild(two);
    if (a.missed && a.missed.length) root.appendChild(h('div',{style:'margin-top:14px'},[listCard('Angles you did not cover', a.missed, 'gold')]));

    var fc = fillerChips(r.fillers && r.fillers.hits); if (fc) root.appendChild(fc);

    if (a.betterVersion){
      root.appendChild(h('h3',{cls:'sub', text:'Your presentation, sharper'}));
      root.appendChild(h('p',{cls:'faint', style:'font-size:13.5px;margin:0 0 14px', text:'Same voice, same vocabulary — restructured the way the panel wanted to hear it.'}));
      var rw = h('div',{cls:'rewrite'});
      rw.appendChild(h('div',{style:'display:flex;align-items:center;gap:8px;margin-bottom:10px'},[
        h('span',{html:icon('wand',15,'var(--gold)')}), eyebrow('In your words, better ordered','gold') ]));
      a.betterVersion.split('\n\n').forEach(function(p){
        rw.appendChild(h('p',{style:'margin:0 0 12px;font-size:14.5px;line-height:1.65;font-family:var(--serif)', text:p}));
      });
      root.appendChild(rw);
    }

    root.appendChild(h('details',{style:'margin-top:16px'},[
      h('summary',{cls:'faint', style:'cursor:pointer;font-size:13px', text:'What you actually said'}),
      h('p',{cls:'muted', style:'font-size:13.5px;line-height:1.6;margin-top:10px', text:r.transcript})
    ]));

    root.appendChild(methodCard(r, caseDef, caseCoach));

    if (r.qa && r.qa.length){
      root.appendChild(h('h3',{cls:'sub', text:'Panel Q&A'}));
      root.appendChild(h('p',{cls:'faint', style:'font-size:13.5px;margin:0 0 14px', text:'Open any answer for a stronger version in your own voice.'}));
      var qs = h('div',{style:'display:flex;flex-direction:column;gap:12px'});
      r.qa.forEach(function(q,i){
        qs.appendChild(coachCard({ idx:i, question:q.q, answer:q.a, difficulty:q.difficulty,
          key:'cq'+i, store:caseCoach, context:'an EY Strategy and Transactions case interview panel question' }));
      });
      root.appendChild(qs);
    }

    root.appendChild(h('div',{cls:'row', style:'margin-top:30px'},[
      btn('Take questions',{icon:'mic', onclick:function(){
        startDrill((r.qa||[]).map(function(q){return q.q;}), 'an EY Strategy and Transactions case interview about: '+r.title);
      }}),
      btn('Another case',{variant:'ghost', icon:'redo', onclick:function(){ go('case'); }}),
      btn('See progress',{variant:'ghost', icon:'trend', onclick:function(){ go('progress'); }})
    ]));
  }
  return root;
}


/* ---- how you should have run it: local time plan + AI method ----
   The clock split is computed here (free, exact to the timings chosen).
   Only the case-specific method costs an API call, and it caches.        */
function timePlan(readSec, presSec){
  function seg(total, parts){
    var out = [], acc = 0;
    parts.forEach(function(p, i){
      var len = (i === parts.length-1) ? (total - acc) : Math.round(total * p.f);
      out.push({ from:acc, to:acc+len, len:len, title:p.t, what:p.w });
      acc += len;
    });
    return out;
  }
  var plan = { read:[], present:[] };
  if (readSec > 0){
    plan.read = seg(readSec, [
      {f:0.08, t:'Read the ask first', w:'Go to the task before the passage. Everything you read afterwards gets filtered by what you are actually being asked to decide.'},
      {f:0.30, t:'First pass of the passage', w:'One read, no notes. You are looking for three things only: what decision is on the table, who has to live with it, and what makes it hard.'},
      {f:0.20, t:'Interrogate the exhibit', w:'Numbers are in the case because they matter. For each one ask: what does this rule in, what does it rule out. Circle the two that carry your answer.'},
      {f:0.30, t:'Build the spine', w:'Write your recommendation as one sentence, then the two or three reasons underneath it, then the evidence under each. If a fact does not sit under a reason, it does not get said.'},
      {f:0.12, t:'Rehearse the first and last line', w:'Say your opening sentence and your closing sentence out loud. These are the two the panel remembers.'}
    ]);
  }
  plan.present = seg(presSec, [
    {f:0.12, t:'Recommendation, immediately', w:'Answer the question in your first sentence. No background, no "I looked at three things". The panel already knows the case.'},
    {f:0.08, t:'Signpost', w:'"Three reasons, then the risks." Now they know when you are done and can follow you.'},
    {f:0.50, t:'The body', w:'Two or three pillars. Each one: claim, then the number that proves it, then the so-what. Never a number without a so-what.'},
    {f:0.18, t:'Risks and what would change your mind', w:'Name the strongest argument against you and answer it before they raise it. This is where credibility is won.'},
    {f:0.12, t:'Close on the ask', w:'Restate the recommendation and say what you would do first thing Monday. Stop talking.'}
  ]);
  return plan;
}

function methodCard(r, caseDef, store){
  var card = h('div');
  card.appendChild(h('h3',{cls:'sub', text:'How you should have run this'}));
  card.appendChild(h('p',{cls:'faint', style:'font-size:13.5px;margin:0 0 16px;line-height:1.5',
    text:'The approach a strong candidate would have taken on this case, on the clock you chose — from opening the passage to the moment before the panel speaks.'}));

  // ---- local, free: the clock
  var plan = timePlan(r.cfg.read||0, r.cfg.present||300);
  var clockCard = h('div',{cls:'card', style:'padding:20px 22px'});
  clockCard.appendChild(eyebrow('Your clock','gold'));
  clockCard.appendChild(h('div',{cls:'faint', style:'font-size:12px;margin:5px 0 14px',
    text: (r.cfg.read ? Math.round(r.cfg.read/60)+' min reading' : 'untimed reading')+' · '+Math.round((r.cfg.present||0)/60)+' min presenting'}));

  function phaseList(title, segs, color){
    if (!segs.length) return null;
    var w = h('div',{style:'margin-bottom:6px'});
    w.appendChild(h('div',{cls:'mono', style:'font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--'+color+');margin-bottom:9px', text:title}));
    segs.forEach(function(s){
      w.appendChild(h('div',{style:'display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--lineSoft)'},[

function providerDef(id){ return PROVIDERS.filter(function(p){return p.id===id;})[0] || PROVIDERS[0]; }

// Builds the exact provider request. `wantJSON` turns on native JSON mode where
// the provider supports it — this is what makes reports reliable.
function buildRequest(system, messages, maxTokens, wantJSON){
  var st = S.settings, p = st.provider, key = (st.apiKey||'').trim(), url, headers, body;

  if (p === 'gemini'){
    url = 'https://generativelanguage.googleapis.com/v1beta/models/'+encodeURIComponent(st.model)+':generateContent?key='+encodeURIComponent(key);
    headers = {'Content-Type':'application/json'};
    var gen = { maxOutputTokens:maxTokens, temperature:0.9 };
    // On Gemini 2.5+/3.x, "thinking" tokens are billed against maxOutputTokens.
    // Left on, the model can spend the whole budget thinking and return EMPTY text.
    if (/gemini-(2\.5|3)/.test(st.model)) gen.thinkingConfig = { thinkingBudget: 0 };
    if (wantJSON) gen.responseMimeType = 'application/json';
    body = {
      systemInstruction:{ parts:[{text:system}] },
      contents: messages.map(function(m){ return { role: m.role==='assistant'?'model':'user', parts:[{text:m.content}] }; }),
      generationConfig: gen
    };
  } else if (p === 'anthropic'){
    url = 'https://api.anthropic.com/v1/messages';
    headers = {'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'};
    body = { model:st.model, max_tokens:maxTokens, temperature:0.9, system:system, messages:messages };
  } else {
    // groq + any OpenAI-compatible endpoint
    var base = (p === 'groq') ? 'https://api.groq.com/openai/v1' : (st.baseUrl||'').replace(/\/+$/,'');
    url = base.replace(/\/+$/,'') + '/chat/completions';
    headers = {'Content-Type':'application/json','Authorization':'Bearer '+key};
    body = { model:st.model, max_tokens:maxTokens, temperature:0.9,
      messages:[{role:'system',content:system}].concat(messages) };
    if (wantJSON) body.response_format = { type:'json_object' };
    if (/gemini/i.test(st.model)) body.reasoning_effort = 'none';
  }
  return { url:url, headers:headers, body:body };
}

function extractText(kind, d){
  if (kind === 'gemini'){
    var c = d.candidates && d.candidates[0];
    var parts = (c && c.content && c.content.parts) || [];
    var txt = parts.map(function(x){return x.text||'';}).join('').trim();
    if (!txt && c && c.finishReason === 'MAX_TOKENS') throw new Error('empty_maxtokens');
    return txt;
  }
  if (kind === 'anthropic') return (d.content||[]).map(function(b){return b.type==='text'?b.text:'';}).join('\n').trim();
  return ((d.choices && d.choices[0] && d.choices[0].message && d.choices[0].message.content) || '').trim();
}

function rawCall(opts){
  var maxTokens = opts.maxTokens || 1200;
  var st = S.settings, p = st.provider, key = (st.apiKey||'').trim();
  if (!key) return Promise.reject(new Error('no_key'));

  var def = providerDef(p);
  var req = buildRequest(opts.system, opts.messages, maxTokens, !!opts.wantJSON);
  var viaProxy = def.needsProxy || !!st.useProxy;

  var fetchP = viaProxy
    // Relay: the proxy forwards this verbatim. Key still comes from this browser.
    ? fetch(st.proxyUrl || '/api/chat', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ url:req.url, headers:req.headers, body:req.body }) })
    : fetch(req.url, { method:'POST',
        headers: Object.assign({}, req.headers, p==='anthropic' ? {'anthropic-dangerous-direct-browser-access':'true'} : {}),
        body: JSON.stringify(req.body) });

  return fetchP.then(chk).then(function(d){
    if (d && d.error && typeof d.error === 'string') throw new Error(d.error);
    return extractText(p, d);
  }).catch(function(e){
    if (e instanceof TypeError && viaProxy === false && def.needsProxy === false){
      var e2 = new Error('Could not reach '+p+' directly from the browser. Tick "Route via my proxy" in Settings and deploy api/chat.js (see README).');
      throw e2;
    }
    throw e;
  });
}
function chk(r){
  var ctype = r.headers.get('content-type') || '';
  if (!r.ok || ctype.indexOf('json') === -1){
    return r.text().then(function(t){
      var e;
      if (ctype.indexOf('text/html') !== -1){
        e = new Error('Got an HTML page back instead of an API reply (status '+r.status+'). Your proxy URL is not pointing at a live api/chat.js — deploy to Vercel and use that URL, or untick the proxy for Gemini/OpenRouter.');
      } else {
        e = new Error(friendlyErr(r.status, t));
      }
      e.status = r.status; throw e;
    });
  }
  return r.json();
}
function friendlyErr(status, body){
  if (status === 429) return 'Rate limit or daily quota reached. Wait a minute — or switch to a model with a bigger free allowance (try gemini-2.5-flash-lite) in Settings.';
  if (status === 401 || status === 403) return 'Your API key was rejected. Check it in Settings.';
  if (status === 404) return 'That model name was not found. Check the Model field in Settings.';
  if (status >= 500) return 'The provider had a server error. Try again in a moment.';
  return 'Request failed (' + status + '): ' + String(body).slice(0, 120);
}
var sleep = function(ms){ return new Promise(function(r){ setTimeout(r, ms); }); };

// Retries once on rate-limit / transient failure.
function callModel(opts){
  return rawCall(opts).catch(function(e){
    if (e.message === 'no_key') throw e;
    if (e.status === 429 || e.status >= 500 || e.message === 'empty_maxtokens'){
      return sleep(e.status === 429 ? 3000 : 800).then(function(){
        return rawCall(Object.assign({}, opts, { maxTokens: Math.min((opts.maxTokens||1200)*2, 8000) }));
      });
    }
    throw e;
  });
}

// Asks for JSON, and if the model returns prose or half-JSON, repairs it instead of
// silently falling back to a canned line.
function callJSON(opts){
  opts = Object.assign({}, opts, { wantJSON:true });
  return callModel(opts).then(function(raw){
    var d = parseJSON(raw, null);
    if (d) return d;
    if (!raw) throw new Error('The model returned an empty response. Try a different model in Settings.');
    // one repair attempt: hand the prose back and ask for strict JSON
    return callModel({
      system: 'Convert the text into exactly the JSON object described. Output ONLY the JSON, nothing else.\n\nSCHEMA:\n' + (opts.schema || opts.system),
      messages: [{ role:'user', content: raw.slice(0, 3000) }],
      maxTokens: opts.maxTokens || 1200
    }).then(function(fixed){
      var d2 = parseJSON(fixed, null);
      if (d2) return d2;
      var err = new Error('The model would not return valid JSON.');
      err.raw = raw;
      throw err;
    });
  });
}
function hasConn(){ return !!(S.settings.apiKey||'').trim(); }

var S = {
  view:'home', profile:null, sessions:[], session:null, pres:null, banks:[], case:null, caseResult:null,
  settings:{ provider:'gemini', apiKey:'', model:'gemini-2.5-flash-lite', baseUrl:'https://openrouter.ai/api/v1', proxyUrl:'/api/chat', useProxy:false, hearThem:false, reactSecs:30, whisperKey:'', whisperModel:'whisper-large-v3-turbo' }
};
var cleanups = [];
function onLeave(fn){ cleanups.push(fn); }
function runCleanups(){ cleanups.forEach(function(f){ try{f();}catch(e){} }); cleanups = []; }
function saveSettings(){ store.set('room:settings', S.settings); }
function saveProfile(p){ S.profile = p; store.set('room:profile', p); }
function saveSessions(x){ S.sessions = x; store.set('room:sessions', x); }
function saveBanks(){ store.set('room:banks', S.banks); }
// Appends one session. Re-reads storage first so a second tab can't clobber it,
// and guards against double-saving the same report.
function persistSession(rec){
  try{
    var all = store.get('room:sessions', []) || [];
    if (all.length && rec.date - all[all.length-1].date < 4000 && all[all.length-1].who === rec.who) return;
    rec.id = 's'+rec.date;
    S.lastSessionId = rec.id;
    all.push(rec);
    all = all.slice(-40);
    // Full reports carry transcripts, so they're big. If localStorage rejects the
    // write, strip the heavy payload off the oldest entries (keeping their scores)
    // until it fits, rather than losing the new report.
    for (var attempt=0; attempt<40; attempt++){
      try{ localStorage.setItem('room:sessions', JSON.stringify(all)); S.sessions = all; return; }
      catch(err){
        var stripped = false;
        for (var i=0;i<all.length;i++){
          if (all[i].report || all[i].transcript || all[i].pres){
            delete all[i].report; delete all[i].transcript; delete all[i].pres; delete all[i].coach;
            all[i].trimmed = true; stripped = true; break;
          }
        }
        if (!stripped) { all = all.slice(1); }
      }
    }
  }catch(e){ /* never let a save error break the report */ }
}

function go(view){ runCleanups(); if (view!=='report' && view!=='presReport' && view!=='caseReport') S.replay = null; S.view = view; render(); window.scrollTo(0,0); }
// Re-open a saved report from Progress.
function openArchived(rec){
  if (!rec.report){ return; }
  S.replay = rec;
  runCleanups(); S.view = rec.mode==='presentation' ? 'presReport' : (rec.mode==='case' ? 'caseReport' : 'report');
  render(); window.scrollTo(0,0);
}

  else if (v==='setup') wrap.appendChild(viewSetup());
  else if (v==='room') wrap.appendChild(viewRoom());
  else if (v==='report') wrap.appendChild(viewReport());
  else if (v==='pres') wrap.appendChild(viewPresSetup());
  else if (v==='stage') wrap.appendChild(viewStage());
  else if (v==='presReport') wrap.appendChild(viewPresReport());
  else if (v==='progress') wrap.appendChild(viewProgress());
  else if (v==='drill') wrap.appendChild(viewDrill());
  else if (v==='case') wrap.appendChild(viewCase());
  else if (v==='caseRoom') wrap.appendChild(viewCaseRoom());

  app.appendChild(wrap);
}

/* ------------------------------ speech ------------------------------ */
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
function speak(text, voiceKey){
  if (!S.settings.hearThem || !window.speechSynthesis) return;
  try{
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    var v = VOICE[voiceKey] || [1,1];
    u.rate = v[0]; u.pitch = v[1];
    var voices = window.speechSynthesis.getVoices().filter(function(x){ return /en[-_]/i.test(x.lang); });
    if (voices.length) u.voice = voices[(voiceKey||'x').charCodeAt(0) % voices.length];
    window.speechSynthesis.speak(u);
    return u;
  }catch(e){}
}
function makeDictation(onText, onEnd){
  if (!SR) return null;
  var r = new SR();
  r.lang='en-US'; r.continuous=true; r.interimResults=true;
  var base='', fin='';
  r.setBase = function(t){ base = t ? t.trim()+' ' : ''; fin=''; };
  r.onresult = function(e){
    var itm='';
    for (var i=e.resultIndex;i<e.results.length;i++){
      var t = e.results[i][0].transcript;
      if (e.results[i].isFinal) fin += t+' '; else itm += t;
    }
    onText((base+fin+itm).replace(/\s+/g,' ').replace(/^\s+/,''), fin, itm, e);
  };
  r.onend = function(){ if(onEnd) onEnd(); };
  return r;
}

/* ------------------------------ room ------------------------------ */
function planBlock(sess){
  if (!sess.plan || !sess.plan.length) return '';
  var asked = sess.planIdx || 0;
  var next = sess.plan[asked];
  if (!next) return '\nYou have covered your planned questions. Wrap up or probe anything still thin.\n';
  var done = sess.plan.slice(0, asked).map(function(x){ return '- '+x.q; }).join('\n');
  return '\nYOUR INTERVIEW PLAN (you wrote these beforehand):\n'+
    (done ? 'Already asked:\n'+done+'\n' : '')+
    'NEXT PLANNED QUESTION (#'+(asked+1)+' of '+sess.plan.length+'):\n"'+next.q+'"\n'+
    'Each turn, do ONE of these:\n'+
    '  (a) ask the next planned question — put it in your own voice, but keep its substance intact; set "planned": true\n'+
    '  (b) ask a natural follow-up to their last answer if it was vague, unsupported or interesting; set "planned": false\n'+
    'Prefer (b) when their last answer clearly needs pushing, otherwise move the plan forward. Never announce that you have a plan.\n';
}

function buildSystem(sess, docCtx, closing){
  if (sess.mode === 'interview'){
    var p = INTERVIEWERS.filter(function(x){return x.id===sess.interviewerId;})[0];
    return 'You are '+p.name+', a '+p.title+'. '+p.persona+'\n\n'+
      'You are interviewing a candidate. Context from their CV and the job description:\n'+docCtx+'\n\n'+
      'Rules:\n- Stay fully in character as '+p.name+'. You are a real person, never an AI, never a coach. Never give feedback.\n'+
      '- One turn only. Speak 1-3 sentences. Ask ONE thing at a time.\n'+
      "- React to their LAST answer. If it's vague or unsupported, probe or challenge it. If it's strong, acknowledge briefly and go deeper.\n"+
      '- Reference earlier answers when natural. Occasionally take a note, pause, or mildly disagree.\n'+
      '- Sometimes say very little and let a silence invite them to keep talking.\n'+
      (sess.behavioural
        ? '\nTHIS IS A BEHAVIOURAL (COMPETENCY) INTERVIEW. Rules that override the above:\n'+
          '- EVERY question must ask for a SPECIFIC PAST EXAMPLE. Use openers like "Tell me about a time...", "Give me an example of...", "Walk me through a situation where...", "Describe an occasion when...".\n'+
          '- Never ask hypotheticals ("what would you do if"), never ask opinion questions, never ask about strengths in the abstract.\n'+
          '- Each question must come from a DIFFERENT competency. Do not ask two questions about the same theme.\n'+
          '- You are listening for STAR: situation, task, action, result. If their answer skips what THEY personally did, or ends with no outcome, your follow-up must dig for exactly that missing piece — e.g. "and what was your role in that specifically?" or "what happened in the end — did the number move?". This is your single most important job.\n'+
          '- Keep your own turns short. They should be talking, not you.\n'+
          'Competencies to draw from (pick unused ones):\n'+ BEHAV_COMPETENCIES.map(function(c){return '  - '+c;}).join('\n') + '\n'
        : '- Move naturally across: motivation, real experience, a specific project, a challenge or failure, teamwork, and role-specific depth.\n')+
      (closing?'- This is the FINAL moment. Wrap up warmly, thank them, say you will be in touch. kind must be "closing".\n':'')+
      planBlock(sess)+
      '\nOutput ONLY a JSON object, no other text:\n'+
      '{"speech": string, "mood": one of [warm,interested,impressed,neutral,thinking,skeptical,challenging,distracted], "action": short stage direction or "", "kind": one of [question,followup,challenge,reaction,silence,closing], "difficulty": one of [easy,medium,hard] - how demanding this question is to answer well, "planned": true if this is the next planned question, false if it is your own follow-up}';
  }
  var s = SCENARIOS.filter(function(x){return x.id===sess.scenarioId;})[0];
  return 'You are '+s.counterpart+'. '+s.persona+'\n\n'+
    'This is a workplace conversation. The other person\'s goal is to '+s.goal+'.\n'+
    (sess.context ? 'Context they gave: '+sess.context+'\n' : '')+
    '\nRules:\n- Stay fully in character. You are a real colleague, never an AI, never a coach. Never give feedback.\n'+
    '- One turn only, 1-3 sentences. React genuinely to what they just said.\n'+
    "- Push back, ask clarifying questions, or show emotion when it fits. Don't make it easy if the moment calls for friction.\n"+
    (closing?'- Wrap the conversation up naturally now. kind must be "closing".\n':'')+
    '\nOutput ONLY a JSON object, no other text:\n'+
    '{"speech": string, "mood": one of [warm,interested,impressed,neutral,thinking,skeptical,challenging,distracted], "action": short stage direction or "", "kind": one of [question,followup,challenge,reaction,silence,closing], "difficulty": one of [easy,medium,hard] - how demanding this question is to answer well}';
}

function viewRoom(){
  var sess = S.session;
  var isInt = sess.mode === 'interview';
  var who = isInt ? INTERVIEWERS.filter(function(x){return x.id===sess.interviewerId;})[0]
                  : (function(){ var s = SCENARIOS.filter(function(x){return x.id===sess.scenarioId;})[0];
                                 return {name:s.counterpart, title:s.name, id:s.id}; })();

      docCtx = 'CV (excerpt): '+sess.cv.slice(0,900)+'\nJob description (excerpt): '+sess.jd.slice(0,700);

  })();

  return root;
}

/* ---- score handling -------------------------------------------------
   Models sometimes return scores as strings, nested oddly, or omit keys.
   Never lose a finished session over that: coerce what came back, and
   fill any gaps with a local estimate from the measured stats.        */
function localScores(st){
  // st: {answers, avgWords, avgSec, fillers, totalWords}
  // Deliberately capped well below 100: this is a crude proxy from length, pace
  // and filler rate. Reporting a 94 because someone talked for a long time would
  // be actively misleading, so the ceiling is 78.
  var depth = Math.min(78, 28 + (st.avgWords||0) * 0.32);            // substance
  var fillRate = st.totalWords ? (st.fillers / st.totalWords) * 100 : 0;
  var clean = Math.max(30, Math.min(78, 82 - fillRate * 12));        // filler penalty
  var pace = st.avgSec ? Math.max(35, Math.min(78, 80 - Math.abs(st.avgSec - 75) * 0.4)) : 55;
  var base = Math.round((depth + clean + pace) / 3);
  // STAR cannot be judged from length or pace — only a model reading the words
  // can see whether a Result was given. Estimate these LOW so a missing score is
  // never mistaken for a good one.
  var starGuess = Math.min(base, 55);
  return { overall:base, confidence:clean, clarity:base, storytelling:depth,
    executivePresence:base, technical:base, leadership:base, listening:base,
    structure:base, pacing:pace, engagement:base, vocalEnergy:base,
    situation:starGuess, task:starGuess, action:starGuess, result:starGuess,
    specificity:starGuess, ownership:starGuess,
    commercialJudgement:base, useOfData:base, recommendation:base, presence:base };
}
function normalizeScores(a, stats, keys){
  var src = (a && typeof a.scores === 'object' && a.scores) ? a.scores : (a || {});
  var fb = localScores(stats);
  var out = {}, got = 0;
  keys.forEach(function(k){
    var v = Number(src[k]);
    if (isFinite(v) && v > 0){ out[k] = clamp(v); got++; }
    else out[k] = clamp(fb[k] !== undefined ? fb[k] : fb.overall);
  });
  // Flag as estimated if the model returned nothing usable, or filled in fewer
  // than half the dimensions — a half-scored report is still partly guesswork.
  return { scores: out, estimated: got === 0 || got < keys.length / 2 };
}

function viewReport(){
  // If S.replay is set we are re-opening a saved report from Progress:
  // rebuild the context from storage and skip the API call entirely.
  var replay = S.replay;
  var sess = replay
    ? Object.assign({transcript:replay.transcript||[]}, replay.sessionRef||{mode:replay.mode})
    : S.session;
  var root = h('div',{cls:'mid', style:'padding-top:34px'});
  var pane = loadingPane('Reading the room back...','Scoring your delivery and learning your voice.');
  root.appendChild(pane);

  var mine = sess.transcript.map(function(t,i){ return {t:t,i:i}; }).filter(function(x){ return x.t.by==='me'; });
  var totW = mine.reduce(function(a,x){return a+(x.t.words||0);},0);
  var totF = mine.reduce(function(a,x){return a+((x.t.fillers&&x.t.fillers.n)||0);},0);
  var avgS = mine.length ? Math.round(mine.reduce(function(a,x){return a+(x.t.seconds||0);},0)/mine.length) : 0;
  var avgW = mine.length ? Math.round(totW/mine.length) : 0;
  var hits = {}; mine.forEach(function(x){ var hh=(x.t.fillers&&x.t.fillers.hits)||{}; for(var k in hh) hits[k]=(hits[k]||0)+hh[k]; });

  var kind = sess.mode==='interview' ? 'job interview' : 'workplace conversation';
  var text = sess.transcript.map(function(t){ return (t.by==='me'?'CANDIDATE':'INTERVIEWER')+': '+t.text; }).join('\n\n');
  var stats = { answers:mine.length, avgWords:avgW, avgSec:avgS, fillers:totF, totalWords:totW };
  var behav = !!sess.behavioural;
  var SCORE_KEYS = behav
    ? ['overall','situation','task','action','result','specificity','ownership','clarity']
    : ['overall','confidence','clarity','storytelling','executivePresence','technical','leadership','listening'];
  var liveCoach = {};

  // Nothing was said — there is nothing to score. Say so plainly.
  if (!mine.length){
    clear(root);
    root.appendChild(h('div',{cls:'center', style:'padding-top:90px;max-width:440px;margin:0 auto'},[
      h('h2',{style:'font-family:var(--serif);font-weight:500;font-size:26px;margin:0 0 8px', text:'No answers to score'}),
      h('p',{cls:'muted', style:'font-size:14.5px;line-height:1.55;margin:0 0 22px',
        text:'You left before answering anything. Give it at least one answer and I can score your delivery and coach the wording.'}),
      h('div',{cls:'row', style:'justify-content:center'},[
        btn('Back to setup',{icon:'redo', onclick:function(){ go('setup'); }}),
        btn('Studio',{variant:'ghost', onclick:function(){ go('home'); }})
      ])
    ]));
    return root;
  }

  // ONE call does scoring AND voice-profile learning (was two — halves free-tier usage).
  (replay ? Promise.resolve(replay.report) : callJSON({
    system: behav
      ? 'You are an elite interview coach reviewing a practice BEHAVIOURAL (competency) interview for a Big-4 Strategy and Transactions role. Score how well they used the STAR method across the whole session. Be specific and honest.\n'+
        STAR_RUBRIC+
        'Score each STAR letter as an average across all their answers. "specificity" = did they give real, concrete detail rather than generalities. "ownership" = did they say what THEY did rather than what the team did.\n'+
        'Return ONLY a JSON object. Every score is a WHOLE NUMBER from 0 to 100. Do not omit any key.\n'+
        '{"scores":{"overall":72,"situation":70,"task":55,"action":78,"result":45,"specificity":65,"ownership":60,"clarity":74},'+
        '"strengths":["...","...","..."],"improvements":["...","...","..."],"summary":"2-3 sentences on how they came across",'+
        '"starHabit":"the single STAR habit costing them the most marks, and the fix, in 2 sentences",'+
        '"weakestAnswers":["the questions where STAR broke down most"],'+
        '"voiceSummary":"one vivid sentence describing how THEY naturally talk","growthAreas":["...","...","..."],"favouritePhrases":["..."]}'
      : 'You are an elite communication coach reviewing a practice '+kind+'. Be specific, honest and encouraging.\n'+
        'Return ONLY a JSON object. Every score is a WHOLE NUMBER from 0 to 100. Do not omit any key.\n'+
        '{"scores":{"overall":75,"confidence":70,"clarity":80,"storytelling":65,"executivePresence":70,"technical":72,"leadership":68,"listening":74},'+
        '"strengths":["...","...","..."],"improvements":["...","...","..."],"summary":"2-3 sentences on how they came across",'+
        '"voiceSummary":"one vivid sentence describing how THEY naturally talk","growthAreas":["...","...","..."],"favouritePhrases":["..."]}',
    schema: behav
      ? '{"scores":{"overall":int,"situation":int,"task":int,"action":int,"result":int,"specificity":int,"ownership":int,"clarity":int},"strengths":[3 strings],"improvements":[3 strings],"summary":string,"starHabit":string,"weakestAnswers":[strings],"voiceSummary":string,"growthAreas":[3 strings],"favouritePhrases":[strings]}'
      : '{"scores":{"overall":int,"confidence":int,"clarity":int,"storytelling":int,"executivePresence":int,"technical":int,"leadership":int,"listening":int},"strengths":[3 strings],"improvements":[3 strings],"summary":string,"voiceSummary":string,"growthAreas":[3 strings],"favouritePhrases":[strings]}',
    messages:[{role:'user', content:'TRANSCRIPT:\n'+text+'\n\nMEASURED: '+mine.length+' answers, avg '+avgW+' words, avg '+avgS+'s each, '+totF+' filler words.'}],
    maxTokens:1600
  })).then(function(a){
    a = a || {};
    var norm = normalizeScores(a, stats, SCORE_KEYS);
    a.scores = norm.scores;
    a.estimated = norm.estimated;
    if (!a.summary) a.summary = norm.estimated
      ? 'Scores below are estimated from your pace, length and filler words — the model did not return its own scoring this time.'
      : 'Here is how that session came across.';
    if (!a.strengths || !a.strengths.length) a.strengths = ['You showed up and practised — that is the part most people skip.'];
    if (!a.improvements || !a.improvements.length) a.improvements = ['Add a concrete example with a number to your strongest answer.'];
    if (replay){
      a = a || {};
      a.scores = normalizeScores(a, stats, SCORE_KEYS).scores;
      clear(root);
      try { build(a); } catch(err){ root.appendChild(h('div',{cls:'err'},[h('span',{text:'Could not draw: '+err.message})])); }
      return;
    }
    // SAVE FIRST. Persistence must never depend on rendering succeeding —
    // that was the bug: a throw inside build() skipped the save entirely.
    var whoName = sess.mode==='interview'
      ? (INTERVIEWERS.filter(function(x){return x.id===sess.interviewerId;})[0]||{}).name
      : (SCENARIOS.filter(function(x){return x.id===sess.scenarioId;})[0]||{}).name;
    persistSession({date:Date.now(), mode:sess.mode, who:whoName+(behav?' · behavioural':''), overall:a.scores.overall, scores:a.scores,
      report:a, transcript:sess.transcript, stats:stats, coach:{}, behavioural:behav,
      sessionRef:{mode:sess.mode, interviewerId:sess.interviewerId, scenarioId:sess.scenarioId, behavioural:behav}});
    if (a.voiceSummary){
      saveProfile(Object.assign({}, S.profile||{}, {
        voiceSummary:a.voiceSummary, strengths:a.strengths, growthAreas:a.growthAreas,
        favouritePhrases:a.favouritePhrases, updatedAt:Date.now(), sessions:((S.profile&&S.profile.sessions)||0)+1
      }));
    }
    S.lastReport = a;
    clear(root);
    try { build(a); }
    catch(err){ root.appendChild(h('div',{cls:'err'},[h('span',{text:'Report saved, but could not draw: '+err.message})])); }
  }).catch(function(e){
    // Total failure (quota, key, network). Still SAVE and show the session.
    var norm = normalizeScores(null, stats, SCORE_KEYS);
    var whoName2 = sess.mode==='interview'
      ? (INTERVIEWERS.filter(function(x){return x.id===sess.interviewerId;})[0]||{}).name
      : (SCENARIOS.filter(function(x){return x.id===sess.scenarioId;})[0]||{}).name;
    persistSession({date:Date.now(), mode:sess.mode, who:whoName2, overall:norm.scores.overall, scores:norm.scores, estimated:true,
      report:{scores:norm.scores, estimated:true, summary:'Estimated locally.', strengths:[], improvements:[]},
      transcript:sess.transcript, stats:stats, coach:{},
      sessionRef:{mode:sess.mode, interviewerId:sess.interviewerId, scenarioId:sess.scenarioId}});
    clear(root);
    root.appendChild(h('div',{cls:'warn', style:'margin-bottom:18px'},[
      h('span',{text: (e && e.message) || 'The coach could not be reached, so scores below are estimated locally.'}),
      h('div',{cls:'row'},[
        btn('Try again',{variant:'subtle', icon:'redo', onclick:function(){ go('report'); }}),
        btn('Settings',{variant:'ghost', icon:'sliders', onclick:openSettings})
      ])
    ]));
    build({ scores:norm.scores, estimated:true,
      summary:'Estimated from your pace, answer length and filler words. Reconnect a model for full coaching.',
      strengths:['Session saved — your transcript is intact below.'],
      improvements:['Retry the report once your model connection works.'] });
  });

  function build(a){
    var s = a.scores;
    root.appendChild(stepper(3));
    root.appendChild(h('h2',{cls:'title', text:'Your coaching report'}));
    if (a.estimated) root.appendChild(h('div',{style:'display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);border:1px solid var(--goldDim);border-radius:20px;padding:3px 11px;margin-bottom:12px', text:'Estimated locally'}));
    root.appendChild(h('p',{cls:'quote muted', style:'font-size:15px;margin:0 0 26px;line-height:1.55', text:a.summary}));

    var top = h('div',{cls:'grid twocol', style:'grid-template-columns:minmax(0,220px) 1fr;align-items:start'});
    var oc = h('div',{cls:'card center', style:'padding:24px 20px'});
    oc.appendChild(eyebrow('Overall'));
    oc.appendChild(h('div',{style:'font-family:var(--serif);font-size:64px;color:var(--gold);line-height:1;margin:10px 0 2px', text:String(clamp(s.overall))}));
    oc.appendChild(h('div',{cls:'mono faint', style:'font-size:12px', text:'/ 100'}));
    oc.appendChild(h('div',{style:'height:1px;background:var(--line);margin:18px 0'}));
    var stats = h('div',{style:'display:flex;justify-content:space-around'});
    [['Answers',mine.length],['Avg words',avgW],['Fillers',totF]].forEach(function(p){
      stats.appendChild(h('div',{},[ h('div',{cls:'mono', style:'font-size:18px', text:String(p[1])}), h('div',{cls:'faint', style:'font-size:10.5px;margin-top:2px', text:p[0]}) ]));
    });
    oc.appendChild(stats); top.appendChild(oc);

    var bars = h('div',{cls:'card', style:'padding:20px 22px'});
    if (behav){
      bars.appendChild(h('div',{cls:'mono faint', style:'font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:11px', text:'STAR — averaged across your answers'}));
      [['S · Situation',s.situation],['T · Task',s.task],['A · Action',s.action],['R · Result',s.result]].forEach(function(r){
        var v = clamp(r[1]);
        bars.appendChild(scoreBar(r[0], v, v>=70?'var(--green)':(v>=45?'var(--gold)':'var(--rose)')));
      });
      bars.appendChild(h('div',{style:'height:1px;background:var(--lineSoft);margin:14px 0'}));
      [['Specificity',s.specificity,'var(--teal)'],['Ownership (I vs we)',s.ownership,'var(--gold)'],['Clarity',s.clarity,'var(--teal)']].forEach(function(r){
        bars.appendChild(scoreBar(r[0],r[1],r[2]));
      });
    } else {
      [['Confidence',s.confidence,'var(--gold)'],['Clarity',s.clarity,'var(--teal)'],['Storytelling',s.storytelling,'var(--gold)'],
       ['Executive presence',s.executivePresence,'var(--teal)'],['Technical communication',s.technical,'var(--gold)'],
       ['Leadership language',s.leadership,'var(--teal)'],['Listening',s.listening,'var(--gold)']].forEach(function(r){
        bars.appendChild(scoreBar(r[0],r[1],r[2]));
      });
    }
    top.appendChild(bars);
    root.appendChild(top);

    if (behav && a.starHabit){
      root.appendChild(h('div',{cls:'card', style:'padding:18px 20px;margin-top:16px;border-color:var(--goldDim)'},[
        h('div',{style:'display:flex;align-items:center;gap:8px;margin-bottom:9px'},[
          h('span',{html:icon('spark',15,'var(--gold)')}), eyebrow('The one habit to fix','gold') ]),
        h('p',{style:'margin:0;font-size:14.5px;line-height:1.6', text:a.starHabit})
      ]));
    }
    if (behav && a.weakestAnswers && a.weakestAnswers.length){
      root.appendChild(h('div',{style:'margin-top:14px'},[listCard('Where STAR broke down', a.weakestAnswers, 'gold')]));
    }

    var two = h('div',{cls:'grid twocol', style:'grid-template-columns:1fr 1fr;margin-top:16px'});
    two.appendChild(listCard("What's working", a.strengths, 'teal'));
    two.appendChild(listCard('Where to focus', a.improvements, 'gold'));
    root.appendChild(two);

    var fc = fillerChips(hits); if (fc) root.appendChild(fc);

    root.appendChild(h('h3',{cls:'sub', text:'Answer by answer'}));
    root.appendChild(h('p',{cls:'faint', style:'font-size:13.5px;margin:0 0 18px', text:'Open any answer for a version that sounds like you — with more structure and confidence.'}));
    var list = h('div',{style:'display:flex;flex-direction:column;gap:12px'});
    var coachStore = (replay && replay.coach) || liveCoach;
    mine.forEach(function(x, idx){
      var prev = null;
      for (var i=x.i-1;i>=0;i--){ if (sess.transcript[i].by==='them'){ prev = sess.transcript[i]; break; } }
      list.appendChild(coachCard({
        idx:idx, question: prev?prev.text:'Opening', answer:x.t.text,
        difficulty: prev && prev.difficulty, key:'a'+idx, store:coachStore,
        // STAR applies to behavioural interviews and to anything drawn from your
        // own question bank — those are the competency questions.
        star: !!sess.behavioural || (prev && prev.source === 'bank'),
        context: sess.behavioural ? 'a behavioural competency interview for a Big-4 Strategy and Transactions role'
                                  : (sess.mode==='interview' ? 'a job interview' : 'a workplace conversation')
      }));
    });
    root.appendChild(list);

    root.appendChild(h('div',{cls:'row', style:'margin-top:34px'},[
      btn('Take questions',{icon:'mic', onclick:function(){
        var qs = sess.transcript.filter(function(t){ return t.by==='them' && ['question','followup','challenge'].indexOf(t.kind)>=0; })
                                .map(function(t){ return t.text; });
        startDrill(qs, sess.mode==='interview' ? 'a job interview' : 'a workplace conversation');
      }}),
      btn('Practice again',{variant:'ghost', icon:'redo', onclick:function(){ go('setup'); }}),
      btn('See progress',{variant:'ghost', icon:'trend', onclick:function(){ go('progress'); }})
    ]));
  }


  return root;
}

/* ------------------------------ presentation: faces ------------------------------ */
function faceSVG(m, size){
  var p = audMood(m.mood);
  var mouths = { smile:'M22 43 Q32 50 42 43', grin:'M21 42 Q32 53 43 42', flat:'M25 45 H39',
    openSmall:'M28 44 Q32 49 36 44 Q32 45 28 44', frownSmall:'M25 47 Q32 42 39 47', smirk:'M25 46 Q33 47 39 42' };
  var hairPaths = ['M13 33 Q32 6 51 33 Q50 19 32 16 Q14 19 13 33Z',
                   'M14 31 Q22 13 32 13 Q42 13 50 31 Q43 23 32 23 Q21 23 14 31Z',
                   'M15 28 Q32 18 49 28 Q46 20 32 19 Q18 20 15 28Z'];
  var s = size||54;
  var out = '<svg viewBox="0 0 64 72" width="'+s+'" height="'+(s*72/64)+'" style="display:block">';
  out += '<circle cx="32" cy="34" r="19" fill="'+m.skin+'"/>';
  out += '<path d="'+hairPaths[m.hairStyle]+'" fill="'+m.hair+'"/>';
  out += '<g stroke="'+m.hair+'" stroke-width="1.7" stroke-linecap="round" transform="translate(0 '+p.brow+')">'+
         '<line x1="20" y1="28" x2="28" y2="'+(28+(p.tilt||0))+'"/>'+
         '<line x1="36" y1="'+(28+(p.tilt2||0))+'" x2="44" y2="28"/></g>';
  out += '<ellipse cx="24" cy="33" rx="4" ry="'+(4*p.lid)+'" fill="#fff"/>';
  out += '<ellipse cx="40" cy="33" rx="4" ry="'+(4*p.lid)+'" fill="#fff"/>';
  out += '<circle cx="'+(24+p.px*1.6)+'" cy="'+(33+p.py*1.5)+'" r="2" fill="#222"/>';
  out += '<circle cx="'+(40+p.px*1.6)+'" cy="'+(33+p.py*1.5)+'" r="2" fill="#222"/>';
  out += '<path d="'+(mouths[p.mouth]||mouths.flat)+'" fill="'+(p.mouth==='openSmall'?'#6b2f2f':'none')+'" stroke="#7a3b3b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>';
  if (p.phone) out += '<rect x="26" y="55" width="12" height="15" rx="2" fill="#0b0f14" stroke="#33404b"/><rect x="28" y="58" width="8" height="9" rx="1" fill="#6FB4A6" opacity="0.5"/>';
  if (p.notes) out += '<rect x="24" y="58" width="16" height="12" rx="1.5" fill="#e9e4d6"/><line x1="27" y1="62" x2="37" y2="62" stroke="#9a927e" stroke-width="1"/><line x1="27" y1="65" x2="35" y2="65" stroke="#9a927e" stroke-width="1"/>';
  if (p.q) out += '<text x="48" y="15" font-family="Georgia,serif" font-size="15" fill="#E0A75E">?</text>';
  out += '</svg>';
  return out;
}

/* ------------------------------ presentation: stage ------------------------------ */
function viewStage(){
  var cfg = S.pres;
  var at = AUD_TYPES.filter(function(a){return a.id===cfg.audType;})[0];
  var limit = cfg.mins*60;
  var root = h('div',{style:'padding-top:22px', cls:'mid'});

  var audience = [], tiles = {}, segs = [], elapsed = 0, running = false, overtime = false;
  var engSamples = [], energySamples = [], lastWords = 0, qaList = [], phase = 'talk';
  var recog=null, actx=null, raf=null, stream=null, timer=null, reactTimer=null, vstream=null;

  onLeave(function(){
    running=false;
    try{recog&&recog.stop();}catch(e){}
    if(timer) clearInterval(timer); if(reactTimer) clearInterval(reactTimer); if(raf) cancelAnimationFrame(raf);
    try{actx&&actx.close();}catch(e){}
    try{stream&&stream.getTracks().forEach(function(t){t.stop();});}catch(e){}
    try{vstream&&vstream.getTracks().forEach(function(t){t.stop();});}catch(e){}
    if(window.speechSynthesis) window.speechSynthesis.cancel();
  });

  // audience panel
  var audBox = h('div',{cls:'card', style:'padding:20px 18px 16px'});
  var engLabel = h('span',{cls:'mono muted', style:'font-size:11.5px', text:'engagement —'});
  audBox.appendChild(h('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px'},[

  var audRow = h('div',{cls:'aud'});
  audBox.appendChild(audRow);
  root.appendChild(audBox);

  var stageArea = h('div',{style:'margin-top:16px'});
  root.appendChild(stageArea);

  // build placeholder faces while roster loads
  audRow.appendChild(h('div',{cls:'faint', style:'font-size:13.5px;padding:12px', text:'Seating your audience...'}));

  callJSON({

    messages:[{role:'user', content:'Setting: '+at.name+'. Talk topic (from the speaker notes): '+(cfg.content.slice(0,240)||'a work update')+'.'}],
    maxTokens:700
  }).then(function(d){
    seat((d && d.members) ? d.members : null);
  }).catch(function(){ seat(null); });

  function seat(roster){
    if (!roster) { roster = []; for (var i=0;i<at.n;i++) roster.push({id:'m'+(i+1), name:'Guest '+(i+1), role:at.name}); }
    audience = roster.slice(0,at.n).map(function(m,i){
      return { id:m.id||('m'+(i+1)), name:m.name||('Guest '+(i+1)), role:m.role||'', mood:'neutral', thought:'',
               skin:SKINS[i%SKINS.length], hair:HAIRS[(i*2+1)%HAIRS.length], hairStyle:i%3 };
    });
    clear(audRow);
    audience.forEach(function(m,i){
      var faceBox = h('div',{cls:'tileface idle', html:faceSVG(m)});
      faceBox.style.animationDelay = (i*0.4)+'s';

      var md = h('div',{cls:'tmood', text:audMood(m.mood).l}); md.style.color = audMood(m.mood).c;
      var th = h('div',{cls:'tthought'});

      tiles[m.id] = {face:faceBox, mood:md, thought:th};
      audRow.appendChild(tile);
    });
    buildTalk();
  }
  function setMood(m, mood, thought){
    m.mood = mood; m.thought = thought||'';
    var t = tiles[m.id]; if(!t) return;
    var p = audMood(mood);
    t.face.innerHTML = faceSVG(m);
    t.face.className = 'tileface ' + (p.nod ? 'nod' : 'idle');
    t.face.style.borderColor = p.c;
    t.mood.textContent = p.l; t.mood.style.color = p.c;

  /* ---- talk phase ---- */

    em.appendChild(h('div',{cls:'track', style:'margin-top:10px'},[energyFill]));
