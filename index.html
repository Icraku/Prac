<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Room — AI Communication Simulator</title>
<style>
  :root{
    --bg:#0E141A; --panel:#161F29; --panel2:#1C2732; --panel3:#233040;
    --line:#2A3742; --lineSoft:#212C36; --ink:#EAEEF1; --muted:#93A0AC;
    --faint:#66727E; --gold:#E0A75E; --goldDim:#8a6a3f; --teal:#6FB4A6;
    --rose:#D98A7E; --green:#84C29B;
    --serif: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Times New Roman', serif;
    --sans: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--sans); color:var(--ink); min-height:100vh;
    background:radial-gradient(1100px 600px at 78% -8%, #16222e 0%, transparent 55%), var(--bg);
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--gold); color:#221604}
  :focus-visible{outline:2px solid var(--gold); outline-offset:2px; border-radius:8px}
  .wrap{max-width:1080px; margin:0 auto; padding:0 22px 80px}
  .narrow{max-width:800px; margin:0 auto}
  .mid{max-width:820px; margin:0 auto}

  /* top bar */
  .top{position:sticky; top:0; z-index:20; background:rgba(14,20,26,.85); backdrop-filter:blur(10px); border-bottom:1px solid var(--lineSoft)}
  .topin{max-width:1080px; margin:0 auto; padding:13px 22px; display:flex; align-items:center; justify-content:space-between}
  .brand{background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:11; padding:0; gap:11px}
  .logo{width:30px;height:30px;border-radius:9px;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center}
  .brandname{font-family:var(--serif); font-size:19px; color:var(--ink)}
  .nav{display:flex; gap:4px; align-items:center}
  .navbtn{background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:13.5px;padding:8px 14px;border-radius:9px;cursor:pointer}
  .navbtn.on{background:var(--panel2); color:var(--ink)}
  .iconbtn{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px 10px;border-radius:9px;display:flex;align-items:center}

  /* type */
  h1.hero{font-family:var(--serif); font-weight:500; font-size:clamp(32px,5.2vw,54px); line-height:1.07; margin:18px 0 0; letter-spacing:-.01em}
  h2.title{font-family:var(--serif); font-weight:500; font-size:32px; margin:20px 0 6px}
  h3.sub{font-family:var(--serif); font-weight:500; font-size:22px; margin:34px 0 8px}
  .lede{font-size:17px; color:var(--muted); line-height:1.6; margin:22px 0 0; max-width:560px}
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint)}
  .eyebrow.gold{color:var(--gold)} .eyebrow.teal{color:var(--teal)}
  .quote{font-family:var(--serif); font-style:italic}
  .muted{color:var(--muted)} .faint{color:var(--faint)} .mono{font-family:var(--mono)}

  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:var(--sans);font-size:14.5px;font-weight:500;
    padding:12px 20px;border-radius:12px;cursor:pointer;border:1px solid transparent;transition:filter .15s,transform .15s;background:var(--gold);color:#221604}
  .btn:hover:not(:disabled){filter:brightness(1.08); transform:translateY(-1px)}
  .btn:active:not(:disabled){transform:none}
  .btn:disabled{opacity:.45; cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--ink);border-color:var(--line)}
  .btn.subtle{background:var(--panel2);color:var(--ink);border-color:var(--line)}
  .btn.quiet{background:transparent;color:var(--muted);padding:8px 12px}
  .sq{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--ink)}
  .sq.gold{background:var(--gold);color:#221604;border-color:transparent}
  .sq.rec{background:var(--rose);color:#2a0f0a;border-color:transparent}
  .sq:disabled{opacity:.5;cursor:default}

  /* cards + inputs */
  .card{background:var(--panel); border:1px solid var(--line); border-radius:16px}
  .pad{padding:20px 22px}
  .cardhover{transition:border-color .18s, transform .18s}
  .cardhover:hover{border-color:var(--goldDim); transform:translateY(-2px)}
  .input{font-family:var(--sans);font-size:14.5px;color:var(--ink);background:var(--bg);border:1px solid var(--line);
    border-radius:12px;padding:13px 15px;width:100%;resize:vertical;outline:none;line-height:1.55}
  .input:focus{border-color:var(--gold)}
  .input::placeholder{color:var(--faint)}
  .grid{display:grid; gap:14px}
  .row{display:flex; gap:12px; flex-wrap:wrap; align-items:center}

  /* module cards */
  .mods{display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px; margin-top:26px}
  .mod{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;cursor:pointer;
    display:flex;flex-direction:column;gap:11px;min-height:172px;color:var(--ink)}
  .modicon{width:38px;height:38px;border-radius:11px;background:var(--panel2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
  .tag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;border-radius:20px;padding:3px 9px}
  .tag.live{color:var(--green);border:1px solid rgba(132,194,155,.3)}
  .modtitle{font-family:var(--serif);font-size:20px}

  /* pick cards */
  .picks{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; margin-top:12px}
  .pick{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 15px;cursor:pointer;
    display:flex;flex-direction:column;gap:8px;color:var(--ink)}
  .pick.on{background:var(--panel3);border-color:var(--gold)}
  .av{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:radial-gradient(circle at 32% 28%,var(--panel3),var(--panel2));
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:13px}
  .chip{background:var(--panel);cursor:pointer;border:1px solid var(--line);border-radius:12px;padding:11px 18px;color:var(--ink);text-align:left}
  .chip.on{background:var(--panel3);border-color:var(--gold)}
  .pill{font-size:12px;border-radius:20px;padding:4px 11px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);cursor:pointer}
  .pill.on{background:var(--gold);color:#221604}

  /* stepper */
  .step{display:flex;align-items:center;gap:10px}
  .dot{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line);color:var(--faint);
    display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px}
  .dot.on{border-color:var(--gold);color:var(--gold)}
  .dot.done{background:var(--gold);border-color:var(--gold);color:#221604}
  .steprule{width:26px;height:1px;background:var(--line)}

  /* room */
  .presence{display:flex;align-items:center;gap:16px;padding:16px 4px 18px;border-bottom:1px solid var(--lineSoft);
    position:sticky;top:57px;z-index:5;background:linear-gradient(to bottom,rgba(14,20,26,.96) 70%,rgba(14,20,26,0))}
  .ring{position:relative;width:76px;height:76px;flex-shrink:0}
  .ring .r1{position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--gold);opacity:.8}
  .ring .r2{position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--gold);opacity:0}
  .ring .face{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 32% 28%,var(--panel3),var(--panel));
    display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:26px;border:1px solid var(--line)}
  .ring.think .r1{animation:breathe 1.6s ease-in-out infinite}
  .ring.speak .r2{animation:pulse 1.8s ease-out infinite; opacity:1}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.09);opacity:.25}}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.35);opacity:0}}
  .log{max-height:calc(100vh - 340px);min-height:260px;overflow-y:auto;padding:22px 4px 12px;display:flex;flex-direction:column;gap:20px}
  .bub{max-width:82%; animation:fadeUp .35s cubic-bezier(.2,.7,.2,1) both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .bub.me{align-self:flex-end;max-width:78%}
  .bub.me .body{background:var(--panel3);border:1px solid var(--line);border-radius:14px 14px 4px 14px;padding:12px 15px;font-size:14.5px;line-height:1.55}
  .bub.them .body{background:var(--panel);border:1px solid var(--line);border-left:2px solid var(--gold);border-radius:4px 14px 14px 14px;
    padding:12px 15px;font-size:14.5px;line-height:1.55}
  .bub.them.silent .body{background:transparent;border-color:transparent;font-size:20px;letter-spacing:.3em;color:var(--faint);padding:2px 12px}
  .stage{font-size:12px;color:var(--faint);font-style:italic;margin-bottom:5px;font-family:var(--serif)}
  .who{text-align:right;font-size:10.5px;color:var(--faint);margin-top:4px;font-family:var(--mono)}
  .composer{border-top:1px solid var(--lineSoft);padding-top:16px;margin-top:6px}
  .composer .rel{position:relative}
  .composer textarea{padding-right:104px}
  .actions{position:absolute;right:10px;bottom:10px;display:flex;gap:8px}
  .thinking{display:flex;align-items:center;gap:8px;color:var(--faint);font-size:14px}
  .tdot{animation:dots 1.3s infinite}
  .tdot:nth-child(2){animation-delay:.18s} .tdot:nth-child(3){animation-delay:.36s}
  @keyframes dots{0%,80%,100%{opacity:.25}40%{opacity:1}}
  .err{background:rgba(217,138,126,.08);border:1px solid rgba(217,138,126,.3);border-radius:12px;padding:12px 14px;
    display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:13.5px;color:var(--rose)}
  .warn{background:rgba(224,167,94,.09);border:1px solid var(--goldDim);border-radius:12px;padding:12px 16px;
    display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;font-size:13.5px}

  /* meters + bars */
  .meters{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
  .meter{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .meterlab{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .meterval{font-family:var(--mono);font-size:20px;margin-top:6px}
  .track{height:6px;border-radius:6px;background:var(--lineSoft);overflow:hidden}
  .fill{height:100%;border-radius:6px;background:var(--gold);transition:width .9s cubic-bezier(.2,.7,.2,1)}
  .barrow{margin-bottom:13px}
  .barhead{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13.5px}

  /* audience */
  .aud{display:flex;flex-wrap:wrap;gap:18px;justify-content:center}
  .tile{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;min-width:0;width:96px}
  .tileface{border-radius:50%;padding:3px;border:2px solid var(--line);background:var(--panel);transition:border-color .5s}
  .tileface.nod{animation:nod 1.15s ease-in-out infinite}
  .tileface.idle{animation:floaty 4.5s ease-in-out infinite}
  @keyframes nod{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
  .tname{font-size:11.5px;max-width:92px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tmood{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase}
  .tthought{font-size:10.5px;color:var(--muted);line-height:1.3;font-style:italic;font-family:var(--serif);animation:pop .25s ease both}
  @keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
  .selfview{position:fixed;right:18px;bottom:18px;width:150px;height:112px;border-radius:12px;border:1px solid var(--line);
    object-fit:cover;transform:scaleX(-1);z-index:30;background:#000}

  /* transcript */
  .live{margin-top:14px;background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:16px 18px;
    max-height:180px;overflow-y:auto;font-size:14.5px;line-height:1.6}
  .over{color:var(--rose)}

  /* answers */
  .acard{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .ahead{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:15px 18px;display:flex;gap:13px;align-items:flex-start;color:var(--ink)}
  .clamp{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .abody{border-top:1px solid var(--lineSoft);padding:16px 18px;background:var(--bg)}
  .rewrite{background:var(--panel);border:1px solid var(--goldDim);border-radius:12px;padding:15px 17px}

  /* modal */
  .modal{position:fixed;inset:0;z-index:50;background:rgba(6,10,14,.66);backdrop-filter:blur(4px);
    display:flex;align-items:flex-start;justify-content:center;padding:56px 20px;overflow-y:auto}
  .sheet{width:100%;max-width:520px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px}
  .toggle{width:46px;height:26px;border-radius:20px;border:none;cursor:pointer;background:var(--panel3);position:relative;flex-shrink:0}
  .toggle.on{background:var(--gold)}
  .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--muted);transition:left .18s}
  .toggle.on .knob{left:23px;background:#221604}
  .hr{height:1px;background:var(--lineSoft);margin:20px 0}

  .spin{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .center{text-align:center}
  ::-webkit-scrollbar{width:9px} ::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px} ::-webkit-scrollbar-track{background:transparent}
  @media (max-width:640px){ .twocol{grid-template-columns:1fr !important} }
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>
</head>

  msg:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  quote:'<path d="M3 21c3 0 7-1 7-8V5H3v7h4c0 4-2 5-4 5z" fill="currentColor" stroke="none"/><path d="M14 21c3 0 7-1 7-8V5h-7v7h4c0 4-2 5-4 5z" fill="currentColor" stroke="none"/>',
  circle:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>',
  door:'<path d="M13 4h3a2 2 0 0 1 2 2v14"/><path d="M2 20h20"/><path d="M13 20V3.5a.5.5 0 0 0-.7-.5L6 5v15"/>',

};
function icon(name, size, color, cls){
  size = size || 18;
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+(color||'currentColor')+
    '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"'+(cls?' class="'+cls+'"':'')+'>'+(I[name]||'')+'</svg>';
}

/* ------------------------------ dom helper ------------------------------ */
function h(tag, props, kids){
  var el = document.createElement(tag);
  props = props || {};
  for (var k in props){
    var v = props[k];
    if (v === null || v === undefined || v === false) continue;
    if (k === 'cls') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k === 'text') el.textContent = v;
    else if (k === 'style') el.setAttribute('style', v);
    else if (k.slice(0,2) === 'on') el.addEventListener(k.slice(2), v);
    else el.setAttribute(k, v);
  }
  kids = kids === undefined ? [] : (Array.isArray(kids) ? kids : [kids]);
  kids.forEach(function(c){
    if (c === null || c === undefined || c === false) return;
    el.appendChild(typeof c === 'object' ? c : document.createTextNode(String(c)));
  });
  return el;
}
function btn(label, opts){
  opts = opts || {};
  var b = h('button', { cls:'btn '+(opts.variant||''), onclick:opts.onclick, disabled:opts.disabled });
  if (opts.icon) { var s = h('span',{html:icon(opts.icon,16)}); s.style.display='flex'; b.appendChild(s); }
  b.appendChild(document.createTextNode(label));
  return b;
}
function eyebrow(t, cls){ return h('div',{cls:'eyebrow '+(cls||''), text:t}); }
function clear(el){ while(el.firstChild) el.removeChild(el.firstChild); }

/* ------------------------------ data ------------------------------ */
var INTERVIEWERS = [
  {id:'amara',name:'Amara Okafor',title:'HR Recruiter',blurb:'Warm and encouraging. Culture, motivation, how you work with people.',
   persona:'You are warm, personable and encouraging. You care about motivation, values, teamwork and whether the person will thrive here. You put people at ease, but you gently probe when an answer stays on the surface.'},

function countFillers(text){
  var t = ' ' + (text||'').toLowerCase().replace(/[.,!?;:]/g,' ') + ' ';
  var n = 0, hits = {};
  FILLERS.forEach(function(f){
    var m = t.match(new RegExp('\\b'+f.replace(/ /g,'\\s+')+'\\b','g'));
    if (m) { n += m.length; hits[f] = (hits[f]||0)+m.length; }
  });
  return { n:n, hits:hits };
}

  try{
    var t = String(text).replace(/```json/gi,'').replace(/```/g,'').trim();
    var s = t.indexOf('{'), e = t.lastIndexOf('}');
    if (s >= 0 && e > s) t = t.slice(s, e+1);
    return JSON.parse(t);
  }catch(err){ return fb; }
}

function providerDef(id){ return PROVIDERS.filter(function(p){return p.id===id;})[0] || PROVIDERS[0]; }

// Builds the exact provider request. `wantJSON` turns on native JSON mode where
// the provider supports it — this is what makes reports reliable.
function buildRequest(system, messages, maxTokens, wantJSON){
  var st = S.settings, p = st.provider, key = (st.apiKey||'').trim(), url, headers, body;

  if (p === 'gemini'){
    url = 'https://generativelanguage.googleapis.com/v1beta/models/'+encodeURIComponent(st.model)+':generateContent?key='+encodeURIComponent(key);
    headers = {'Content-Type':'application/json'};
    var gen = { maxOutputTokens:maxTokens, temperature:0.9 };
    // On Gemini 2.5+/3.x, "thinking" tokens are billed against maxOutputTokens.
    // Left on, the model can spend the whole budget thinking and return EMPTY text.
    if (/gemini-(2\.5|3)/.test(st.model)) gen.thinkingConfig = { thinkingBudget: 0 };
    if (wantJSON) gen.responseMimeType = 'application/json';
    body = {
      systemInstruction:{ parts:[{text:system}] },
      contents: messages.map(function(m){ return { role: m.role==='assistant'?'model':'user', parts:[{text:m.content}] }; }),
      generationConfig: gen
    };
  } else if (p === 'anthropic'){
    url = 'https://api.anthropic.com/v1/messages';
    headers = {'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'};
    body = { model:st.model, max_tokens:maxTokens, temperature:0.9, system:system, messages:messages };
  } else {
    // groq + any OpenAI-compatible endpoint
    var base = (p === 'groq') ? 'https://api.groq.com/openai/v1' : (st.baseUrl||'').replace(/\/+$/,'');
    url = base.replace(/\/+$/,'') + '/chat/completions';
    headers = {'Content-Type':'application/json','Authorization':'Bearer '+key};
    body = { model:st.model, max_tokens:maxTokens, temperature:0.9,
      messages:[{role:'system',content:system}].concat(messages) };
    if (wantJSON) body.response_format = { type:'json_object' };
    if (/gemini/i.test(st.model)) body.reasoning_effort = 'none';
  }
  return { url:url, headers:headers, body:body };
}

function extractText(kind, d){
  if (kind === 'gemini'){
    var c = d.candidates && d.candidates[0];
    var parts = (c && c.content && c.content.parts) || [];
    var txt = parts.map(function(x){return x.text||'';}).join('').trim();
    if (!txt && c && c.finishReason === 'MAX_TOKENS') throw new Error('empty_maxtokens');
    return txt;
  }
  if (kind === 'anthropic') return (d.content||[]).map(function(b){return b.type==='text'?b.text:'';}).join('\n').trim();
  return ((d.choices && d.choices[0] && d.choices[0].message && d.choices[0].message.content) || '').trim();
}

function rawCall(opts){
  var maxTokens = opts.maxTokens || 1200;
  var st = S.settings, p = st.provider, key = (st.apiKey||'').trim();
  if (!key) return Promise.reject(new Error('no_key'));

  var def = providerDef(p);
  var req = buildRequest(opts.system, opts.messages, maxTokens, !!opts.wantJSON);
  var viaProxy = def.needsProxy || !!st.useProxy;

  var fetchP = viaProxy
    // Relay: the proxy forwards this verbatim. Key still comes from this browser.
    ? fetch(st.proxyUrl || '/api/chat', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ url:req.url, headers:req.headers, body:req.body }) })
    : fetch(req.url, { method:'POST',
        headers: Object.assign({}, req.headers, p==='anthropic' ? {'anthropic-dangerous-direct-browser-access':'true'} : {}),
        body: JSON.stringify(req.body) });

  return fetchP.then(chk).then(function(d){
    if (d && d.error && typeof d.error === 'string') throw new Error(d.error);
    return extractText(p, d);
  }).catch(function(e){
    if (e instanceof TypeError && viaProxy === false && def.needsProxy === false){
      var e2 = new Error('Could not reach '+p+' directly from the browser. Tick "Route via my proxy" in Settings and deploy api/chat.js (see README).');
      throw e2;
    }
    throw e;
  });
}
function chk(r){
  var ctype = r.headers.get('content-type') || '';
  if (!r.ok || ctype.indexOf('json') === -1){
    return r.text().then(function(t){
      var e;
      if (ctype.indexOf('text/html') !== -1){
        e = new Error('Got an HTML page back instead of an API reply (status '+r.status+'). Your proxy URL is not pointing at a live api/chat.js — deploy to Vercel and use that URL, or untick the proxy for Gemini/OpenRouter.');
      } else {
        e = new Error(friendlyErr(r.status, t));
      }
      e.status = r.status; throw e;
    });
  }
  return r.json();
}
function friendlyErr(status, body){
  if (status === 429) return 'Rate limit or daily quota reached. Wait a minute — or switch to a model with a bigger free allowance (try gemini-2.5-flash-lite) in Settings.';
  if (status === 401 || status === 403) return 'Your API key was rejected. Check it in Settings.';
  if (status === 404) return 'That model name was not found. Check the Model field in Settings.';
  if (status >= 500) return 'The provider had a server error. Try again in a moment.';
  return 'Request failed (' + status + '): ' + String(body).slice(0, 120);
}
var sleep = function(ms){ return new Promise(function(r){ setTimeout(r, ms); }); };

// Retries once on rate-limit / transient failure.
function callModel(opts){
  return rawCall(opts).catch(function(e){
    if (e.message === 'no_key') throw e;
    if (e.status === 429 || e.status >= 500 || e.message === 'empty_maxtokens'){
      return sleep(e.status === 429 ? 3000 : 800).then(function(){
        return rawCall(Object.assign({}, opts, { maxTokens: Math.min((opts.maxTokens||1200)*2, 8000) }));
      });
    }
    throw e;
  });
}

// Asks for JSON, and if the model returns prose or half-JSON, repairs it instead of
// silently falling back to a canned line.
function callJSON(opts){
  opts = Object.assign({}, opts, { wantJSON:true });
  return callModel(opts).then(function(raw){
    var d = parseJSON(raw, null);
    if (d) return d;
    if (!raw) throw new Error('The model returned an empty response. Try a different model in Settings.');
    // one repair attempt: hand the prose back and ask for strict JSON
    return callModel({
      system: 'Convert the text into exactly the JSON object described. Output ONLY the JSON, nothing else.\n\nSCHEMA:\n' + (opts.schema || opts.system),
      messages: [{ role:'user', content: raw.slice(0, 3000) }],
      maxTokens: opts.maxTokens || 1200
    }).then(function(fixed){
      var d2 = parseJSON(fixed, null);
      if (d2) return d2;
      var err = new Error('The model would not return valid JSON.');
      err.raw = raw;
      throw err;
    });
  });
}

/* ------------------------------ speech ------------------------------ */
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
function speak(text, voiceKey){
  if (!S.settings.hearThem || !window.speechSynthesis) return;
  try{
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    var v = VOICE[voiceKey] || [1,1];
    u.rate = v[0]; u.pitch = v[1];
    var voices = window.speechSynthesis.getVoices().filter(function(x){ return /en[-_]/i.test(x.lang); });
    if (voices.length) u.voice = voices[(voiceKey||'x').charCodeAt(0) % voices.length];
    window.speechSynthesis.speak(u);
    return u;
  }catch(e){}
}
function makeDictation(onText, onEnd){
  if (!SR) return null;
  var r = new SR();
  r.lang='en-US'; r.continuous=true; r.interimResults=true;
  var base='', fin='';
  r.setBase = function(t){ base = t ? t.trim()+' ' : ''; fin=''; };
  r.onresult = function(e){
    var itm='';
    for (var i=e.resultIndex;i<e.results.length;i++){
      var t = e.results[i][0].transcript;
      if (e.results[i].isFinal) fin += t+' '; else itm += t;
    }
    onText((base+fin+itm).replace(/\s+/g,' ').replace(/^\s+/,''), fin, itm, e);
  };
  r.onend = function(){ if(onEnd) onEnd(); };
  return r;
}

function buildSystem(sess, docCtx, closing){
  if (sess.mode === 'interview'){
    var p = INTERVIEWERS.filter(function(x){return x.id===sess.interviewerId;})[0];
    return 'You are '+p.name+', a '+p.title+'. '+p.persona+'\n\n'+
      'You are interviewing a candidate. Context from their CV and the job description:\n'+docCtx+'\n\n'+
      'Rules:\n- Stay fully in character as '+p.name+'. You are a real person, never an AI, never a coach. Never give feedback.\n'+
      '- One turn only. Speak 1-3 sentences. Ask ONE thing at a time.\n'+
      "- React to their LAST answer. If it's vague or unsupported, probe or challenge it. If it's strong, acknowledge briefly and go deeper.\n"+
      '- Reference earlier answers when natural. Occasionally take a note, pause, or mildly disagree.\n'+
      '- Sometimes say very little and let a silence invite them to keep talking.\n'+
      '- Move naturally across: motivation, real experience, a specific project, a challenge or failure, teamwork, and role-specific depth.\n'+
      (closing?'- This is the FINAL moment. Wrap up warmly, thank them, say you will be in touch. kind must be "closing".\n':'')+
      '\nOutput ONLY a JSON object, no other text:\n'+
      '{"speech": string, "mood": one of [warm,interested,impressed,neutral,thinking,skeptical,challenging,distracted], "action": short stage direction or "", "kind": one of [question,followup,challenge,reaction,silence,closing]}';
  }
  var s = SCENARIOS.filter(function(x){return x.id===sess.scenarioId;})[0];
  return 'You are '+s.counterpart+'. '+s.persona+'\n\n'+
    'This is a workplace conversation. The other person\'s goal is to '+s.goal+'.\n'+
    (sess.context ? 'Context they gave: '+sess.context+'\n' : '')+
    '\nRules:\n- Stay fully in character. You are a real colleague, never an AI, never a coach. Never give feedback.\n'+
    '- One turn only, 1-3 sentences. React genuinely to what they just said.\n'+
    "- Push back, ask clarifying questions, or show emotion when it fits. Don't make it easy if the moment calls for friction.\n"+
    (closing?'- Wrap the conversation up naturally now. kind must be "closing".\n':'')+
    '\nOutput ONLY a JSON object, no other text:\n'+
    '{"speech": string, "mood": one of [warm,interested,impressed,neutral,thinking,skeptical,challenging,distracted], "action": short stage direction or "", "kind": one of [question,followup,challenge,reaction,silence,closing]}';
}

    listening=false; micBtn.className='sq'; micBtn.innerHTML=icon('mic',16); listenBar.style.display='none';
    micNote.style.display='block';
    micNote.textContent = (ev.error==='not-allowed'||ev.error==='service-not-allowed')
      ? 'Microphone access was blocked. Allow it in your browser, or type instead.'
      : (ev.error==='audio-capture' ? 'No microphone found. Plug one in, or type your answer.' : 'Mic stopped. Tap to try again.');
  };
  micBtn.addEventListener('click', function(){
    if (!dict){ micNote.style.display='block'; micNote.textContent='Voice input needs Chrome or Edge. You can still type.'; return; }
    if (listening){ try{dict.stop();}catch(e){} return; }
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    micNote.style.display='none';
    dict.setBase(ta.value);
    try{ dict.start(); listening=true; micBtn.className='sq rec'; micBtn.innerHTML=icon('micOff',16); listenBar.style.display='flex'; }
    catch(e){ listening=false; }
  });
  onLeave(function(){ try{ dict && dict.stop(); }catch(e){} if(window.speechSynthesis) window.speechSynthesis.cancel(); });

  function qCount(){ return transcript.filter(function(t){ return t.by==='them' && ['question','followup','challenge'].indexOf(t.kind)>=0; }).length; }
  function setThinking(on){
    thinking = on;
    ta.disabled = on; micBtn.disabled = on; sendBtn.disabled = on || !ta.value.trim();
    ring.className = 'ring ' + (on ? 'think' : '');
    if (on){ moodTxt.textContent='thinking...'; if(thinkEl.parentNode!==log) log.appendChild(thinkEl); }
    else if (thinkEl.parentNode===log) log.removeChild(thinkEl);
    if (!on){ startedAt = Date.now(); seconds = 0; updTimer(); }
    counter.textContent = Math.min(qCount(), sess.plannedTurns)+' / '+sess.plannedTurns+' questions';
    log.scrollTop = log.scrollHeight;
  }
  function addBubble(entry){
    var b;
    if (entry.by==='me'){
      b = h('div',{cls:'bub me'},[ h('div',{cls:'body', text:entry.text}), h('div',{cls:'who', text:'you'}) ]);
    } else {
      var silent = entry.kind==='silence';
      b = h('div',{cls:'bub them'+(silent?' silent':'')});
      if (entry.action) b.appendChild(h('div',{cls:'stage', text: who.name.split(' ')[0]+' '+entry.action}));
      var body = h('div',{cls:'body', text:entry.text});
      if (!silent) body.style.borderLeftColor = moodOf(entry.mood).c;
      b.appendChild(body);
    }
    log.appendChild(b);
    if (thinkEl.parentNode===log) log.appendChild(thinkEl);
    log.scrollTop = log.scrollHeight;
  }
  function showErr(msg, retry){
    if (errEl && errEl.parentNode) errEl.parentNode.removeChild(errEl);
    errEl = h('div',{cls:'err'},[ h('span',{text:msg}), btn('Retry',{variant:'subtle', icon:'redo', onclick:function(){
      if(errEl.parentNode) errEl.parentNode.removeChild(errEl); retry();
    }}) ]);
    log.appendChild(errEl); log.scrollTop = log.scrollHeight;
  }

  function advance(closing){
    setThinking(true);
    var msgs = transcript.length
      ? transcript.map(function(t){ return { role: t.by==='me'?'user':'assistant', content:t.text }; })
      : [{role:'user', content:"I've just sat down. I'm ready to begin."}];
    if (msgs[0].role !== 'user') msgs.unshift({role:'user',content:"Let's begin."});
    callJSON({ system:buildSystem(sess,docCtx,closing), messages:msgs, maxTokens:800,
      schema:'{"speech":string,"mood":one of [warm,interested,impressed,neutral,thinking,skeptical,challenging,distracted],"action":string,"kind":one of [question,followup,challenge,reaction,silence,closing]}' })
    .then(function(t){
      // If the model gave prose instead of JSON, use the prose as speech rather than a canned line.
      if (typeof t === 'string') t = { speech:t, mood:'neutral', kind:'question' };
      if (!t.speech) throw new Error('The model returned no reply. Try another model in Settings.');
      var entry = {by:'them', text:t.speech, mood:t.mood||'neutral', action:t.action||'', kind:t.kind||'question'};
      transcript.push(entry);
      setThinking(false);
      moodTxt.textContent = moodOf(entry.mood).l.toLowerCase();
      moodDot.style.background = moodOf(entry.mood).c;
      addBubble(entry);
      if (entry.kind !== 'silence' && S.settings.hearThem){
        ring.className='ring speak';
        var u = speak(entry.text, who.id);
        if (u) u.onend = function(){ ring.className='ring'; };
      }
      if (closing) finish();
    })
    .catch(function(e){
      setThinking(false);
      showErr(e.message==='no_key' ? 'Add a model key in Settings to continue.' : (e.message || 'That did not go through.'), function(){ advance(closing); });
    });
  }

  function send(){
    var val = ta.value.trim();
    if (!val || thinking) return;
    try{ dict && dict.stop(); }catch(e){}
    var mine = {by:'me', text:val, seconds:seconds, words:words(val), fillers:countFillers(val)};
    transcript.push(mine); addBubble(mine);
    ta.value=''; sendBtn.disabled=true; updTimer();
    advance(qCount()+1 > sess.plannedTurns);
  }
  function finish(){
    if (ended) return;
    ended = true;
    try{ dict && dict.stop(); }catch(e){}
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    sess.transcript = transcript;
    go('report');
  }

  // open
  setThinking(true);
  (function(){
    if (sess.mode !== 'interview'){ advance(false); return; }
    callJSON({
      system:'Extract a concise interview brief from a CV and job description. Return ONLY JSON: {"candidateName":string,"role":string,"skills":[up to 6],"focusAreas":[up to 5],"notableProjects":[up to 3],"possibleWeakSpots":[up to 3]}.',
      messages:[{role:'user', content:'CV:\n'+sess.cv+'\n\nJOB DESCRIPTION:\n'+sess.jd+'\n\nCOMPANY:\n'+(sess.company||'n/a')}],
      maxTokens:900
    }).then(function(b){
      b = b || {};
      docCtx = 'Candidate: '+(b.candidateName||'the candidate')+'. Role: '+(b.role||'the role')+'.\n'+
        'Skills: '+((b.skills||[]).join(', '))+'.\nFocus areas: '+((b.focusAreas||[]).join(', '))+'.\n'+
        'Notable projects: '+((b.notableProjects||[]).join('; '))+'.\nWatch for: '+((b.possibleWeakSpots||[]).join('; '))+'.';
      advance(false);
    }).catch(function(e){
      // Brief is a nice-to-have — if it fails, still start the interview with the raw docs.
      if (e.message === 'no_key'){ setThinking(false); showErr('Add a model key in Settings to begin.', function(){ go('room'); }); return; }
      if (e.status === 429){ setThinking(false); showErr(e.message, function(){ go('room'); }); return; }
      docCtx = 'CV (excerpt): '+sess.cv.slice(0,900)+'\nJob description (excerpt): '+sess.jd.slice(0,700);
      advance(false);
    });
  })();

  return root;
}

/* ---- score handling -------------------------------------------------
   Models sometimes return scores as strings, nested oddly, or omit keys.
   Never lose a finished session over that: coerce what came back, and
   fill any gaps with a local estimate from the measured stats.        */
function localScores(st){
  // st: {answers, avgWords, avgSec, fillers, totalWords}
  var depth = Math.min(100, 30 + (st.avgWords||0) * 0.9);            // substance
  var fillRate = st.totalWords ? (st.fillers / st.totalWords) * 100 : 0;
  var clean = Math.max(30, 100 - fillRate * 12);                     // filler penalty
  var pace = st.avgSec ? Math.max(35, 100 - Math.abs(st.avgSec - 75) * 0.6) : 60;
  var base = Math.round((depth + clean + pace) / 3);
  return { overall:base, confidence:clean, clarity:base, storytelling:depth,
    executivePresence:base, technical:base, leadership:base, listening:base,
    structure:base, pacing:pace, engagement:base, vocalEnergy:base };
}
function normalizeScores(a, stats, keys){
  var src = (a && typeof a.scores === 'object' && a.scores) ? a.scores : (a || {});
  var fb = localScores(stats);
  var out = {}, got = 0;
  keys.forEach(function(k){
    var v = Number(src[k]);
    if (isFinite(v) && v > 0){ out[k] = clamp(v); got++; }
    else out[k] = clamp(fb[k] !== undefined ? fb[k] : fb.overall);
  });
  return { scores: out, estimated: got === 0 };
}

  var totF = mine.reduce(function(a,x){return a+((x.t.fillers&&x.t.fillers.n)||0);},0);
  var avgS = mine.length ? Math.round(mine.reduce(function(a,x){return a+(x.t.seconds||0);},0)/mine.length) : 0;
  var avgW = mine.length ? Math.round(totW/mine.length) : 0;
  var hits = {}; mine.forEach(function(x){ var hh=(x.t.fillers&&x.t.fillers.hits)||{}; for(var k in hh) hits[k]=(hits[k]||0)+hh[k]; });

  var kind = sess.mode==='interview' ? 'job interview' : 'workplace conversation';

    clear(root);
    root.appendChild(h('div',{cls:'center', style:'padding-top:90px;max-width:440px;margin:0 auto'},[
      h('h2',{style:'font-family:var(--serif);font-weight:500;font-size:26px;margin:0 0 8px', text:'No answers to score'}),
      h('p',{cls:'muted', style:'font-size:14.5px;line-height:1.55;margin:0 0 22px',

      h('div',{cls:'row', style:'justify-content:center'},[

  // ONE call does scoring AND voice-profile learning (was two — halves free-tier usage).
  callJSON({
    system:'You are an elite communication coach reviewing a practice '+kind+'. Be specific, honest and encouraging.\n'+
      'Return ONLY a JSON object. Every score is a WHOLE NUMBER from 0 to 100. Do not omit any key.\n'+
      '{"scores":{"overall":75,"confidence":70,"clarity":80,"storytelling":65,"executivePresence":70,"technical":72,"leadership":68,"listening":74},'+
      '"strengths":["...","...","..."],"improvements":["...","...","..."],"summary":"2-3 sentences on how they came across",'+
      '"voiceSummary":"one vivid sentence describing how THEY naturally talk","growthAreas":["...","...","..."],"favouritePhrases":["..."]}',
    schema:'{"scores":{"overall":int,"confidence":int,"clarity":int,"storytelling":int,"executivePresence":int,"technical":int,"leadership":int,"listening":int},"strengths":[3 strings],"improvements":[3 strings],"summary":string,"voiceSummary":string,"growthAreas":[3 strings],"favouritePhrases":[strings]}',
    messages:[{role:'user', content:'TRANSCRIPT:\n'+text+'\n\nMEASURED: '+mine.length+' answers, avg '+avgW+' words, avg '+avgS+'s each, '+totF+' filler words.'}],
    maxTokens:1600
  }).then(function(a){
    a = a || {};
    var norm = normalizeScores(a, stats, SCORE_KEYS);
    a.scores = norm.scores;
    a.estimated = norm.estimated;
    if (!a.summary) a.summary = norm.estimated
      ? 'Scores below are estimated from your pace, length and filler words — the model did not return its own scoring this time.'
      : 'Here is how that session came across.';
    if (!a.strengths || !a.strengths.length) a.strengths = ['You showed up and practised — that is the part most people skip.'];

      }));

        ]));
      });
    }
    function mini(label, text, color){
      return h('div',{},[
        h('div',{cls:'mono', style:'font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--'+color+');margin-bottom:5px', text:label}),
        h('div',{style:'font-size:13.5px;line-height:1.5', text:text})
      ]);
    }
    card.appendChild(head); card.appendChild(body);
    return card;
  }
  return root;
}

/* ------------------------------ presentation: faces ------------------------------ */
function faceSVG(m, size){
  var p = audMood(m.mood);
  var mouths = { smile:'M22 43 Q32 50 42 43', grin:'M21 42 Q32 53 43 42', flat:'M25 45 H39',
    openSmall:'M28 44 Q32 49 36 44 Q32 45 28 44', frownSmall:'M25 47 Q32 42 39 47', smirk:'M25 46 Q33 47 39 42' };
  var hairPaths = ['M13 33 Q32 6 51 33 Q50 19 32 16 Q14 19 13 33Z',
                   'M14 31 Q22 13 32 13 Q42 13 50 31 Q43 23 32 23 Q21 23 14 31Z',
                   'M15 28 Q32 18 49 28 Q46 20 32 19 Q18 20 15 28Z'];
  var s = size||54;
  var out = '<svg viewBox="0 0 64 72" width="'+s+'" height="'+(s*72/64)+'" style="display:block">';
  out += '<circle cx="32" cy="34" r="19" fill="'+m.skin+'"/>';
  out += '<path d="'+hairPaths[m.hairStyle]+'" fill="'+m.hair+'"/>';
  out += '<g stroke="'+m.hair+'" stroke-width="1.7" stroke-linecap="round" transform="translate(0 '+p.brow+')">'+
         '<line x1="20" y1="28" x2="28" y2="'+(28+(p.tilt||0))+'"/>'+
         '<line x1="36" y1="'+(28+(p.tilt2||0))+'" x2="44" y2="28"/></g>';
  out += '<ellipse cx="24" cy="33" rx="4" ry="'+(4*p.lid)+'" fill="#fff"/>';
  out += '<ellipse cx="40" cy="33" rx="4" ry="'+(4*p.lid)+'" fill="#fff"/>';
  out += '<circle cx="'+(24+p.px*1.6)+'" cy="'+(33+p.py*1.5)+'" r="2" fill="#222"/>';
  out += '<circle cx="'+(40+p.px*1.6)+'" cy="'+(33+p.py*1.5)+'" r="2" fill="#222"/>';
  out += '<path d="'+(mouths[p.mouth]||mouths.flat)+'" fill="'+(p.mouth==='openSmall'?'#6b2f2f':'none')+'" stroke="#7a3b3b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>';
  if (p.phone) out += '<rect x="26" y="55" width="12" height="15" rx="2" fill="#0b0f14" stroke="#33404b"/><rect x="28" y="58" width="8" height="9" rx="1" fill="#6FB4A6" opacity="0.5"/>';
  if (p.notes) out += '<rect x="24" y="58" width="16" height="12" rx="1.5" fill="#e9e4d6"/><line x1="27" y1="62" x2="37" y2="62" stroke="#9a927e" stroke-width="1"/><line x1="27" y1="65" x2="35" y2="65" stroke="#9a927e" stroke-width="1"/>';
  if (p.q) out += '<text x="48" y="15" font-family="Georgia,serif" font-size="15" fill="#E0A75E">?</text>';
  out += '</svg>';
  return out;
}

/* ------------------------------ presentation: stage ------------------------------ */
function viewStage(){
  var cfg = S.pres;
  var at = AUD_TYPES.filter(function(a){return a.id===cfg.audType;})[0];
  var limit = cfg.mins*60;
  var root = h('div',{style:'padding-top:22px', cls:'mid'});

  var audience = [], tiles = {}, segs = [], elapsed = 0, running = false, overtime = false;
  var engSamples = [], energySamples = [], lastWords = 0, qaList = [], phase = 'talk';
  var recog=null, actx=null, raf=null, stream=null, timer=null, reactTimer=null, vstream=null;

  onLeave(function(){
    running=false;
    try{recog&&recog.stop();}catch(e){}
    if(timer) clearInterval(timer); if(reactTimer) clearInterval(reactTimer); if(raf) cancelAnimationFrame(raf);
    try{actx&&actx.close();}catch(e){}
    try{stream&&stream.getTracks().forEach(function(t){t.stop();});}catch(e){}
    try{vstream&&vstream.getTracks().forEach(function(t){t.stop();});}catch(e){}
    if(window.speechSynthesis) window.speechSynthesis.cancel();
  });

  // audience panel
  var audBox = h('div',{cls:'card', style:'padding:20px 18px 16px'});
  var engLabel = h('span',{cls:'mono muted', style:'font-size:11.5px', text:'engagement —'});
  audBox.appendChild(h('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px'},[
    eyebrow(at.name+' · your audience','gold'), engLabel ]));
  var audRow = h('div',{cls:'aud'});
  audBox.appendChild(audRow);
  root.appendChild(audBox);

  var stageArea = h('div',{style:'margin-top:16px'});
  root.appendChild(stageArea);

  // build placeholder faces while roster loads
  audRow.appendChild(h('div',{cls:'faint', style:'font-size:13.5px;padding:12px', text:'Seating your audience...'}));

  callJSON({
    system:'Create a realistic audience for a talk. Return ONLY JSON: {"members":[{"id":"m1","name":"First Last","role":"short role"}]}. Exactly '+at.n+' members, varied names and roles fitting the setting.',
    messages:[{role:'user', content:'Setting: '+at.name+'. Talk topic (from the speaker notes): '+(cfg.content.slice(0,240)||'a work update')+'.'}],
    maxTokens:700
  }).then(function(d){
    seat((d && d.members) ? d.members : null);
  }).catch(function(){ seat(null); });

  function seat(roster){
    if (!roster) { roster = []; for (var i=0;i<at.n;i++) roster.push({id:'m'+(i+1), name:'Guest '+(i+1), role:at.name}); }
    audience = roster.slice(0,at.n).map(function(m,i){
      return { id:m.id||('m'+(i+1)), name:m.name||('Guest '+(i+1)), role:m.role||'', mood:'neutral', thought:'',
               skin:SKINS[i%SKINS.length], hair:HAIRS[(i*2+1)%HAIRS.length], hairStyle:i%3 };
    });
    clear(audRow);
    audience.forEach(function(m,i){
      var faceBox = h('div',{cls:'tileface idle', html:faceSVG(m)});
      faceBox.style.animationDelay = (i*0.4)+'s';
      faceBox.style.borderColor = audMood(m.mood).c;
      var nm = h('div',{cls:'tname', text:m.name});
      var md = h('div',{cls:'tmood', text:audMood(m.mood).l}); md.style.color = audMood(m.mood).c;
      var th = h('div',{cls:'tthought'});
      var tile = h('div',{cls:'tile'},[faceBox, nm, md, th]);
      tiles[m.id] = {face:faceBox, mood:md, thought:th};
      audRow.appendChild(tile);
    });
    buildTalk();
  }
  function setMood(m, mood, thought){
    m.mood = mood; m.thought = thought||'';
    var t = tiles[m.id]; if(!t) return;
    var p = audMood(mood);
    t.face.innerHTML = faceSVG(m);
    t.face.className = 'tileface ' + (p.nod ? 'nod' : 'idle');
    t.face.style.borderColor = p.c;
    t.mood.textContent = p.l; t.mood.style.color = p.c;
    t.thought.textContent = m.thought ? '"'+m.thought+'"' : '';
  }

  /* ---- talk phase ---- */
  var timeM, paceM, fillM, energyFill, liveBox, overBanner, startBtn, qaBtn, micNote2, camBtn, video=null;
  function buildTalk(){
    clear(stageArea);
    var meters = h('div',{cls:'meters'});
    timeM = meterEl('Time', mmss(0), '/ '+mmss(limit));
    paceM = meterEl('Pace', '—', 'wpm');
    fillM = meterEl('Fillers', '0', 'words');
    var em = h('div',{cls:'meter'});
    em.appendChild(h('div',{cls:'meterlab', text:'Voice energy'}));
    energyFill = h('div',{cls:'fill'}); energyFill.style.width='0%'; energyFill.style.background='var(--teal)'; energyFill.style.transition='width .1s';
    em.appendChild(h('div',{cls:'track', style:'margin-top:10px'},[energyFill]));
    meters.appendChild(timeM.el); meters.appendChild(paceM.el); meters.appendChild(fillM.el); meters.appendChild(em);
    stageArea.appendChild(meters);

    overBanner = h('div',{style:'display:none;margin-top:14px;background:rgba(217,138,126,.1);border:1px solid var(--rose);border-radius:12px;padding:11px 15px;font-size:13.5px;color:var(--rose)',
      text:'You are over your '+cfg.mins+'-minute limit — anything from here is marked in red. Wrap up or move to questions.'});
    stageArea.appendChild(overBanner);

    liveBox = h('div',{cls:'live'});
    liveBox.appendChild(h('span',{cls:'faint', text:'Your live transcript appears here as you speak.'}));
    stageArea.appendChild(liveBox);

    micNote2 = h('div',{style:'font-size:12px;color:var(--rose);margin-top:10px;display:none'});
    stageArea.appendChild(micNote2);
    if (!SR) stageArea.appendChild(h('div',{cls:'faint', style:'font-size:12px;margin-top:10px',
      text:'Live transcript & word-based reactions need Chrome or Edge. You can still rehearse against the timer; the audience will drift naturally.'}));

    startBtn = btn('Start presenting',{icon:'mic', onclick:toggleRun});
    qaBtn = btn('Take questions',{variant:'ghost', icon:'msg', onclick:startQA});
    camBtn = h('button',{cls:'btn ghost', style:'padding:9px 13px;font-size:13px', text:'self-view off', onclick:toggleCam});
    stageArea.appendChild(h('div',{cls:'row', style:'margin-top:16px'},[startBtn, qaBtn, camBtn]));
  }
  function meterEl(label, val, sub){
    var v = h('span',{cls:'meterval', text:val});
    var el = h('div',{cls:'meter'},[ h('div',{cls:'meterlab',text:label}),
      h('div',{style:'display:flex;align-items:baseline;gap:5px'},[v, sub?h('span',{cls:'faint',style:'font-size:11px',text:sub}):null]) ]);
    return {el:el, val:v};
  }
  function fullText(){ return segs.map(function(s){return s.text;}).join(' '); }

  function toggleRun(){
    if (running){ stopRun(); startBtn.lastChild.textContent='Resume'; return; }
    if (!navigator.mediaDevices){ micNote2.style.display='block'; micNote2.textContent='This browser cannot open the microphone. Try Chrome or Edge.'; return; }
    running = true; startBtn.lastChild.textContent = 'Pause';
    micNote2.style.display='none';
    startAudio(); startRecog();
    timer = setInterval(function(){
      elapsed++;
      timeM.val.textContent = mmss(elapsed);
      timeM.val.style.color = elapsed>=limit ? 'var(--rose)' : 'var(--ink)';
      if (elapsed>=limit && !overtime){ overtime = true; overBanner.style.display='block'; }
      if (elapsed>2){
        var w = words(fullText());
        var wpm = Math.round(w/(elapsed/60));
        paceM.val.textContent = w ? String(wpm) : '—';
        paceM.val.style.color = wpm>165 ? 'var(--rose)' : (w && wpm<105 ? 'var(--gold)' : 'var(--teal)');
      }
    },1000);
    reactTimer = setInterval(react, (S.settings.reactSecs || 30) * 1000);
    setTimeout(react, 5000);
  }
  function stopRun(){
    running = false;
    try{recog&&recog.stop();}catch(e){}
    if(timer) clearInterval(timer); if(reactTimer) clearInterval(reactTimer); if(raf) cancelAnimationFrame(raf);
    try{ if(actx){actx.close(); actx=null;} }catch(e){}
  }
  function startAudio(){
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(st){
      stream = st;
      var AC = window.AudioContext || window.webkitAudioContext; if(!AC) return;
      actx = new AC();
      var an = actx.createAnalyser(); an.fftSize = 512;
      actx.createMediaStreamSource(st).connect(an);
      var buf = new Uint8Array(an.fftSize);
      (function loop(){
        if (!actx) return;
        an.getByteTimeDomainData(buf);
        var sum=0; for(var i=0;i<buf.length;i++){ var v=(buf[i]-128)/128; sum+=v*v; }
        var rms = Math.sqrt(sum/buf.length);
        energySamples.push(rms);
        energyFill.style.width = Math.min(100, rms*280)+'%';
        energyFill.style.background = rms<0.02 ? 'var(--rose)' : 'var(--teal)';
        raf = requestAnimationFrame(loop);
      })();
    }).catch(function(){ micNote2.style.display='block'; micNote2.textContent='Microphone blocked. Allow it to track pace and energy.'; });
  }
  function startRecog(){
    if (!SR) return;
    recog = new SR(); recog.lang='en-US'; recog.continuous=true; recog.interimResults=true;
    var interimEl = null;
    recog.onresult = function(e){
      var itm='';
      for (var i=e.resultIndex;i<e.results.length;i++){
        var t = e.results[i][0].transcript;
        if (e.results[i].isFinal){
          segs.push({text:t.trim(), over: elapsed>=limit});
          renderLive();
          fillM.val.textContent = String(countFillers(fullText()).n);
        } else itm += t;
      }
      if (interimEl) interimEl.textContent = ' '+itm;
    };
    recog.onend = function(){ if (running){ try{recog.start();}catch(e){} } };
    try{ recog.start(); }catch(e){}
    function renderLive(){
      clear(liveBox);
      segs.forEach(function(s){ liveBox.appendChild(h('span',{cls: s.over?'over':'', text:s.text+' '})); });
      interimEl = h('span',{cls:'faint'}); liveBox.appendChild(interimEl);
      liveBox.scrollTop = liveBox.scrollHeight;
    }
    renderLive();
  }
  function react(){
    if (!audience.length) return;
    var full = fullText(), w = full ? full.split(/\s+/) : [];
    if (SR && w.length > lastWords + 12){
      lastWords = w.length;
      callJSON({
        system:'You simulate a live audience for a talk. Members:\n'+
          audience.map(function(m){return m.id+' = '+m.name+' ('+m.role+')';}).join('\n')+
          "\nGiven what the speaker just said, decide how each member is reacting RIGHT NOW. Be honest: rambling or unclear -> some get bored/confused/distracted; compelling and clear -> engaged/impressed/nodding. Vary reactions across people.\n"+
          'Return ONLY JSON: {"members":[{"id":"m1","mood":one of [engaged,curious,impressed,nodding,neutral,bored,confused,skeptical,distracted,notes],"thought":"under 7 words"}],"engagement":0-100}',
        messages:[{role:'user', content:'RECENT SPEECH: '+w.slice(-90).join(' ')+'\n\nSeconds in: '+elapsed+'. Give current reactions.'}],
        maxTokens:800
      }).then(function(d){
        if(!d||!d.members) return;
        var map={}; d.members.forEach(function(x){ map[x.id]=x; });
        audience.forEach(function(m){ if(map[m.id]) setMood(m, map[m.id].mood||m.mood, map[m.id].thought); });
        if (typeof d.engagement === 'number'){ engSamples.push(d.engagement); engLabel.textContent = 'engagement '+Math.round(d.engagement)+'%'; }
      }).catch(function(err){
        // A quota error mid-talk shouldn't kill the session — drift instead, and say so once.
        if (err && err.status === 429 && !window.__quotaWarned){
          window.__quotaWarned = true;
          micNote2.style.display='block';
          micNote2.textContent = 'Hit the model rate limit — the audience will keep drifting, but reactions have paused. Slow the reaction pace in Settings, or use gemini-2.5-flash-lite.';
        }
        drift();
      });
    } else {
      drift();
    }
  }
  function drift(){
    var pool = ['engaged','neutral','curious','nodding','bored','distracted','notes','neutral'];
    audience.forEach(function(m){ if (Math.random()<0.4) setMood(m, pool[Math.floor(Math.random()*pool.length)], ''); });
  }
  function toggleCam(){
    if (video){ try{vstream.getTracks().forEach(function(t){t.stop();});}catch(e){} document.body.removeChild(video); video=null; camBtn.textContent='self-view off'; return; }
    navigator.mediaDevices.getUserMedia({video:true}).then(function(st){
      vstream = st;
      video = h('video',{cls:'selfview', autoplay:'', muted:'', playsinline:''});
      video.srcObject = st; document.body.appendChild(video); camBtn.textContent='self-view on';
    }).catch(function(){ micNote2.style.display='block'; micNote2.textContent='Could not open the camera. It is optional.'; });
  }

  /* ---- Q&A ---- */
  function startQA(){
    stopRun(); phase='qa';
    clear(stageArea);
    var qBox = h('div',{cls:'card', style:'padding:18px 20px'});
    var qEyebrow = eyebrow('Questions · 1 of 3','gold');
    var qText = h('p',{style:'margin:10px 0 0;font-size:16px;line-height:1.5;font-family:var(--serif)'});
    qBox.appendChild(qEyebrow); qBox.appendChild(qText);
    stageArea.appendChild(qBox);

    var ans = h('textarea',{cls:'input', rows:3, placeholder:'Speak or type your answer...'});
    var mic = h('button',{cls:'sq', html:icon('mic',16)});
    var snd = h('button',{cls:'sq', html:icon('send',16), disabled:true});
    ans.addEventListener('input', function(){ snd.disabled = !ans.value.trim(); });
    ans.addEventListener('keydown', function(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); submit(); } });
    var box = h('div',{cls:'composer', style:'border:none;padding-top:14px'},[
      h('div',{cls:'rel'},[ans, h('div',{cls:'actions'},[mic,snd])])
    ]);
    stageArea.appendChild(box);
    stageArea.appendChild(h('div',{style:'margin-top:16px'},[ btn('End & get report',{variant:'ghost', onclick:function(){ finish(); }}) ]));

    var listening=false;
    var d2 = makeDictation(function(t){ ans.value=t; snd.disabled=!t.trim(); }, function(){ listening=false; mic.className='sq'; mic.innerHTML=icon('mic',16); });
    mic.addEventListener('click', function(){
      if (!d2) return;
      if (listening){ try{d2.stop();}catch(e){} return; }
      d2.setBase(ans.value); try{ d2.start(); listening=true; mic.className='sq rec'; mic.innerHTML=icon('micOff',16);}catch(e){}
    });
    onLeave(function(){ try{d2&&d2.stop();}catch(e){} });

    var asker = null;
    function ask(){
      qText.textContent = ''; snd.disabled=true;
      qEyebrow.textContent = 'Questions · '+(qaList.length+1)+' of 3';
      var loading = h('div',{cls:'faint', style:'display:flex;align-items:center;gap:9px;font-size:14px;margin-top:12px',
        html: icon('load',15,'currentColor','spin')+'<span style="margin-left:4px">Someone is thinking of a question...</span>'});
      qBox.appendChild(loading);
      asker = audience[Math.floor(Math.random()*audience.length)] || {name:'Someone', role:'audience', id:'m1'};
      Object.keys(tiles).forEach(function(k){ tiles[k].face.style.borderColor = audMood(audience.filter(function(m){return m.id===k;})[0].mood).c; });
      if (tiles[asker.id]) tiles[asker.id].face.style.borderColor = 'var(--gold)';
      callJSON({
        system:'You are '+asker.name+', '+asker.role+', in the audience after a talk. Ask ONE realistic, specific question about what was said - curious or challenging. Return ONLY JSON: {"question": string}.',
        messages:[{role:'user', content:'TALK:\n'+fullText().slice(0,2200)+(qaList.length?('\n\nAlready asked: '+qaList.map(function(q){return q.q;}).join(' | ')):'')}],
        maxTokens:500
      }).then(function(d){
        if (!d || !d.question) d = {question:'Can you say more about your main point?'};
        if (loading.parentNode) qBox.removeChild(loading);
        qText.textContent = ''; qText.appendChild(h('span',{style:'color:var(--gold)', text:asker.name+': '}));
        qText.appendChild(h('span',{text:'"'+d.question+'"'}));
        qText.dataset.q = d.question;
        if (S.settings.hearThem && window.speechSynthesis){ try{ window.speechSynthesis.speak(new SpeechSynthesisUtterance(d.question)); }catch(e){} }
      }).catch(function(){
        if (loading.parentNode) qBox.removeChild(loading);
        qText.textContent = 'Can you expand on your main point?'; qText.dataset.q = 'Can you expand on your main point?';
      });
    }
    function submit(){
      if (!ans.value.trim()) return;
      try{d2&&d2.stop();}catch(e){}
      qaList.push({ by:asker?asker.name:'Audience', q:qText.dataset.q||'', a:ans.value.trim() });
      ans.value=''; snd.disabled=true;
      if (qaList.length>=3) finish(); else ask();
    }
    snd.addEventListener('click', submit);
    ask();
  }

  function finish(){
    stopRun();
    var mean = energySamples.length ? energySamples.reduce(function(a,b){return a+b;},0)/energySamples.length : 0;
    var variance = energySamples.length ? Math.sqrt(energySamples.reduce(function(a,b){return a+(b-mean)*(b-mean);},0)/energySamples.length) : 0;
    var full = fullText();
    S.pres = Object.assign({}, cfg, {
      audName: at.name, transcript: full, segs: segs, durationSec: elapsed,
      wpm: elapsed>2 ? Math.round(words(full)/(elapsed/60)) : 0,
      fillers: countFillers(full),
      overtimeWords: segs.filter(function(s){return s.over;}).reduce(function(a,s){return a+words(s.text);},0),
      energyVariety: variance, engSamples: engSamples,
      avgEngagement: engSamples.length ? Math.round(engSamples.reduce(function(a,b){return a+b;},0)/engSamples.length) : 60,
      qa: qaList
    });
    go('presReport');
  }

  return root;
}

/* ------------------------------ presentation: report ------------------------------ */
function viewPresReport(){
  var p = S.pres;
  var root = h('div',{cls:'mid', style:'padding-top:34px'});
  root.appendChild(loadingPane('Reading the room back...','Scoring your delivery.'));

  var PKEYS = ['overall','clarity','structure','pacing','engagement','confidence','vocalEnergy'];
  var pstats = { answers:1, avgWords:words(p.transcript||''), avgSec:p.durationSec||0,
    fillers:(p.fillers&&p.fillers.n)||0, totalWords:words(p.transcript||'') };

  if (!p.transcript || !words(p.transcript)){
    clear(root);
    root.appendChild(h('div',{cls:'center', style:'padding-top:90px;max-width:440px;margin:0 auto'},[
      h('h2',{style:'font-family:var(--serif);font-weight:500;font-size:26px;margin:0 0 8px', text:'No talk to score'}),
      h('p',{cls:'muted', style:'font-size:14.5px;line-height:1.55;margin:0 0 22px',
        text:'Nothing was captured. Present out loud (Chrome or Edge, mic allowed) and the audience will react and score you.'}),
      h('div',{cls:'row', style:'justify-content:center'},[ btn('Back',{icon:'redo', onclick:function(){ go('pres'); }}), btn('Studio',{variant:'ghost', onclick:function(){ go('home'); }}) ])
    ]));
    return root;
  }

  callJSON({
    system:'You are an elite presentation coach. Review a rehearsed talk honestly and specifically.\n'+
      'Return ONLY a JSON object. Every score is a WHOLE NUMBER from 0 to 100. Do not omit any key.\n'+
      '{"scores":{"overall":72,"clarity":75,"structure":68,"pacing":70,"engagement":74,"confidence":71,"vocalEnergy":66},'+
      '"strongest":"one specific strength","weakest":"one specific thing to fix","suggestions":["...","...","..."],"summary":"2-3 sentences"}',
    schema:'{"scores":{"overall":int,"clarity":int,"structure":int,"pacing":int,"engagement":int,"confidence":int,"vocalEnergy":int},"strongest":string,"weakest":string,"suggestions":[3 strings],"summary":string}',
    messages:[{role:'user', content:'TALK TRANSCRIPT:\n'+(p.transcript||'(no speech captured)')+
      '\n\nMEASURED: '+(Math.round(p.durationSec/60*10)/10)+' min spoken, target '+p.mins+' min, '+p.wpm+' wpm, '+
      (p.fillers.n||0)+' fillers, '+p.overtimeWords+' words over time, avg audience engagement '+p.avgEngagement+'%.'}],
    maxTokens:1400
  }).then(function(a){
    a = a || {};
    var norm = normalizeScores(a, pstats, PKEYS);
    a.scores = norm.scores; a.estimated = norm.estimated;
    if (!a.summary) a.summary = norm.estimated ? 'Scores below are estimated from your pace, length and fillers.' : 'Here is how it landed.';
    if (!a.strongest) a.strongest = 'You rehearsed the whole thing out loud — that alone builds fluency.';
    if (!a.weakest) a.weakest = 'Tighten the opening so the first 20 seconds state your point.';
    if (!a.suggestions || !a.suggestions.length) a.suggestions = ['Open with your conclusion.','Pause instead of using filler words.','Watch your pace in the middle third.'];
    clear(root); build(a);
    saveSessions((S.sessions||[]).concat([{date:Date.now(), mode:'presentation', who:p.audName||'Presentation', overall:a.scores.overall}]).slice(-40));
  }).catch(function(e){
    var norm = normalizeScores(null, pstats, PKEYS);
    clear(root);
    root.appendChild(h('div',{cls:'warn', style:'margin-bottom:18px'},[
      h('span',{text:(e && e.message) || 'The coach could not be reached, so scores below are estimated locally.'}),
      h('div',{cls:'row'},[ btn('Try again',{variant:'subtle', icon:'redo', onclick:function(){ go('presReport'); }}), btn('Settings',{variant:'ghost', icon:'sliders', onclick:openSettings}) ])
    ]));
    build({ scores:norm.scores, estimated:true, summary:'Estimated from pace, length and fillers. Reconnect a model for full coaching.',
      strongest:'Your talk is saved below.', weakest:'Retry the report once your model connection works.',
      suggestions:['Open with your conclusion.','Replace filler words with pauses.','Keep an even pace.'] });
  });

  function build(a){
    var s = a.scores;
    root.appendChild(eyebrow('Presentation report','gold'));
    root.appendChild(h('h2',{cls:'title', text:'How it landed'}));
    if (a.estimated) root.appendChild(h('div',{style:'display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);border:1px solid var(--goldDim);border-radius:20px;padding:3px 11px;margin-bottom:12px', text:'Estimated locally'}));
    root.appendChild(h('p',{cls:'quote muted', style:'font-size:15px;margin:0 0 24px;line-height:1.55', text:a.summary}));

    var top = h('div',{cls:'grid twocol', style:'grid-template-columns:minmax(0,220px) 1fr;align-items:start'});
    var oc = h('div',{cls:'card center', style:'padding:24px 20px'});
    oc.appendChild(eyebrow('Overall'));
    oc.appendChild(h('div',{style:'font-family:var(--serif);font-size:64px;color:var(--gold);line-height:1;margin:10px 0 2px', text:String(clamp(s.overall))}));
    oc.appendChild(h('div',{cls:'mono faint', style:'font-size:12px', text:'/ 100'}));
    oc.appendChild(h('div',{style:'height:1px;background:var(--line);margin:18px 0'}));
    var stats = h('div',{style:'display:flex;justify-content:space-around'});
    [['Spoken',(Math.round(p.durationSec/60*10)/10)+'m'],['Pace',p.wpm],['Over',p.overtimeWords+'w']].forEach(function(r){
      stats.appendChild(h('div',{},[ h('div',{cls:'mono',style:'font-size:18px',text:String(r[1])}), h('div',{cls:'faint',style:'font-size:10.5px;margin-top:2px',text:r[0]}) ]));
    });
    oc.appendChild(stats); top.appendChild(oc);
    var bars = h('div',{cls:'card', style:'padding:20px 22px'});
    [['Clarity',s.clarity,'var(--teal)'],['Structure',s.structure,'var(--gold)'],['Pacing',s.pacing,'var(--teal)'],
     ['Audience engagement',s.engagement,'var(--gold)'],['Confidence',s.confidence,'var(--teal)'],['Vocal energy',s.vocalEnergy,'var(--gold)']].forEach(function(r){
      bars.appendChild(scoreBar(r[0],r[1],r[2]));
    });
    top.appendChild(bars); root.appendChild(top);

    if (p.engSamples && p.engSamples.length>1){
      var ec = h('div',{cls:'card', style:'padding:20px 24px;margin-top:16px'});
      ec.appendChild(eyebrow('Audience engagement through the talk'));
      ec.appendChild(h('div',{style:'margin-top:14px', html:sparkSVG(p.engSamples)}));
      root.appendChild(ec);
    }

    var two = h('div',{cls:'grid twocol', style:'grid-template-columns:1fr 1fr;margin-top:16px'});
    two.appendChild(listCard('Strongest moment',[a.strongest],'teal'));
    two.appendChild(listCard('Biggest fix',[a.weakest],'gold'));
    root.appendChild(two);
    root.appendChild(h('div',{style:'margin-top:14px'},[listCard('Try next time', a.suggestions,'gold')]));

    var fc = fillerChips(p.fillers.hits); if (fc) root.appendChild(fc);

    if (p.qa && p.qa.length){
      root.appendChild(h('h3',{cls:'sub', text:'Your Q&A'}));
      var qs = h('div',{style:'display:flex;flex-direction:column;gap:10px'});
      p.qa.forEach(function(q){
        qs.appendChild(h('div',{cls:'card', style:'padding:14px 16px'},[
          h('div',{style:'font-size:13.5px;color:var(--gold);margin-bottom:6px', text:q.by+': "'+q.q+'"'}),
          h('div',{style:'font-size:14px;line-height:1.5', text:q.a})
        ]));
      });
      root.appendChild(qs);
    }
    root.appendChild(h('div',{cls:'row', style:'margin-top:30px'},[
      btn('Present again',{icon:'redo', onclick:function(){ go('pres'); }}),
      btn('See progress',{variant:'ghost', icon:'trend', onclick:function(){ go('progress'); }})
    ]));
  }
  return root;
}

/* ------------------------------ progress ------------------------------ */
function sparkSVG(data){
  var w=640,hh=110,pad=14;
  var max=Math.max.apply(null,data.concat([100])), min=Math.min.apply(null,data.concat([0]));
  var range=Math.max(max-min,1);
  var pts = data.map(function(d,i){
    var x = pad + (i*(w-pad*2))/Math.max(data.length-1,1);
    var y = hh - pad - ((d-min)/range)*(hh-pad*2);
    return [x,y];
  });
  var path = pts.map(function(pt,i){ return (i?'L':'M')+pt[0].toFixed(1)+' '+pt[1].toFixed(1); }).join(' ');
  var area = path+' L '+pts[pts.length-1][0].toFixed(1)+' '+(hh-pad)+' L '+pts[0][0].toFixed(1)+' '+(hh-pad)+' Z';
  var dots = pts.map(function(pt){ return '<circle cx="'+pt[0]+'" cy="'+pt[1]+'" r="'+(data.length>20?2:3.4)+'" fill="#0E141A" stroke="#E0A75E" stroke-width="1.8"/>'; }).join('');
  return '<svg viewBox="0 0 '+w+' '+hh+'" style="width:100%;height:auto;display:block">'+
    '<defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E0A75E" stop-opacity="0.28"/><stop offset="100%" stop-color="#E0A75E" stop-opacity="0"/></linearGradient></defs>'+
    '<path d="'+area+'" fill="url(#sg)"/><path d="'+path+'" fill="none" stroke="#E0A75E" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+dots+'</svg>';
}
function viewProgress(){
  var root = h('div',{cls:'mid', style:'padding-top:40px'});
  if (!S.profile && (!S.sessions || !S.sessions.length)){
    root.appendChild(h('div',{cls:'center', style:'max-width:440px;margin:50px auto'},[
      h('div',{style:'width:56px;height:56px;border-radius:16px;border:1px solid var(--line);background:var(--panel);display:flex;align-items:center;justify-content:center;margin:0 auto 20px',
        html:icon('trend',24,'var(--gold)')}),
      h('h2',{style:'font-family:var(--serif);font-weight:500;font-size:26px;margin:0 0 8px', text:'Nothing to track yet'}),
      h('p',{cls:'muted', style:'font-size:14.5px;line-height:1.55;margin:0 0 22px', text:"Finish a session and I'll build your communication profile and plot your scores over time."}),
      btn('Start a session',{icon:'play', onclick:function(){ go('home'); }})
    ]));
    return root;
  }
  root.appendChild(eyebrow('Progress & profile','gold'));
  root.appendChild(h('h2',{cls:'title', style:'margin-bottom:26px', text:"How you're growing"}));

  if (S.profile && S.profile.voiceSummary){
    var pc = h('div',{cls:'card', style:'padding:22px 24px;margin-bottom:16px'});
    pc.appendChild(h('div',{style:'display:flex;align-items:flex-start;gap:12px'},[
      h('span',{style:'flex-shrink:0;margin-top:2px', html:icon('quote',20,'var(--gold)')}),
      h('p',{cls:'quote', style:'margin:0;font-size:19px;line-height:1.5', text:S.profile.voiceSummary})
    ]));
    var cols = h('div',{style:'display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:22px'});
    cols.appendChild(profList('Strengths', S.profile.strengths, 'teal'));
    cols.appendChild(profList('Growth areas', S.profile.growthAreas, 'gold'));
    if (S.profile.favouritePhrases && S.profile.favouritePhrases.length){
      var ph = h('div');
      ph.appendChild(h('div',{cls:'mono faint', style:'font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px', text:'Phrases you reach for'}));
      var pr = h('div',{cls:'row', style:'gap:6px'});
      S.profile.favouritePhrases.forEach(function(x){ pr.appendChild(h('span',{style:'font-size:12px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:4px 11px', text:'"'+x+'"'})); });
      ph.appendChild(pr); cols.appendChild(ph);
    }
    pc.appendChild(cols); root.appendChild(pc);
  }

  if (S.sessions && S.sessions.length){
    var trend = S.sessions.map(function(s){return s.overall;});
    var avg = Math.round(trend.reduce(function(a,b){return a+b;},0)/trend.length);
    var sc = h('div',{cls:'card', style:'padding:22px 24px'});
    sc.appendChild(h('div',{style:'display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px'},[
      eyebrow('Overall score over time'),
      h('span',{cls:'mono muted', style:'font-size:12px', text:'avg '+avg+' · '+trend.length+' session'+(trend.length>1?'s':'')})
    ]));
    sc.appendChild(h('div',{html:sparkSVG(trend)}));
    var list = h('div',{style:'margin-top:22px;display:flex;flex-direction:column'});
    S.sessions.slice().reverse().forEach(function(s,i){
      var color = s.mode==='interview' ? 'var(--gold)' : (s.mode==='presentation' ? 'var(--green)' : 'var(--teal)');
      var row = h('div',{style:'display:flex;align-items:center;justify-content:space-between;padding:10px 0'+(i?';border-top:1px solid var(--lineSoft)':'')},[
        h('div',{style:'display:flex;align-items:center;gap:12px;min-width:0'},[
          h('span',{style:'width:8px;height:8px;border-radius:50%;background:'+color+';flex-shrink:0'}),
          h('span',{style:'font-size:14px', text:s.who||s.mode}),
          h('span',{cls:'mono faint', style:'font-size:12px', text:new Date(s.date).toLocaleDateString(undefined,{month:'short',day:'numeric'})})
        ]),
        h('span',{cls:'mono', style:'font-size:15px;color:var(--gold)', text:String(s.overall)})
      ]);
      list.appendChild(row);
    });
    sc.appendChild(list); root.appendChild(sc);
  }
  root.appendChild(h('div',{style:'margin-top:26px'},[ btn('New session',{icon:'play', onclick:function(){ go('home'); }}) ]));
  return root;
}
function profList(label, items, color){
  var d = h('div');
  if (!items || !items.length) return d;
  d.appendChild(h('div',{cls:'mono faint', style:'font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px', text:label}));
  var ul = h('ul',{style:'margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:8px'});
  items.forEach(function(it){
    ul.appendChild(h('li',{style:'font-size:13.5px;line-height:1.45;display:flex;gap:8px'},[
      h('span',{style:'color:var(--'+color+');flex-shrink:0', text:'—'}), h('span',{text:it}) ]));
  });
  d.appendChild(ul); return d;
}

/* ------------------------------ boot ------------------------------ */
(function boot(){
  S.profile = store.get('room:profile', null);
  S.sessions = store.get('room:sessions', []);
  var saved = store.get('room:settings', null);
  if (saved) S.settings = Object.assign(S.settings, saved);
  if (window.speechSynthesis) { try { window.speechSynthesis.getVoices(); } catch(e){} }
  render();
})();
</script>
