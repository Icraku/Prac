<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Room — AI Communication Simulator</title>
<style>
  :root{
    --bg:#0E141A; --panel:#161F29; --panel2:#1C2732; --panel3:#233040;
    --line:#2A3742; --lineSoft:#212C36; --ink:#EAEEF1; --muted:#93A0AC;
    --faint:#66727E; --gold:#E0A75E; --goldDim:#8a6a3f; --teal:#6FB4A6;
    --rose:#D98A7E; --green:#84C29B;
    --serif: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Times New Roman', serif;
    --sans: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--sans); color:var(--ink); min-height:100vh;
    background:radial-gradient(1100px 600px at 78% -8%, #16222e 0%, transparent 55%), var(--bg);
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--gold); color:#221604}
  :focus-visible{outline:2px solid var(--gold); outline-offset:2px; border-radius:8px}
  .wrap{max-width:1080px; margin:0 auto; padding:0 22px 80px}
  .narrow{max-width:800px; margin:0 auto}
  .mid{max-width:820px; margin:0 auto}

  /* top bar */
  .top{position:sticky; top:0; z-index:20; background:rgba(14,20,26,.85); backdrop-filter:blur(10px); border-bottom:1px solid var(--lineSoft)}
  .topin{max-width:1080px; margin:0 auto; padding:13px 22px; display:flex; align-items:center; justify-content:space-between}
  .brand{background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:11; padding:0; gap:11px}
  .logo{width:30px;height:30px;border-radius:9px;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center}
  .brandname{font-family:var(--serif); font-size:19px; color:var(--ink)}
  .nav{display:flex; gap:4px; align-items:center}
  .navbtn{background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:13.5px;padding:8px 14px;border-radius:9px;cursor:pointer}
  .navbtn.on{background:var(--panel2); color:var(--ink)}
  .iconbtn{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px 10px;border-radius:9px;display:flex;align-items:center}

  /* type */
  h1.hero{font-family:var(--serif); font-weight:500; font-size:clamp(32px,5.2vw,54px); line-height:1.07; margin:18px 0 0; letter-spacing:-.01em}
  h2.title{font-family:var(--serif); font-weight:500; font-size:32px; margin:20px 0 6px}
  h3.sub{font-family:var(--serif); font-weight:500; font-size:22px; margin:34px 0 8px}
  .lede{font-size:17px; color:var(--muted); line-height:1.6; margin:22px 0 0; max-width:560px}
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint)}
  .eyebrow.gold{color:var(--gold)} .eyebrow.teal{color:var(--teal)}
  .quote{font-family:var(--serif); font-style:italic}
  .muted{color:var(--muted)} .faint{color:var(--faint)} .mono{font-family:var(--mono)}

  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:var(--sans);font-size:14.5px;font-weight:500;
    padding:12px 20px;border-radius:12px;cursor:pointer;border:1px solid transparent;transition:filter .15s,transform .15s;background:var(--gold);color:#221604}
  .btn:hover:not(:disabled){filter:brightness(1.08); transform:translateY(-1px)}
  .btn:active:not(:disabled){transform:none}
  .btn:disabled{opacity:.45; cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--ink);border-color:var(--line)}
  .btn.subtle{background:var(--panel2);color:var(--ink);border-color:var(--line)}
  .btn.quiet{background:transparent;color:var(--muted);padding:8px 12px}
  .sq{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--ink)}
  .sq.gold{background:var(--gold);color:#221604;border-color:transparent}
  .sq.rec{background:var(--rose);color:#2a0f0a;border-color:transparent}
  .sq:disabled{opacity:.5;cursor:default}

  /* cards + inputs */
  .card{background:var(--panel); border:1px solid var(--line); border-radius:16px}
  .pad{padding:20px 22px}
  .cardhover{transition:border-color .18s, transform .18s}
  .cardhover:hover{border-color:var(--goldDim); transform:translateY(-2px)}
  .input{font-family:var(--sans);font-size:14.5px;color:var(--ink);background:var(--bg);border:1px solid var(--line);
    border-radius:12px;padding:13px 15px;width:100%;resize:vertical;outline:none;line-height:1.55}
  .input:focus{border-color:var(--gold)}
  .input::placeholder{color:var(--faint)}
  .grid{display:grid; gap:14px}
  .row{display:flex; gap:12px; flex-wrap:wrap; align-items:center}

  /* module cards */
  .mods{display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px; margin-top:26px}
  .mod{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;cursor:pointer;
    display:flex;flex-direction:column;gap:11px;min-height:172px;color:var(--ink)}
  .modicon{width:38px;height:38px;border-radius:11px;background:var(--panel2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
  .tag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;border-radius:20px;padding:3px 9px}
  .tag.live{color:var(--green);border:1px solid rgba(132,194,155,.3)}
  .modtitle{font-family:var(--serif);font-size:20px}

  /* pick cards */
  .picks{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; margin-top:12px}
  .pick{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 15px;cursor:pointer;
    display:flex;flex-direction:column;gap:8px;color:var(--ink)}
  .pick.on{background:var(--panel3);border-color:var(--gold)}
  .av{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:radial-gradient(circle at 32% 28%,var(--panel3),var(--panel2));
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:13px}
  .chip{background:var(--panel);cursor:pointer;border:1px solid var(--line);border-radius:12px;padding:11px 18px;color:var(--ink);text-align:left}
  .chip.on{background:var(--panel3);border-color:var(--gold)}
  .pill{font-size:12px;border-radius:20px;padding:4px 11px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);cursor:pointer}
  .pill.on{background:var(--gold);color:#221604}

  /* stepper */
  .step{display:flex;align-items:center;gap:10px}
  .dot{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line);color:var(--faint);
    display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px}
  .dot.on{border-color:var(--gold);color:var(--gold)}
  .dot.done{background:var(--gold);border-color:var(--gold);color:#221604}
  .steprule{width:26px;height:1px;background:var(--line)}

  /* room */
  .presence{display:flex;align-items:center;gap:16px;padding:16px 4px 18px;border-bottom:1px solid var(--lineSoft);
    position:sticky;top:57px;z-index:5;background:linear-gradient(to bottom,rgba(14,20,26,.96) 70%,rgba(14,20,26,0))}
  .ring{position:relative;width:76px;height:76px;flex-shrink:0}
  .ring .r1{position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--gold);opacity:.8}
  .ring .r2{position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--gold);opacity:0}
  .ring .face{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 32% 28%,var(--panel3),var(--panel));
    display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:26px;border:1px solid var(--line)}
  .ring.think .r1{animation:breathe 1.6s ease-in-out infinite}
  .ring.speak .r2{animation:pulse 1.8s ease-out infinite; opacity:1}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.09);opacity:.25}}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.35);opacity:0}}
  .log{max-height:calc(100vh - 340px);min-height:260px;overflow-y:auto;padding:22px 4px 12px;display:flex;flex-direction:column;gap:20px}
  .bub{max-width:82%; animation:fadeUp .35s cubic-bezier(.2,.7,.2,1) both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .bub.me{align-self:flex-end;max-width:78%}
  .bub.me .body{background:var(--panel3);border:1px solid var(--line);border-radius:14px 14px 4px 14px;padding:12px 15px;font-size:14.5px;line-height:1.55}
  .bub.them .body{background:var(--panel);border:1px solid var(--line);border-left:2px solid var(--gold);border-radius:4px 14px 14px 14px;
    padding:12px 15px;font-size:14.5px;line-height:1.55}
  .bub.them.silent .body{background:transparent;border-color:transparent;font-size:20px;letter-spacing:.3em;color:var(--faint);padding:2px 12px}
  .stage{font-size:12px;color:var(--faint);font-style:italic;margin-bottom:5px;font-family:var(--serif)}
  .who{text-align:right;font-size:10.5px;color:var(--faint);margin-top:4px;font-family:var(--mono)}
  .composer{border-top:1px solid var(--lineSoft);padding-top:16px;margin-top:6px}
  .composer .rel{position:relative}
  .composer textarea{padding-right:104px}
  .actions{position:absolute;right:10px;bottom:10px;display:flex;gap:8px}
  .thinking{display:flex;align-items:center;gap:8px;color:var(--faint);font-size:14px}
  .tdot{animation:dots 1.3s infinite}
  .tdot:nth-child(2){animation-delay:.18s} .tdot:nth-child(3){animation-delay:.36s}
  @keyframes dots{0%,80%,100%{opacity:.25}40%{opacity:1}}
  .err{background:rgba(217,138,126,.08);border:1px solid rgba(217,138,126,.3);border-radius:12px;padding:12px 14px;
    display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:13.5px;color:var(--rose)}
  .warn{background:rgba(224,167,94,.09);border:1px solid var(--goldDim);border-radius:12px;padding:12px 16px;
    display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;font-size:13.5px}

  /* meters + bars */
  .meters{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
  .meter{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .meterlab{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .meterval{font-family:var(--mono);font-size:20px;margin-top:6px}
  .track{height:6px;border-radius:6px;background:var(--lineSoft);overflow:hidden}
  .fill{height:100%;border-radius:6px;background:var(--gold);transition:width .9s cubic-bezier(.2,.7,.2,1)}
  .barrow{margin-bottom:13px}
  .barhead{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13.5px}

  /* audience */
  .aud{display:flex;flex-wrap:wrap;gap:18px;justify-content:center}
  .tile{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;min-width:0;width:96px}
  .tileface{border-radius:50%;padding:3px;border:2px solid var(--line);background:var(--panel);transition:border-color .5s}
  .tileface.nod{animation:nod 1.15s ease-in-out infinite}
  .tileface.idle{animation:floaty 4.5s ease-in-out infinite}
  @keyframes nod{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
  .tname{font-size:11.5px;max-width:92px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tmood{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase}
  .tthought{font-size:10.5px;color:var(--muted);line-height:1.3;font-style:italic;font-family:var(--serif);animation:pop .25s ease both}
  @keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
  .selfview{position:fixed;right:18px;bottom:18px;width:150px;height:112px;border-radius:12px;border:1px solid var(--line);
    object-fit:cover;transform:scaleX(-1);z-index:30;background:#000}

  /* transcript */
  .live{margin-top:14px;background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:16px 18px;
    max-height:180px;overflow-y:auto;font-size:14.5px;line-height:1.6}
  .over{color:var(--rose)}

  /* answers */
  .acard{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .ahead{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:15px 18px;display:flex;gap:13px;align-items:flex-start;color:var(--ink)}
  .clamp{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .abody{border-top:1px solid var(--lineSoft);padding:16px 18px;background:var(--bg)}
  .rewrite{background:var(--panel);border:1px solid var(--goldDim);border-radius:12px;padding:15px 17px}

  /* modal */
  .modal{position:fixed;inset:0;z-index:50;background:rgba(6,10,14,.66);backdrop-filter:blur(4px);
    display:flex;align-items:flex-start;justify-content:center;padding:56px 20px;overflow-y:auto}
  .sheet{width:100%;max-width:520px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px}
  .toggle{width:46px;height:26px;border-radius:20px;border:none;cursor:pointer;background:var(--panel3);position:relative;flex-shrink:0}
  .toggle.on{background:var(--gold)}
  .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--muted);transition:left .18s}
  .toggle.on .knob{left:23px;background:#221604}
  .hr{height:1px;background:var(--lineSoft);margin:20px 0}

  .spin{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* live question rail (room + stage) */
  .roomgrid{display:grid;grid-template-columns:1fr 250px;gap:18px;align-items:start}
  @media(max-width:860px){.roomgrid{grid-template-columns:1fr}.qrail2{position:static !important;max-height:none !important}}
  .qrail2{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;position:sticky;top:78px;max-height:calc(100vh - 110px);overflow-y:auto}
  .qlog{display:flex;gap:9px;padding:9px 4px;border-bottom:1px solid var(--lineSoft)}
  .qlog:last-child{border-bottom:none}
  .qlog .n{font-family:var(--mono);font-size:10.5px;color:var(--faint);flex-shrink:0;margin-top:2px;width:16px}
  .qlog .t{font-size:12.3px;line-height:1.4;color:var(--muted)}
  .diff{display:inline-block;font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;
    border-radius:20px;padding:2px 7px;margin-top:5px;border:1px solid}
  .diff.easy{color:var(--green);border-color:rgba(132,194,155,.4)}
  .diff.medium{color:var(--gold);border-color:var(--goldDim)}
  .diff.hard{color:var(--rose);border-color:rgba(217,138,126,.45)}
  .src{display:inline-block;font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;
    border-radius:20px;padding:2px 7px;border:1px solid var(--line);color:var(--teal);border-color:rgba(111,180,166,.4)}
  .src.fu{color:var(--faint);border-color:var(--line)}
  .bankrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 12px;
    background:var(--panel2);border:1px solid var(--line);border-radius:11px;margin-bottom:8px}
  .drop{border:1.5px dashed var(--line);border-radius:12px;padding:18px;text-align:center;transition:border-color .15s,background .15s}
  .drop.hot{border-color:var(--gold);background:rgba(224,167,94,.06)}
  .archrow{cursor:pointer;border-radius:9px;padding:10px 8px;transition:background .15s}
  .archrow:hover{background:var(--panel2)}
  /* question drill */
  .drill{display:grid;grid-template-columns:280px 1fr;gap:18px;align-items:start}
  @media(max-width:780px){.drill{grid-template-columns:1fr}}
  .qrail{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;position:sticky;top:78px;max-height:calc(100vh - 110px);overflow-y:auto}
  .qitem{display:flex;gap:10px;padding:10px 11px;border-radius:9px;border:1px solid transparent;margin-bottom:6px;cursor:default;transition:background .2s,border-color .2s}
  .qitem.on{background:var(--panel3);border-color:var(--gold)}
  .qitem.done{opacity:.72}
  .qnum{font-family:var(--mono);font-size:11px;color:var(--faint);flex-shrink:0;margin-top:2px;width:18px}
  .qitem.on .qnum{color:var(--gold)}
  .qtext{font-size:12.7px;line-height:1.4}
  .qstate{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;margin-top:4px}
  .bigq{font-family:var(--serif);font-size:22px;line-height:1.4;margin:0 0 4px}
  .count{font-family:var(--mono);font-size:60px;color:var(--gold);line-height:1;text-align:center;padding:16px 0}
  .reclamp{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12.5px;color:var(--rose)}
  .recdot{width:9px;height:9px;border-radius:50%;background:var(--rose);animation:blink 1.1s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  .lvl{height:5px;border-radius:5px;background:var(--lineSoft);overflow:hidden;margin-top:10px}
  .lvlfill{height:100%;background:var(--rose);width:0%;transition:width .08s}
  .center{text-align:center}
  ::-webkit-scrollbar{width:9px} ::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px} ::-webkit-scrollbar-track{background:transparent}
  @media (max-width:640px){ .twocol{grid-template-columns:1fr !important} }
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>
</head>
<body>
<div id="app"></div>
<noscript><p style="color:#EAEEF1;font-family:sans-serif;padding:40px">This app needs JavaScript enabled.</p></noscript>

<script>
/* =====================================================================

   Vanilla JS. Zero dependencies. No CDN, no fonts, no network at load.
   ===================================================================== */
"use strict";

/* ------------------------------ icons ------------------------------ */
var I = {
  mic:'<rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M12 17v4"/><path d="M8 21h8"/>',

  sliders:'<line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>',
  x:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
  back:'<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>',
  play:'<polygon points="6 3 20 12 6 21 6 3" fill="currentColor" stroke="none"/>',
  redo:'<polyline points="1 4 1 10 7 10"/><path d="M3.5 15a9 9 0 1 0 2.1-9.4L1 10"/>',
  chev:'<polyline points="6 9 12 15 18 9"/>',
  clock:'<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/>',
  wand:'<path d="M15 4V2"/><path d="M8 9h2"/><path d="M20 9h2"/><path d="M17.8 11.8 19 13"/><path d="M17.8 6.2 19 5"/><path d="m3 21 9-9"/><path d="M12.2 6.2 11 5"/>',
  trend:'<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>',

/* ---- Whisper transcription (Groq, free tier) ---------------------------
   The browser's built-in speech API is fast but inaccurate. Whisper Large v3
   is the real open-source model; Groq serves it free (2,000 req/day, 25MB max).
   Audio needs multipart/form-data, which the JSON relay can't carry — so we
   send base64 and api/chat.js rebuilds the form server-side.              */
function whisperKey(){
  var st = S.settings;
  return (st.whisperKey||'').trim() || (st.provider==='groq' ? (st.apiKey||'').trim() : '');
}
function canWhisper(){ return !!whisperKey(); }

function blobToBase64(blob){
  return new Promise(function(res, rej){
    var r = new FileReader();
    r.onload = function(){ res(String(r.result).split(',')[1]); };
    r.onerror = function(){ rej(new Error('Could not read the recording.')); };
    r.readAsDataURL(blob);
  });
}
function transcribe(blob){
  var key = whisperKey();
  if (!key) return Promise.reject(new Error('Add a Groq key in Settings to use Whisper.'));
  if (!blob || blob.size < 1200) return Promise.resolve('');
  if (blob.size > 24*1024*1024) return Promise.reject(new Error('That recording is over the 25MB free-tier limit.'));
  return blobToBase64(blob).then(function(b64){
    return fetch(S.settings.proxyUrl || '/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        audio:b64, mime: blob.type || 'audio/webm', filename:'answer.webm',
        url:'https://api.groq.com/openai/v1/audio/transcriptions',
        headers:{ Authorization: 'Bearer ' + key },
        model: S.settings.whisperModel || 'whisper-large-v3-turbo'
      })
    });
  }).then(chk).then(function(d){
    if (d && d.error) throw new Error(typeof d.error==='string' ? d.error : JSON.stringify(d.error).slice(0,160));
    return ((d && d.text) || '').trim();
  });
}

function makeRecorder(){
  var mr = null, chunks = [], stream = null;
  function pickMime(){
    var opts = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
    for (var i=0;i<opts.length;i++){
      if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(opts[i])) return opts[i];
    }
    return '';
  }
  return {
    supported: function(){ return !!(window.MediaRecorder && navigator.mediaDevices && navigator.mediaDevices.getUserMedia); },
    start: function(){
      return navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){
        stream = s; chunks = [];
        var m = pickMime();
        mr = m ? new MediaRecorder(s, {mimeType:m}) : new MediaRecorder(s);
        mr.ondataavailable = function(e){ if (e.data && e.data.size) chunks.push(e.data); };
        mr.start(250);
      });
    },
    stop: function(){
      return new Promise(function(res){
        if (!mr || mr.state === 'inactive'){ res(null); return; }
        mr.onstop = function(){
          var b = new Blob(chunks, {type: (mr && mr.mimeType) || 'audio/webm'});
          try{ stream.getTracks().forEach(function(t){ t.stop(); }); }catch(e){}
          mr = null; res(b);
        };
        try{ mr.stop(); }catch(e){ res(null); }
      });
    },
    cancel: function(){
      try{ mr && mr.state !== 'inactive' && mr.stop(); }catch(e){}
      try{ stream && stream.getTracks().forEach(function(t){ t.stop(); }); }catch(e){}
      mr = null;
    }
  };
}

      midEl.appendChild(h('p',{cls:'muted', style:'font-size:14px;line-height:1.55;margin:0',
        text: canWhisper()
          ? 'Whisper (open-source, via Groq) will transcribe your voice — far more accurate than the browser recogniser.'
          : 'No Groq key found, so answers will be typed instead. Add one in Settings to record your voice with Whisper.' }));
      ctrl.appendChild(btn('Take questions',{icon:'play', onclick:begin}));
      ctrl.appendChild(btn('Skip to rewrites',{variant:'ghost', onclick:finish}));
      return;
    }
    if (phase === 'count'){
      qEl.textContent = items[idx].q;
      var n = 3;
      var c = h('div',{cls:'count', text:'3'});
      midEl.appendChild(c);
      midEl.appendChild(h('div',{cls:'center faint', style:'font-size:12.5px', text:'get ready…'}));
      countTimer = setInterval(function(){
        n--;
        if (n <= 0){ clearInterval(countTimer); countTimer = null; startRec(); }
        else c.textContent = String(n);
      }, 1000);
      return;
    }
    if (phase === 'rec'){
      qEl.textContent = items[idx].q;
      midEl.appendChild(h('div',{cls:'reclamp'},[h('span',{cls:'recdot'}), h('span',{text:'recording — speak your answer'})]));
      var lf = h('div',{cls:'lvlfill'});
      midEl.appendChild(h('div',{cls:'lvl'},[lf]));
      meter(lf);
      ctrl.appendChild(btn(idx >= items.length-1 ? 'Stop & finish' : 'Stop & next',{icon:'micOff', onclick:stopAndNext}));
      ctrl.appendChild(btn('Skip',{variant:'quiet', onclick:function(){ items[idx].status='skipped'; rec.cancel(); next(); }}));
      noteEl.textContent = pending ? pending+' answer(s) transcribing in the background…' : '';
      return;
    }
    if (phase === 'type'){
      qEl.textContent = items[idx].q;
      var ta = h('textarea',{cls:'input', rows:4, placeholder:'Type what you would say…'});
      midEl.appendChild(ta);
      ctrl.appendChild(btn(idx >= items.length-1 ? 'Save & finish' : 'Save & next',{icon:'send', onclick:function(){
        items[idx].text = ta.value.trim();
        items[idx].status = items[idx].text ? 'done' : 'skipped';
        next();
      }}));
      return;
    }
    if (phase === 'wait'){
      qEl.textContent = 'Finishing transcription…';
      midEl.appendChild(h('div',{cls:'center'},[
        h('div',{html:icon('load',26,'var(--gold)','spin')}),
        h('p',{cls:'faint', style:'font-size:13px;margin-top:12px', text: pending+' answer(s) still transcribing. This takes a few seconds.'})
      ]));
      return;
    }
  }

  function meter(fill){
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){
      micStream = s;
      var AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;
      actx = new AC();
      var an = actx.createAnalyser(); an.fftSize = 256;
      actx.createMediaStreamSource(s).connect(an);
      var buf = new Uint8Array(an.fftSize);
      (function loop(){
        if (!actx || phase !== 'rec') return;
        an.getByteTimeDomainData(buf);
        var sum=0; for (var i=0;i<buf.length;i++){ var v=(buf[i]-128)/128; sum+=v*v; }
        fill.style.width = Math.min(100, Math.sqrt(sum/buf.length)*280) + '%';
        lvlRaf = requestAnimationFrame(loop);
      })();
    }).catch(function(){});
  }

  function begin(){ idx = 0; step(); }
  function step(){
    if (idx >= items.length){ finishWait(); return; }
    phase = 'count'; drawRail(); setStage();
    if (rows[idx] && rows[idx].scrollIntoView) rows[idx].scrollIntoView({block:'nearest'});
  }
  function startRec(){
    if (!canWhisper() || !rec.supported()){ phase = 'type'; items[idx].status='recording'; drawRail(); setStage(); return; }
    rec.start().then(function(){
      phase = 'rec'; items[idx].status='recording'; drawRail(); setStage();
    }).catch(function(){
      noteEl.textContent = 'Microphone blocked — type your answer instead.';
      phase = 'type'; setStage();
    });
  }
  function stopAndNext(){
    var myIdx = idx;
    items[myIdx].status = 'transcribing'; pending++;
    try{ actx && actx.close(); actx = null; }catch(e){}
    try{ micStream && micStream.getTracks().forEach(function(t){t.stop();}); }catch(e){}
    rec.stop().then(function(blob){
      // fire-and-forget: transcribe while the user answers the next question
      transcribe(blob).then(function(txt){
        items[myIdx].text = txt; items[myIdx].status = txt ? 'done' : 'skipped';
      }).catch(function(e){
        items[myIdx].status = 'failed'; items[myIdx].error = e.message;
      }).then(function(){
        pending--; drawRail();
        if (phase === 'wait' && pending === 0) finish();
        else if (phase === 'wait') setStage();
        else if (phase === 'rec') noteEl.textContent = pending ? pending+' answer(s) transcribing in the background…' : '';
      });
    });
    next();
  }
  function next(){ idx++; if (idx >= items.length) finishWait(); else step(); }
  function finishWait(){
    phase = 'wait'; drawRail(); setStage();
    if (pending === 0) finish();
  }

  function finish(){
    phase = 'done';
    var answered = items.filter(function(i){ return i.text; });
    clear(root);
    root.appendChild(loadingPane('Writing stronger answers in your voice…','Using your own words, structure and phrasing.'));
    if (!answered.length){
      clear(root);
      root.appendChild(h('div',{cls:'card pad center'},[
        h('p',{cls:'muted', style:'margin:0 0 16px', text:'No answers were captured, so there is nothing to rewrite.'}),
        btn('Back to studio',{variant:'subtle', onclick:function(){ go('home'); }})
      ]));
      return;
    }
    callJSON({
      system:'You are this person\'s private communication coach. For EACH question, write a stronger answer that still sounds unmistakably like THEM — same vocabulary, same rhythm, same personality. Never make it sound like polished AI copy. Keep their idioms and phrasing; add structure, specifics and confidence.\n'+
        ((S.profile&&S.profile.voiceSummary)?('How they naturally talk: '+S.profile.voiceSummary+'\n'):'')+
        'Context: '+(S.drill.context||'a workplace conversation')+'\n'+
        'Return ONLY JSON: {"answers":[{"i":0,"kept":"what was already good, 1 sentence","fix":"the main thing to change, 1 sentence","better":"the improved answer in their own voice","why":"why the new version lands better, 1-2 sentences"}]}',
      schema:'{"answers":[{"i":int,"kept":string,"fix":string,"better":string,"why":string}]}',
      messages:[{role:'user', content: items.map(function(it,i){
        return '['+i+'] Q: '+it.q+'\nTHEIR ANSWER: '+(it.text || '(no answer given)');
      }).join('\n\n')}],
      maxTokens:3000
    }).then(function(d){
      var map = {};
      ((d && d.answers) || []).forEach(function(a){ map[a.i] = a; });
      clear(root); renderRewrites(map);
    }).catch(function(e){
      clear(root); renderRewrites({}, e.message);
    });
  }

  function renderRewrites(map, err){
    root.appendChild(eyebrow('Question drill','gold'));
    root.appendChild(h('h2',{cls:'title', text:'What you could have said'}));
    root.appendChild(h('p',{cls:'muted', style:'font-size:14.5px;margin:0 0 22px;line-height:1.5',
      text:'Your own answer, then a stronger version written in your voice — not a generic AI rewrite.'}));
    if (err) root.appendChild(h('div',{cls:'warn', style:'margin-bottom:16px'},[h('span',{text:'Rewrites unavailable: '+err+' Your answers are saved below.'})]));

    var list = h('div',{style:'display:flex;flex-direction:column;gap:14px'});
    items.forEach(function(it,i){
      var a = map[i];
      var card = h('div',{cls:'card', style:'padding:18px 20px'});
      card.appendChild(h('div',{style:'display:flex;gap:11px;align-items:flex-start'},[
        h('span',{cls:'mono', style:'font-size:12px;color:var(--gold);margin-top:3px', text:String(i+1).padStart(2,'0')}),
        h('div',{style:'font-family:var(--serif);font-size:16.5px;line-height:1.45', text:it.q})
      ]));
      if (it.text){
        card.appendChild(h('div',{style:'margin-top:12px'},[
          h('div',{cls:'mono', style:'font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:5px', text:'You said'}),
          h('div',{style:'font-size:13.8px;line-height:1.55;color:var(--muted)', text:it.text})
        ]));
      } else {
        card.appendChild(h('div',{cls:'faint', style:'margin-top:10px;font-size:13px',
          text: it.status==='failed' ? ('Transcription failed: '+(it.error||'')) : 'No answer recorded.'}));
      }
      if (a){
        if (a.kept || a.fix){
          var g = h('div',{cls:'grid twocol', style:'grid-template-columns:1fr 1fr;gap:12px;margin-top:14px'});
          if (a.kept) g.appendChild(h('div',{},[ h('div',{cls:'mono', style:'font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:5px', text:'Kept'}), h('div',{style:'font-size:13.3px;line-height:1.5', text:a.kept}) ]));
          if (a.fix) g.appendChild(h('div',{},[ h('div',{cls:'mono', style:'font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:5px', text:'Changed'}), h('div',{style:'font-size:13.3px;line-height:1.5', text:a.fix}) ]));
          card.appendChild(g);
        }
        var rw = h('div',{cls:'rewrite', style:'margin-top:14px'});
        rw.appendChild(h('div',{style:'display:flex;align-items:center;gap:8px;margin-bottom:9px'},[
          h('span',{html:icon('wand',15,'var(--gold)')}), eyebrow('Say this instead','gold') ]));
        rw.appendChild(h('p',{style:'margin:0;font-size:14.5px;line-height:1.6;font-family:var(--serif)', text:a.better||''}));
        if (a.why) rw.appendChild(h('p',{cls:'faint', style:'margin:11px 0 0;font-size:12.5px;line-height:1.5;border-top:1px solid var(--lineSoft);padding-top:9px', text:a.why}));
        card.appendChild(rw);
      }
      list.appendChild(card);
    });
    root.appendChild(list);
    root.appendChild(h('div',{cls:'row', style:'margin-top:28px'},[
      btn('Drill again',{icon:'redo', onclick:function(){ items.forEach(function(i){ i.status='pending'; i.text=''; }); go('drill'); }}),
      btn('Studio',{variant:'ghost', onclick:function(){ go('home'); }})
    ]));
  }

  setStage();
  return root;
}

function startDrill(questions, context){
  S.drill = { context: context, items: questions.filter(Boolean).map(function(q){ return {q:q, text:'', status:'pending'}; }) };
  go('drill');
}

/* Reusable expandable answer card with "say this instead" coaching.
   Caches results into `store` so re-opening an archived report is free.  */
/* ---- STAR ------------------------------------------------------------
   Behavioural answers are scored against Situation / Task / Action / Result.
   The rubric is strict on the two letters candidates habitually skip: TASK
   (what was actually yours to do) and RESULT (a number, not "it went well"). */
var STAR_RUBRIC =
  'Score the answer against the STAR method. Be strict and specific:\n'+
  '- SITUATION: is there real context — where, when, what was at stake? Vague scene-setting scores low. Rambling scene-setting also scores low: it should be brief.\n'+
  '- TASK: is it clear what THEIR responsibility was, as distinct from the team\'s? Candidates skip this constantly. "We were asked to..." without "I owned..." scores low.\n'+
  '- ACTION: specific things THEY personally did, in sequence, with reasoning. "We decided" instead of "I did" scores low. This should be the longest part of the answer.\n'+
  '- RESULT: a concrete outcome, ideally quantified, plus what they learned or what changed afterwards. "It went well" scores very low. No result at all scores near zero.\n'+
  'Judge only what they actually said. Do not invent detail on their behalf.\n';

var STAR_KEYS = [['situation','Situation'],['task','Task'],['action','Action'],['result','Result']];

function starBlock(star, verdict){
  var wrap = h('div',{cls:'card', style:'padding:15px 17px;margin-bottom:14px;background:var(--bg)'});
  wrap.appendChild(h('div',{style:'display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px'},[
    eyebrow('STAR breakdown','gold'),
    h('span',{cls:'mono faint', style:'font-size:11px', text:'avg '+starAvg(star)})
  ]));
  STAR_KEYS.forEach(function(k){
    var part = star[k[0]] || {};
    var v = clamp(Number(part.score)||0);
    var col = v>=70 ? 'var(--green)' : (v>=45 ? 'var(--gold)' : 'var(--rose)');
    var row = h('div',{style:'display:flex;gap:11px;align-items:flex-start;padding:7px 0'});
    row.appendChild(h('div',{cls:'mono', style:'font-size:15px;font-weight:600;color:'+col+';flex-shrink:0;width:16px', text:k[1][0]}));
    var mid = h('div',{style:'flex:1;min-width:0'});
    mid.appendChild(h('div',{style:'display:flex;justify-content:space-between;gap:8px;margin-bottom:4px'},[
      h('span',{style:'font-size:12.5px', text:k[1]}),
      h('span',{cls:'mono', style:'font-size:11px;color:'+col, text:String(v)})
    ]));
    var fill = h('div',{cls:'fill'}); fill.style.width='0%'; fill.style.background=col;
    mid.appendChild(h('div',{cls:'track'},[fill]));
    setTimeout(function(){ fill.style.width = v+'%'; }, 60);
    if (part.note) mid.appendChild(h('div',{cls:'muted', style:'font-size:12.3px;line-height:1.45;margin-top:5px', text:part.note}));
    row.appendChild(mid);
    wrap.appendChild(row);
  });
  if (verdict) wrap.appendChild(h('div',{cls:'faint', style:'font-size:12.5px;line-height:1.5;border-top:1px solid var(--lineSoft);padding-top:9px;margin-top:8px', text:verdict}));
  return wrap;
}
function starAvg(star){
  var n=0, t=0;
  STAR_KEYS.forEach(function(k){ var v=Number((star[k[0]]||{}).score); if(isFinite(v)){ t+=v; n++; } });
  return n ? Math.round(t/n) : 0;
}

function coachCard(o){
  var card = h('div',{cls:'acard'});
  var open = false;
  var chev = h('span',{html:icon('chev',17,'var(--faint)'), style:'flex-shrink:0;margin-top:2px;transition:transform .2s'});
  var ansEl = h('div',{cls:'clamp', style:'font-size:14px;line-height:1.5', text:o.answer || '(no answer given)'});
  var qLine = h('div',{cls:'muted', style:'font-size:13.5px;margin-bottom:6px;line-height:1.4', text:o.question});
  var head = h('button',{cls:'ahead'},[
    h('span',{cls:'mono', style:'font-size:12px;color:var(--gold);margin-top:2px', text:String(o.idx+1).padStart(2,'0')}),
    h('div',{style:'flex:1;min-width:0'},[
      qLine,
      o.difficulty ? h('span',{cls:'diff '+o.difficulty, style:'margin-bottom:7px', text:o.difficulty}) : null,
      ansEl
    ]), chev
  ]);
  var body = h('div',{cls:'abody'}); body.style.display='none';

  head.addEventListener('click', function(){
    open = !open;
    body.style.display = open ? 'block' : 'none';
    chev.style.transform = open ? 'rotate(180deg)' : 'none';
    ansEl.className = open ? '' : 'clamp';
    if (open && !body.dataset.loaded) run();
  });

  function run(){
    var cached = o.store && o.store[o.key];
    if (cached){ body.dataset.loaded='1'; draw(cached); return; }
    if (!o.answer){ body.dataset.loaded='1'; clear(body);
      body.appendChild(h('div',{cls:'faint', style:'font-size:13px', text:'No answer was recorded for this one.'})); return; }
    clear(body);
    body.appendChild(h('div',{cls:'faint', style:'display:flex;align-items:center;gap:9px;font-size:13.5px',
      html: icon('load',15,'currentColor','spin')+'<span style="margin-left:4px">Writing a version in your voice…</span>'}));
    callJSON({
      system:"You are this person's private communication coach. Help them say what THEY would say - with more structure, confidence and evidence - WITHOUT changing their personality, vocabulary or voice. It must still sound unmistakably like them, never polished AI copy.\n"+
        ((S.profile&&S.profile.voiceSummary)?('How they naturally talk: '+S.profile.voiceSummary+'\n'):'')+
        'Setting: '+(o.context||'a workplace conversation')+'\n'+
        (o.star ? STAR_RUBRIC : '')+
        'Return ONLY JSON:\n{"worked":"1 sentence","improve":"1 sentence","why":"1 sentence",'+
        (o.star ? '"star":{"situation":{"score":0-100,"note":"what they gave, or what was missing"},"task":{"score":0-100,"note":"..."},"action":{"score":0-100,"note":"..."},"result":{"score":0-100,"note":"..."}},"starVerdict":"1 sentence on which letter let them down most",' : '')+
        '"improved":"their answer rewritten in their own voice'+(o.star?', following STAR properly — but still THEIR words':'')+'","whyBetter":"1-2 sentences"}',
      messages:[{role:'user', content:'QUESTION: '+o.question+'\n\nTHEIR ANSWER: '+o.answer}],
      maxTokens:o.star ? 1400 : 900
    }).then(function(d){
      if(!d || !d.improved) throw new Error('The model did not return a rewrite. Try again, or switch model in Settings.');
      body.dataset.loaded='1';
      if (o.store){ o.store[o.key] = d; if (S.replay) persistCoach(S.replay, o.key, d); }
      draw(d);
    }).catch(function(e){
      clear(body);
      body.appendChild(h('div',{style:'color:var(--rose);font-size:13.5px;line-height:1.5'},[
        h('span',{text:(e && e.message) ? e.message+' ' : 'Could not coach this one. '}),
        h('button',{style:'background:none;border:none;color:var(--gold);cursor:pointer', text:'Retry', onclick:run})
      ]));
    });
  }
  function draw(d){
    clear(body);
    if (d.star) body.appendChild(starBlock(d.star, d.starVerdict));
    var g = h('div',{cls:'grid twocol', style:'grid-template-columns:1fr 1fr;gap:12px'});
    g.appendChild(mini('Worked', d.worked, 'teal'));
    g.appendChild(mini('To improve', d.improve, 'gold'));
    body.appendChild(g);
    if (d.why) body.appendChild(h('div',{cls:'muted', style:'font-size:13.5px;line-height:1.5;margin-top:14px'},[
      h('span',{cls:'faint', text:'Why it matters — '}), h('span',{text:d.why}) ]));
    var rw = h('div',{cls:'rewrite', style:'margin-top:14px'});
    rw.appendChild(h('div',{style:'display:flex;align-items:center;gap:8px;margin-bottom:10px'},[
      h('span',{html:icon('wand',15,'var(--gold)')}), eyebrow('In your voice, more prepared','gold') ]));
    rw.appendChild(h('p',{style:'margin:0;font-size:14.5px;line-height:1.6;font-family:var(--serif)', text:d.improved}));
    if (d.whyBetter) rw.appendChild(h('p',{cls:'faint', style:'margin:12px 0 0;font-size:12.5px;line-height:1.5;border-top:1px solid var(--lineSoft);padding-top:10px', text:d.whyBetter}));
    body.appendChild(rw);
  }
  function mini(label, text, color){
    return h('div',{},[
      h('div',{cls:'mono', style:'font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--'+color+');margin-bottom:5px', text:label}),
      h('div',{style:'font-size:13.5px;line-height:1.5', text:text||''})
    ]);
  }
  card.appendChild(head); card.appendChild(body);
  return card;
}
// Write a generated rewrite back into the stored session so it's free next time.
function persistCoach(rec, key, data){
  try{
    var all = store.get('room:sessions', []) || [];
    for (var i=0;i<all.length;i++){
      if (all[i].id === rec.id){ all[i].coach = all[i].coach || {}; all[i].coach[key] = data; break; }
    }
    localStorage.setItem('room:sessions', JSON.stringify(all)); S.sessions = all;
  }catch(e){ /* cache is a bonus, never fatal */ }
}

/* ============================== Question banks ==============================
   Import your own interview question banks once; they live in this browser and
   get mixed with CV-tailored questions on every future interview.
   Matching is done LOCALLY (keyword overlap) so shortlisting costs no quota —
   only the final plan is a single API call.                                 */
var STOP = ('a an the and or but if of to in on for with about as at by from is are was were be been being do does did '+
  'you your yours i me my we our they them he she it this that these those how what when where why who which can could '+
  'would should will shall may might must have has had not no yes so than then there here all any some more most other '+
  'into over under again further once during before after above below up down out off then too very just also each').split(' ');
var STOPSET = {}; STOP.forEach(function(w){ STOPSET[w]=1; });

// Match on a 5-character prefix rather than trying to stem properly.
// "migration"/"migrated" -> "migra"; "prioritise"/"prioritised"/"prioritisation"
// -> "prior"; "stakeholder"/"stakeholders" -> "stake". Occasionally over-matches
// ("communicate"/"community"), which is harmless for ranking.
function key(w){ return w.length > 5 ? w.slice(0,5) : w; }
function tokens(s){
  return String(s||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/)
    .filter(function(w){ return w.length>2 && !STOPSET[w]; })
    .map(key);
}

// Turns a pasted/uploaded document into individual questions, keeping any
// section headings it finds as categories.
function parseBank(text){
  var lines = String(text||'').split(/\r?\n/);
  var out = [], cat = '';
  lines.forEach(function(raw){
    var l = raw.trim();
    if (!l) return;
    // strip list numbering: "12.", "3)", "-", "•", "Q7:"
    var stripped = l.replace(/^\s*(?:[Qq]\s*\d+\s*[:.)-]|\d+\s*[.):-]|[-•*·»]\s*)\s*/, '').trim();
    if (!stripped) return;
    var isQ = /\?\s*$/.test(stripped);
    var wordCount = stripped.split(/\s+/).length;
    // Heading heuristic: short, no question mark, ends with ':' or is titlecase/caps
    if (!isQ && wordCount <= 8 && (/:$/.test(stripped) || stripped === stripped.toUpperCase() || /^(volume|section|part|chapter)\b/i.test(stripped))){
      cat = stripped.replace(/:$/,'').trim();
      return;
    }
    // Keep anything question-shaped, or an imperative prompt ("Tell me about...")
    if (isQ || /^(tell|describe|explain|walk|give|share|talk|what|how|why|when|where|which|who|can|could|would|have|do|did|is|are)\b/i.test(stripped)){
      if (wordCount >= 3) out.push({ q: stripped, cat: cat });
    }
  });
  // de-duplicate
  var seen = {}, uniq = [];
  out.forEach(function(o){
    var k = o.q.toLowerCase().replace(/\s+/g,' ');
    if (!seen[k]){ seen[k]=1; uniq.push(o); }
  });
  return uniq;
}

// Minimal .docx reader: a docx is a ZIP; pull word/document.xml and inflate it
// with the browser's built-in DecompressionStream. No library, no CDN.
function docxToText(file){
  return file.arrayBuffer().then(function(ab){
    var buf = new Uint8Array(ab), dv = new DataView(ab);
    var eocd = -1;
    for (var i = buf.length - 22; i >= 0 && i > buf.length - 65558; i--){
      if (buf[i]===0x50 && buf[i+1]===0x4b && buf[i+2]===0x05 && buf[i+3]===0x06){ eocd = i; break; }
    }
    if (eocd < 0) throw new Error('That does not look like a .docx file.');
    var count = dv.getUint16(eocd+10, true), off = dv.getUint32(eocd+16, true), target = null;
    for (var n=0; n<count; n++){
      var method = dv.getUint16(off+10, true);
      var compSize = dv.getUint32(off+20, true);
      var nameLen = dv.getUint16(off+28, true);
      var extraLen = dv.getUint16(off+30, true);
      var commentLen = dv.getUint16(off+32, true);
      var localOff = dv.getUint32(off+42, true);
      var name = new TextDecoder().decode(buf.subarray(off+46, off+46+nameLen));
      if (name === 'word/document.xml'){ target = {method:method, compSize:compSize, localOff:localOff}; break; }
      off += 46 + nameLen + extraLen + commentLen;
    }
    if (!target) throw new Error('No document.xml inside that .docx.');
    var lh = target.localOff;
    var dataStart = lh + 30 + dv.getUint16(lh+26, true) + dv.getUint16(lh+28, true);
    var data = buf.subarray(dataStart, dataStart + target.compSize);
    if (target.method === 0) return new TextDecoder().decode(data);
    if (typeof DecompressionStream === 'undefined') throw new Error('This browser cannot unzip .docx — paste the text instead.');
    var ds = new DecompressionStream('deflate-raw');
    return new Response(new Blob([data]).stream().pipeThrough(ds)).arrayBuffer()
      .then(function(x){ return new TextDecoder().decode(new Uint8Array(x)); });
  }).then(function(xml){
    return xml.replace(/<\/w:p>/g, '\n')
      .replace(/<w:tab[^>]*\/>/g, ' ')
      .replace(/<[^>]+>/g, '')
      .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
      .replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&apos;/g,"'");
  });
}

function readFileAsText(file){
  return new Promise(function(res, rej){
    var r = new FileReader();
    r.onload = function(){ res(String(r.result)); };
    r.onerror = function(){ rej(new Error('Could not read that file.')); };
    r.readAsText(file);
  });
}
function importBankFile(file){
  var n = (file.name||'').toLowerCase();
  if (/\.docx$/.test(n)) return docxToText(file);
  if (/\.pdf$/.test(n)) return Promise.reject(new Error('PDF needs a parser this app cannot load offline — open it and paste the text instead.'));
  if (/\.(txt|md|csv|tsv|json|rtf)$/.test(n) || file.type.indexOf('text') === 0) return readFileAsText(file);
  return readFileAsText(file); // optimistic: many banks are plain text with odd extensions
}

function allBankQuestions(){
  var out = [];
  (S.banks||[]).forEach(function(b){
    if (b.enabled === false) return;
    b.questions.forEach(function(q){ out.push({ q:q.q, cat:q.cat, bank:b.name }); });
  });
  return out;
}

// Rank bank questions against the CV + JD by keyword overlap. Free and instant.
function shortlistBank(cv, jd, limit){
  var pool = allBankQuestions();
  if (!pool.length) return [];
  var ctx = {}, ctxToks = tokens(cv + ' ' + jd);
  ctxToks.forEach(function(w){ ctx[w] = (ctx[w]||0) + 1; });
  var scored = pool.map(function(item){
    var t = tokens(item.q + ' ' + (item.cat||''));
    var score = 0, hits = 0;
    t.forEach(function(w){ if (ctx[w]){ score += 1 + Math.min(ctx[w], 4) * 0.25; hits++; } });
    // normalise so long questions don't win by length alone
    var norm = t.length ? score / Math.sqrt(t.length) : 0;
    return { q:item.q, cat:item.cat, bank:item.bank, score:norm, hits:hits };
  });
  scored.sort(function(a,b){ return b.score - a.score; });
  // keep some low-scoring ones so the bank isn't reduced to CV echoes
  var top = scored.slice(0, Math.round(limit * 0.75));
  var rest = scored.slice(Math.round(limit * 0.75));
  for (var i = rest.length - 1; i > 0; i--){ var j = Math.floor(Math.random()*(i+1)); var t2 = rest[i]; rest[i] = rest[j]; rest[j] = t2; }
  return top.concat(rest.slice(0, limit - top.length));
}

var MIX = [
  {id:'off',   label:'Ignore banks',      bank:0},
  {id:'light', label:'Mostly tailored',   bank:0.25},
  {id:'even',  label:'Balanced',          bank:0.5},
  {id:'heavy', label:'Mostly my bank',    bank:0.75},
  {id:'only',  label:'My bank only',      bank:1}
];

// One call: weave shortlisted bank questions with CV-tailored ones into a plan.
// In behavioural mode a plan is ALWAYS built (even with no bank) because the
// whole point is guaranteed competency spread across ~20 questions.
function buildPlan(sess, docCtx){
  var behav = !!sess.behavioural;
  var mixDef = MIX.filter(function(m){ return m.id === (sess.mix||'even'); })[0] || MIX[2];
  var short = shortlistBank(sess.cv, sess.jd, behav ? 60 : 45);
  if (!behav){
    if (mixDef.bank === 0) return Promise.resolve(null);
    if (!short.length) return Promise.resolve(null);
  }
  var want = sess.plannedTurns || 8;
  var nBank = short.length ? Math.round(want * mixDef.bank) : 0;

  var sys = behav
    ? 'You plan a BEHAVIOURAL (competency) interview for a Big-4 Strategy and Transactions role.\n'+
      'Build an ordered plan of exactly '+want+' questions.\n'+
      '- EVERY question must ask for a specific past example ("Tell me about a time...", "Give me an example of...", "Describe a situation where...").\n'+
      '- No hypotheticals, no opinions, no abstract strengths questions.\n'+
      '- Each question must target a DIFFERENT competency from this list. Use '+Math.min(want, BEHAV_COMPETENCIES.length)+' different ones — never repeat a competency:\n'+
      BEHAV_COMPETENCIES.map(function(c,i){ return '  '+(i+1)+'. '+c; }).join('\n')+'\n'+
      (short.length ? '- Use EXACTLY '+nBank+' questions from the candidate\'s own bank below (quote near-verbatim, light adaptation allowed). The rest must be new questions tailored to their CV.\n' : '- Tailor every question to the specifics of their CV — reference their actual projects and sectors.\n')+
      '- Order easiest to hardest: warm-up competencies first, failure/conflict/ethics later.\n'+
      '- Return the competency you assigned to each question.\n'+
      'Return ONLY JSON: {"plan":[{"q":"the question","source":"bank"|"tailored","difficulty":"easy"|"medium"|"hard","competency":"which competency this targets"}]}'
    : 'You plan a job interview. You are given a candidate brief and a numbered bank of the interviewer\'s own questions.\n'+
      'Build an ordered plan of exactly '+want+' questions:\n'+
      '- Use EXACTLY '+nBank+' questions taken from the bank. Pick the ones most relevant to this candidate and role. Quote them near-verbatim; you may lightly adapt wording to name their actual experience.\n'+
      '- The remaining '+(want-nBank)+' must be NEW questions tailored to the CV and job description.\n'+
      '- Order them so difficulty rises: warm-up first, hardest near the end.\n'+
      '- Do not repeat topics.\n'+
      'Return ONLY JSON: {"plan":[{"q":"the question text","source":"bank"|"tailored","difficulty":"easy"|"medium"|"hard"}]}';

  return callJSON({
    system: sys,
    schema:'{"plan":[{"q":string,"source":"bank"|"tailored","difficulty":"easy"|"medium"|"hard","competency":string}]}',
    messages:[{ role:'user', content:
      'CANDIDATE BRIEF:\n'+docCtx+
      (short.length ? '\n\nQUESTION BANK (choose from these):\n'+
        short.map(function(x,i){ return (i+1)+'. '+(x.cat?'['+x.cat+'] ':'')+x.q; }).join('\n') : '') }],
    maxTokens: behav ? 3200 : 2200
  }).then(function(d){
    var plan = (d && d.plan) || [];
    return plan.length ? plan : null;
  }).catch(function(){ return null; }); // never block the interview
}

/* Import / manage your own question banks, and choose how heavily they're used. */
function bankCard(st){
  var card = h('div');
  card.appendChild(eyebrow('Your question banks'));
  card.appendChild(h('div',{cls:'faint', style:'font-size:12.5px;margin:4px 0 10px;line-height:1.5',
    text:'Import your own interview questions once — they stay in this browser and get mixed into every future interview. .docx, .txt, .md and .csv work; for PDF, paste the text.'}));

  var list = h('div');
  var status = h('div',{cls:'faint', style:'font-size:12px;margin-top:8px;line-height:1.5'});

  function total(){ return (S.banks||[]).reduce(function(a,b){ return a + (b.enabled===false?0:b.questions.length); }, 0); }
  function drawList(){
    clear(list);
    if (!(S.banks||[]).length){ return; }
    S.banks.forEach(function(b, i){
      var tog = h('button',{cls:'toggle '+(b.enabled===false?'':'on'), role:'switch', style:'transform:scale(.8)'},[h('span',{cls:'knob'})]);
      tog.addEventListener('click', function(){
        b.enabled = (b.enabled === false);
        tog.className = 'toggle '+(b.enabled===false?'':'on'); saveBanks(); drawCount();
      });
      list.appendChild(h('div',{cls:'bankrow'},[
        h('div',{style:'min-width:0'},[
          h('div',{style:'font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis', text:b.name}),
          h('div',{cls:'mono faint', style:'font-size:10.5px;margin-top:2px', text:b.questions.length+' questions'+(b.src?' · auto-loaded':'')})
        ]),
        h('div',{style:'display:flex;align-items:center;gap:8px;flex-shrink:0'},[ tog,
          h('button',{style:'background:none;border:none;color:var(--faint);cursor:pointer;display:flex', title:'Remove',
            html:icon('x',15), onclick:function(){
              S.banks.splice(i,1); saveBanks(); drawList(); drawCount();
            }})
        ])
      ]));
    });
  }
  function drawCount(){
    var n = total();
    status.textContent = n ? n+' questions available across '+(S.banks.filter(function(b){return b.enabled!==false;}).length)+' bank(s).'
                           : 'No banks loaded — interviews will use CV-tailored questions only.';
    mixWrap.style.display = n ? 'block' : 'none';
  }

  // ---- import: file picker + drag/drop + paste
  var fileIn = h('input',{type:'file', accept:'.docx,.txt,.md,.csv,.tsv,.json,.rtf', multiple:'', style:'display:none'});
  function handleFiles(files){
    var arr = Array.prototype.slice.call(files||[]);
    if (!arr.length) return;
    status.style.color = 'var(--faint)';
    status.textContent = 'Reading '+arr.length+' file(s)…';
    Promise.all(arr.map(function(f){
      return importBankFile(f).then(function(txt){
        var qs = parseBank(txt);
        if (!qs.length) throw new Error('No questions found in '+f.name+' — are they on separate lines?');
        return { name:f.name.replace(/\.[^.]+$/,''), questions:qs, enabled:true, added:Date.now() };
      });
    })).then(function(banks){
      banks.forEach(function(b){ S.banks.push(b); });
      saveBanks(); drawList(); drawCount();
      status.style.color = 'var(--green)';
      status.textContent = 'Imported '+banks.reduce(function(a,b){return a+b.questions.length;},0)+' questions from '+banks.length+' file(s).';
    }).catch(function(e){
      status.style.color = 'var(--rose)';
      status.textContent = e.message;
    });
  }
  fileIn.addEventListener('change', function(){ handleFiles(fileIn.files); fileIn.value=''; });

  var drop = h('div',{cls:'drop'},[
    h('div',{style:'font-size:13.5px;margin-bottom:8px', text:'Drop your question bank files here'}),
    h('div',{cls:'row', style:'justify-content:center;gap:8px'},[
      btn('Choose files',{variant:'subtle', onclick:function(){ fileIn.click(); }}),
      btn('Paste instead',{variant:'ghost', onclick:function(){ pasteWrap.style.display = pasteWrap.style.display==='none' ? 'block' : 'none'; }})
    ])
  ]);
  ['dragenter','dragover'].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.add('hot'); }); });
  ['dragleave','drop'].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.remove('hot'); }); });
  drop.addEventListener('drop', function(e){ handleFiles(e.dataTransfer.files); });
  card.appendChild(drop);
  card.appendChild(fileIn);

  var pasteWrap = h('div',{style:'display:none;margin-top:12px'});
  var pasteName = h('input',{cls:'input', placeholder:'Bank name (e.g. HR Bank — Volume 1)'});
  var pasteTa = h('textarea',{cls:'input', rows:5, style:'margin-top:8px', placeholder:'One question per line. Numbering and bullets are stripped automatically. Short lines ending in ":" become section headings.'});
  pasteWrap.appendChild(pasteName); pasteWrap.appendChild(pasteTa);
  pasteWrap.appendChild(h('div',{cls:'row', style:'margin-top:8px'},[
    btn('Add bank',{variant:'subtle', icon:'check', onclick:function(){
      var qs = parseBank(pasteTa.value);
      if (!qs.length){ status.style.color='var(--rose)'; status.textContent='No questions found — put one per line.'; return; }
      S.banks.push({ name: pasteName.value.trim() || ('Pasted bank '+(S.banks.length+1)), questions:qs, enabled:true, added:Date.now() });
      saveBanks(); drawList(); drawCount();
      pasteTa.value=''; pasteName.value=''; pasteWrap.style.display='none';
      status.style.color='var(--green)'; status.textContent='Added '+qs.length+' questions.';
    }})
  ]));
  card.appendChild(pasteWrap);
  card.appendChild(h('div',{style:'margin-top:12px'},[list]));
  card.appendChild(status);

  // ---- mix control
  var mixWrap = h('div',{style:'margin-top:16px'});
  mixWrap.appendChild(h('div',{cls:'mono faint', style:'font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px', text:'How much to use them'}));
  var mixRow = h('div',{cls:'row', style:'gap:6px'});
  MIX.forEach(function(m){
    mixRow.appendChild(h('button',{cls:'pill '+(st.mix===m.id?'on':''), onclick:function(){
      st.mix = m.id; store.set('room:mix', m.id);
      Array.prototype.forEach.call(mixRow.children, function(c){ c.className='pill'; });
      this.className='pill on';
    }}, m.label));
  });
  mixWrap.appendChild(mixRow);
  mixWrap.appendChild(h('div',{cls:'faint', style:'font-size:11.5px;margin-top:8px;line-height:1.5',
    text:'Your questions are matched to your CV locally (no API cost), then one planning call weaves them with tailored ones and orders them easiest-first.'}));
  card.appendChild(mixWrap);

  drawList(); drawCount();
  return card;
}
